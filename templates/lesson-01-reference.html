<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本語短文 — N5・第一課</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;600&family=Noto+Sans+JP:wght@400;500&family=IBM+Plex+Sans:wght@400;500&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-base: #F5F1E8;
    --bg-elevated: #FAF8F3;
    --bg-overlay: #FFFEF9;
    --fg-primary: #2A2620;
    --fg-secondary: #5C544A;
    --fg-tertiary: #8C8275;
    --border-subtle: rgba(42, 38, 32, 0.08);
    --border-default: rgba(42, 38, 32, 0.14);
    --accent: #A8895C;
    --accent-hover: #B89968;
    --accent-soft: rgba(168, 137, 92, 0.12);

    --serif-jp: "Noto Serif JP", serif;
    --sans-jp: "Noto Sans JP", sans-serif;
    --sans-en: "IBM Plex Sans", sans-serif;
    --mono: "IBM Plex Mono", monospace;

    --ease: cubic-bezier(0.4, 0, 0.2, 1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg-base);
    color: var(--fg-primary);
    font-family: var(--sans-jp);
    font-size: 14px;
    line-height: 1.75;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    min-height: 100vh;
    background-image:
      radial-gradient(at 20% 10%, rgba(168, 137, 92, 0.04) 0%, transparent 50%),
      radial-gradient(at 80% 90%, rgba(168, 137, 92, 0.03) 0%, transparent 50%);
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 64px 32px 96px;
  }

  /* Header */
  .masthead {
    border-bottom: 1px solid var(--border-default);
    padding-bottom: 24px;
    margin-bottom: 48px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 24px;
  }

  .masthead-title {
    font-family: var(--serif-jp);
    font-weight: 500;
  }

  .masthead-title .level {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--accent);
    text-transform: uppercase;
    display: block;
    margin-bottom: 6px;
  }

  .masthead-title .title-jp {
    font-size: 22px;
    line-height: 1.4;
    color: var(--fg-primary);
  }

  .masthead-title .title-en {
    font-family: var(--sans-en);
    font-size: 12px;
    color: var(--fg-tertiary);
    margin-top: 4px;
    letter-spacing: 0.02em;
  }

  .masthead-meta {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--fg-tertiary);
    text-align: right;
    line-height: 1.6;
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 40px;
    padding: 16px;
    background: var(--bg-elevated);
    border: 1px solid var(--border-subtle);
    border-radius: 4px;
  }

  .control-group {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .control-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--fg-tertiary);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .toggle-group {
    display: inline-flex;
    border: 1px solid var(--border-default);
    border-radius: 2px;
    overflow: hidden;
  }

  .toggle {
    background: transparent;
    border: none;
    padding: 6px 12px;
    font-family: var(--sans-en);
    font-size: 12px;
    color: var(--fg-secondary);
    cursor: pointer;
    transition: all 200ms var(--ease);
    border-right: 1px solid var(--border-default);
  }

  .toggle:last-child { border-right: none; }

  .toggle:hover { color: var(--fg-primary); }

  .toggle.active {
    background: var(--accent);
    color: var(--bg-overlay);
  }

  .speed-select {
    background: transparent;
    border: 1px solid var(--border-default);
    padding: 6px 8px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--fg-secondary);
    border-radius: 2px;
    cursor: pointer;
  }

  /* Audio control */
  .audio-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 20px 24px;
    background: var(--bg-overlay);
    border: 1px solid var(--border-default);
    border-radius: 4px;
    margin-bottom: 40px;
  }

  .play-btn {
    background: var(--fg-primary);
    color: var(--bg-overlay);
    border: none;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 200ms var(--ease);
    flex-shrink: 0;
  }

  .play-btn:hover { background: var(--accent); }

  .play-btn svg { width: 14px; height: 14px; }

  .audio-info {
    flex: 1;
    min-width: 0;
  }

  .audio-info-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--fg-tertiary);
    margin-bottom: 2px;
  }

  .audio-info-text {
    font-family: var(--sans-jp);
    font-size: 13px;
    color: var(--fg-secondary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Article */
  .article {
    font-family: var(--serif-jp);
  }

  .article-section + .article-section {
    margin-top: 32px;
  }

  /* Sentence */
  .sentence {
    padding: 16px 0;
    border-bottom: 1px solid var(--border-subtle);
    cursor: pointer;
    transition: background 200ms var(--ease);
    margin: 0 -16px;
    padding-left: 16px;
    padding-right: 16px;
    border-radius: 2px;
    position: relative;
  }

  .sentence:hover {
    background: var(--accent-soft);
  }

  .sentence.playing {
    background: var(--accent-soft);
  }

  .sentence.playing::before {
    content: '';
    position: absolute;
    left: 0;
    top: 16px;
    bottom: 16px;
    width: 2px;
    background: var(--accent);
  }

  .jp-text {
    font-size: 18px;
    line-height: 2.1;
    color: var(--fg-primary);
    letter-spacing: 0.02em;
  }

  /* Furigana via ruby */
  ruby { ruby-position: over; }

  rt {
    font-family: var(--sans-jp);
    font-size: 0.5em;
    color: var(--fg-tertiary);
    font-weight: 400;
    letter-spacing: 0;
    transition: opacity 300ms var(--ease);
  }

  body.hide-furigana rt { opacity: 0; }

  .romaji {
    font-family: var(--sans-en);
    font-style: italic;
    font-size: 12px;
    color: var(--fg-tertiary);
    line-height: 1.6;
    margin-top: 6px;
    letter-spacing: 0.01em;
    transition: opacity 300ms var(--ease);
  }

  body.hide-romaji .romaji { display: none; }

  .translation {
    font-family: var(--sans-jp);
    font-size: 12px;
    color: var(--fg-secondary);
    margin-top: 6px;
    line-height: 1.6;
  }

  body.hide-translation .translation { display: none; }

  /* Notes section */
  .section-divider {
    margin: 64px 0 32px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .section-divider::before,
  .section-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border-default);
  }

  .section-divider-text {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--fg-tertiary);
  }

  .notes h3 {
    font-family: var(--serif-jp);
    font-size: 14px;
    font-weight: 500;
    color: var(--fg-primary);
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border-subtle);
  }

  .notes-section + .notes-section {
    margin-top: 32px;
  }

  .vocab-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 0;
  }

  .vocab-item {
    display: grid;
    grid-template-columns: minmax(80px, 0.8fr) minmax(80px, 1fr) 2fr;
    gap: 16px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border-subtle);
    align-items: baseline;
  }

  .vocab-jp {
    font-family: var(--serif-jp);
    font-size: 15px;
    color: var(--fg-primary);
  }

  .vocab-romaji {
    font-family: var(--sans-en);
    font-style: italic;
    font-size: 12px;
    color: var(--fg-tertiary);
  }

  .vocab-meaning {
    font-family: var(--sans-jp);
    font-size: 13px;
    color: var(--fg-secondary);
  }

  .grammar-point {
    padding: 12px 0;
    border-bottom: 1px solid var(--border-subtle);
  }

  .grammar-pattern {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
    background: var(--accent-soft);
    padding: 2px 8px;
    border-radius: 2px;
    display: inline-block;
    margin-bottom: 6px;
  }

  .grammar-explain {
    font-family: var(--sans-jp);
    font-size: 13px;
    color: var(--fg-secondary);
    line-height: 1.7;
  }

  /* Footer */
  .footer {
    margin-top: 80px;
    padding-top: 24px;
    border-top: 1px solid var(--border-default);
    font-family: var(--mono);
    font-size: 10px;
    color: var(--fg-tertiary);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    display: flex;
    justify-content: space-between;
  }

  /* Status indicator for TTS availability */
  .tts-status {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--fg-tertiary);
    letter-spacing: 0.05em;
  }

  .tts-status.unavailable {
    color: #8B4513;
  }

  @media (max-width: 600px) {
    .container { padding: 40px 20px 64px; }
    .masthead { flex-direction: column; align-items: flex-start; }
    .masthead-meta { text-align: left; }
    .jp-text { font-size: 17px; }
    .vocab-item { grid-template-columns: 1fr; gap: 4px; padding: 12px 0; }
    .controls { flex-direction: column; align-items: flex-start; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body>
  <div class="container">

    <header class="masthead">
      <div class="masthead-title">
        <span class="level">N5 — Lesson 01</span>
        <h1 class="title-jp">わたし<ruby>の<rt></rt></ruby><ruby>一日<rt>いちにち</rt></ruby></h1>
        <div class="title-en">watashi no ichinichi · my day</div>
      </div>
      <div class="masthead-meta">
        <div>第 一 課</div>
        <div id="tts-status" class="tts-status">音声 · loading…</div>
      </div>
    </header>

    <div class="controls">
      <div class="control-group">
        <span class="control-label">Furigana</span>
        <div class="toggle-group">
          <button class="toggle active" data-toggle="furigana" data-state="on">On</button>
          <button class="toggle" data-toggle="furigana" data-state="off">Off</button>
        </div>
      </div>
      <div class="control-group">
        <span class="control-label">Romaji</span>
        <div class="toggle-group">
          <button class="toggle active" data-toggle="romaji" data-state="on">On</button>
          <button class="toggle" data-toggle="romaji" data-state="off">Off</button>
        </div>
      </div>
      <div class="control-group">
        <span class="control-label">中文</span>
        <div class="toggle-group">
          <button class="toggle active" data-toggle="translation" data-state="on">On</button>
          <button class="toggle" data-toggle="translation" data-state="off">Off</button>
        </div>
      </div>
      <div class="control-group">
        <span class="control-label">Speed</span>
        <select class="speed-select" id="speed-select">
          <option value="0.7">0.7×</option>
          <option value="0.85" selected>0.85×</option>
          <option value="1.0">1.0×</option>
        </select>
      </div>
    </div>

    <div class="audio-bar">
      <button class="play-btn" id="play-all" aria-label="播放全文">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <div class="audio-info">
        <div class="audio-info-label">Now reading</div>
        <div class="audio-info-text" id="now-reading">クリック开始 / Click sentence to play</div>
      </div>
    </div>

    <article class="article" id="article">
      <!-- sentences injected by JS -->
    </article>

    <div class="section-divider">
      <span class="section-divider-text">語彙 · vocabulary</span>
    </div>

    <section class="notes">
      <div class="vocab-grid" id="vocab-grid"></div>
    </section>

    <div class="section-divider">
      <span class="section-divider-text">文法 · grammar</span>
    </div>

    <section class="notes" id="grammar-notes"></section>

    <footer class="footer">
      <span>日本語 N5 · 第一課</span>
      <span>web speech api</span>
    </footer>

  </div>

<script>
// ============================================================
// Content data
// ============================================================

const sentences = [
  {
    jp: '<ruby>私<rt>わたし</rt></ruby>は<ruby>田中<rt>たなか</rt></ruby>です。',
    plain: 'わたしはたなかです。',
    romaji: 'watashi wa Tanaka desu.',
    cn: '我是田中。'
  },
  {
    jp: '<ruby>毎朝<rt>まいあさ</rt></ruby><ruby>七時<rt>しちじ</rt></ruby>に<ruby>起<rt>お</rt></ruby>きます。',
    plain: 'まいあさしちじにおきます。',
    romaji: 'maiasa shichi-ji ni okimasu.',
    cn: '每天早上七点起床。'
  },
  {
    jp: 'パンと<ruby>牛乳<rt>ぎゅうにゅう</rt></ruby>の<ruby>朝<rt>あさ</rt></ruby>ごはんを<ruby>食<rt>た</rt></ruby>べます。',
    plain: 'パンとぎゅうにゅうのあさごはんをたべます。',
    romaji: 'pan to gyuunyuu no asagohan o tabemasu.',
    cn: '吃面包和牛奶的早餐。'
  },
  {
    jp: 'それから、<ruby>電車<rt>でんしゃ</rt></ruby>で<ruby>会社<rt>かいしゃ</rt></ruby>へ<ruby>行<rt>い</rt></ruby>きます。',
    plain: 'それから、でんしゃでかいしゃへいきます。',
    romaji: 'sorekara, densha de kaisha e ikimasu.',
    cn: '然后，乘电车去公司。'
  },
  {
    jp: '<ruby>会社<rt>かいしゃ</rt></ruby>は<ruby>東京<rt>とうきょう</rt></ruby>に あります。',
    plain: 'かいしゃはとうきょうにあります。',
    romaji: 'kaisha wa Toukyou ni arimasu.',
    cn: '公司在东京。'
  },
  {
    jp: '<ruby>昼<rt>ひる</rt></ruby>は <ruby>同僚<rt>どうりょう</rt></ruby>と <ruby>一緒<rt>いっしょ</rt></ruby>に ごはんを <ruby>食<rt>た</rt></ruby>べます。',
    plain: 'ひるはどうりょうといっしょにごはんをたべます。',
    romaji: 'hiru wa douryou to issho ni gohan o tabemasu.',
    cn: '中午和同事一起吃饭。'
  },
  {
    jp: '<ruby>夜<rt>よる</rt></ruby>、<ruby>家<rt>いえ</rt></ruby>で <ruby>本<rt>ほん</rt></ruby>を <ruby>読<rt>よ</rt></ruby>みます。',
    plain: 'よる、いえでほんをよみます。',
    romaji: 'yoru, ie de hon o yomimasu.',
    cn: '晚上，在家里读书。'
  },
  {
    jp: '<ruby>静<rt>しず</rt></ruby>かな <ruby>時間<rt>じかん</rt></ruby>が <ruby>好<rt>す</rt></ruby>きです。',
    plain: 'しずかなじかんがすきです。',
    romaji: 'shizuka na jikan ga suki desu.',
    cn: '我喜欢安静的时间。'
  }
];

const vocabulary = [
  { jp: '毎朝', romaji: 'maiasa', meaning: '每天早上' },
  { jp: '七時', romaji: 'shichi-ji', meaning: '七点' },
  { jp: '起きます', romaji: 'okimasu', meaning: '起床' },
  { jp: '牛乳', romaji: 'gyuunyuu', meaning: '牛奶' },
  { jp: '朝ごはん', romaji: 'asagohan', meaning: '早餐' },
  { jp: '食べます', romaji: 'tabemasu', meaning: '吃' },
  { jp: 'それから', romaji: 'sorekara', meaning: '然后；接着' },
  { jp: '電車', romaji: 'densha', meaning: '电车' },
  { jp: '会社', romaji: 'kaisha', meaning: '公司' },
  { jp: '行きます', romaji: 'ikimasu', meaning: '去' },
  { jp: '同僚', romaji: 'douryou', meaning: '同事' },
  { jp: '一緒に', romaji: 'issho ni', meaning: '一起' },
  { jp: '読みます', romaji: 'yomimasu', meaning: '读；阅读' },
  { jp: '静かな', romaji: 'shizuka na', meaning: '安静的' },
  { jp: '好きです', romaji: 'suki desu', meaning: '喜欢' }
];

const grammar = [
  {
    pattern: 'N は N です',
    explain: '基本判断句。「は」是主题助词（读作 wa），「です」表肯定的礼貌体。例：私は田中です。'
  },
  {
    pattern: 'N に V ます',
    explain: '「に」表示具体的时间点。只有时刻、星期、月份、年份等"点状时间"用「に」。例：七時に起きます。'
  },
  {
    pattern: 'N を V ます',
    explain: '「を」是宾语助词（读作 o），标记动作的对象。例：ごはんを食べます。'
  },
  {
    pattern: 'N で V ます',
    explain: '「で」表示交通工具或动作发生的场所。例：電車で行きます／家で読みます。'
  },
  {
    pattern: 'N へ／に 行きます',
    explain: '「へ」（读作 e）和「に」都可以表示移动的方向，「へ」更强调方向感。例：会社へ行きます。'
  },
  {
    pattern: 'N が 好きです',
    explain: '表示"喜欢～"。注意助词是「が」不是「を」。例：静かな時間が好きです。'
  }
];

// ============================================================
// Render
// ============================================================

const article = document.getElementById('article');
sentences.forEach((s, i) => {
  const div = document.createElement('div');
  div.className = 'sentence';
  div.dataset.index = i;
  div.innerHTML = `
    <div class="jp-text">${s.jp}</div>
    <div class="romaji">${s.romaji}</div>
    <div class="translation">${s.cn}</div>
  `;
  article.appendChild(div);
});

const vocabGrid = document.getElementById('vocab-grid');
vocabulary.forEach(v => {
  const div = document.createElement('div');
  div.className = 'vocab-item';
  div.innerHTML = `
    <div class="vocab-jp">${v.jp}</div>
    <div class="vocab-romaji">${v.romaji}</div>
    <div class="vocab-meaning">${v.meaning}</div>
  `;
  vocabGrid.appendChild(div);
});

const grammarNotes = document.getElementById('grammar-notes');
grammar.forEach(g => {
  const div = document.createElement('div');
  div.className = 'grammar-point';
  div.innerHTML = `
    <div class="grammar-pattern">${g.pattern}</div>
    <div class="grammar-explain">${g.explain}</div>
  `;
  grammarNotes.appendChild(div);
});

// ============================================================
// Toggles
// ============================================================

document.querySelectorAll('.toggle').forEach(btn => {
  btn.addEventListener('click', () => {
    const type = btn.dataset.toggle;
    const state = btn.dataset.state;
    document.querySelectorAll(`.toggle[data-toggle="${type}"]`).forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (state === 'off') document.body.classList.add(`hide-${type}`);
    else document.body.classList.remove(`hide-${type}`);
  });
});

// ============================================================
// Speech Synthesis
// ============================================================

const synth = window.speechSynthesis;
let jaVoice = null;
const ttsStatus = document.getElementById('tts-status');
const nowReading = document.getElementById('now-reading');
const speedSelect = document.getElementById('speed-select');

function pickJapaneseVoice() {
  const voices = synth.getVoices();
  // Prefer high-quality voices if available
  const preferred = voices.find(v => v.lang === 'ja-JP' && /Kyoko|Otoya|O-ren|Google/i.test(v.name));
  jaVoice = preferred || voices.find(v => v.lang === 'ja-JP') || voices.find(v => v.lang.startsWith('ja'));

  if (jaVoice) {
    ttsStatus.textContent = `音声 · ${jaVoice.name.split(' ')[0]}`;
    ttsStatus.classList.remove('unavailable');
  } else {
    ttsStatus.textContent = '音声 · 未対応';
    ttsStatus.classList.add('unavailable');
  }
}

if (synth) {
  pickJapaneseVoice();
  synth.onvoiceschanged = pickJapaneseVoice;
} else {
  ttsStatus.textContent = '音声 · 未対応';
  ttsStatus.classList.add('unavailable');
}

let queue = [];
let isPlaying = false;

function speak(text, onEnd) {
  if (!synth) { onEnd?.(); return; }
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ja-JP';
  if (jaVoice) u.voice = jaVoice;
  u.rate = parseFloat(speedSelect.value);
  u.pitch = 1.0;
  u.onend = () => onEnd?.();
  u.onerror = () => onEnd?.();
  synth.speak(u);
}

function clearPlaying() {
  document.querySelectorAll('.sentence.playing').forEach(s => s.classList.remove('playing'));
}

function playSentence(index) {
  synth.cancel();
  clearPlaying();
  const el = document.querySelector(`.sentence[data-index="${index}"]`);
  if (!el) return;
  el.classList.add('playing');
  nowReading.textContent = sentences[index].plain;
  speak(sentences[index].plain, () => {
    el.classList.remove('playing');
    if (queue.length > 0) {
      const next = queue.shift();
      playSentence(next);
    } else {
      isPlaying = false;
      nowReading.textContent = '完了 / done';
    }
  });
}

// Click on sentence
document.querySelectorAll('.sentence').forEach(el => {
  el.addEventListener('click', () => {
    queue = [];
    isPlaying = true;
    playSentence(parseInt(el.dataset.index));
  });
});

// Play all
document.getElementById('play-all').addEventListener('click', () => {
  if (isPlaying) {
    synth.cancel();
    queue = [];
    isPlaying = false;
    clearPlaying();
    nowReading.textContent = '一時停止 / paused';
    return;
  }
  queue = sentences.map((_, i) => i);
  isPlaying = true;
  const first = queue.shift();
  playSentence(first);
});

// Stop on page hide
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    synth.cancel();
    queue = [];
    isPlaying = false;
    clearPlaying();
  }
});
</script>
</body>
</html>
