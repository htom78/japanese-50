"speaker":"司会者","jp":"<ruby>本日<rt>ほんじつ</rt></ruby>は<ruby>入試制度<rt>にゅうしせいど</rt></ruby>をめぐる<ruby>議論<rt>ぎろん</rt></ruby>をいたします。","plain":"ほんじつはにゅうしせいどをめぐるぎろんをいたします。","romaji":"honjitsu wa nyuushi-seido o meguru giron o itashimasu.","cn":"今天我们围绕入学考试制度展开讨论。"},{"speaker":"教育学者A","jp":"<ruby>子<rt>こ</rt></ruby>どもにとって、<ruby>偏差値<rt>へんさち</rt></ruby><ruby>中心<rt>ちゅうしん</rt></ruby>の<ruby>制度<rt>せいど</rt></ruby>はもはや<ruby>限界<rt>げんかい</rt></ruby>に<ruby>来<rt>き</rt></ruby>ています。","plain":"こどもにとって、へんさちちゅうしんのせいどはもはやげんかいにきています。","romaji":"kodomo ni totte, hensachi-chuushin no seido wa mohaya genkai ni kite imasu.","cn":"对孩子而言,以偏差值为中心的制度已到极限。"},{"speaker":"評論家B","jp":"しかし、<ruby>公平性<rt>こうへいせい</rt></ruby>に<ruby>関<rt>かん</rt></ruby>しては、<ruby>数値化<rt>すうちか</rt></ruby>された<ruby>基準<rt>きじゅん</rt></ruby>が<ruby>必要<rt>ひつよう</rt></ruby>でしょう。","plain":"しかし、こうへいせいにかんしては、すうちかされたきじゅんがひつようでしょう。","romaji":"shikashi, kouheisei ni kanshite wa, suuchi-ka sareta kijun ga hitsuyou deshou.","cn":"然而,关于公平性,数值化的标准还是必要的。"},{"speaker":"教育学者A","jp":"<ruby>公平性<rt>こうへいせい</rt></ruby>については<ruby>同感<rt>どうかん</rt></ruby>です。ただし、<ruby>多面的<rt>ためんてき</rt></ruby>な<ruby>評価<rt>ひょうか</rt></ruby>を<ruby>導入<rt>どうにゅう</rt></ruby>すべきです。","plain":"こうへいせいについてはどうかんです。ただし、ためんてきなひょうかをどうにゅうすべきです。","romaji":"kouheisei ni tsuite wa doukan desu. tadashi, tamenteki na hyouka o dounyuu suru beki desu.","cn":"关于公平性我同感。但是,应当引入多面化的评价。"},{"speaker":"司会者","jp":"<ruby>保護者<rt>ほごしゃ</rt></ruby>の<ruby>立場<rt>たちば</rt></ruby>からはいかがでしょうか。","plain":"ほごしゃのたちばからはいかがでしょうか。","romaji":"hogosha no tachiba kara wa ikaga deshou ka.","cn":"从监护人的立场来看怎么样?"},{"speaker":"保護者代表","jp":"<ruby>家庭<rt>かてい</rt></ruby>にとっては、<ruby>経済的<rt>けいざいてき</rt></ruby><ruby>負担<rt>ふたん</rt></ruby>も<ruby>大<rt>おお</rt></ruby>きな<ruby>問題<rt>もんだい</rt></ruby>です。","plain":"かていにとっては、けいざいてきふたんもおおきなもんだいです。","romaji":"katei ni totte wa, keizai-teki futan mo ookina mondai desu.","cn":"对家庭而言,经济负担也是大问题。"},{"speaker":"司会者","jp":"なるほど、それぞれの<ruby>視点<rt>してん</rt></ruby>から<ruby>多<rt>おお</rt></ruby>くの<ruby>論点<rt>ろんてん</rt></ruby>が<ruby>見<rt>み</rt></ruby>えてきましたね。","plain":"なるほど、それぞれのしてんからおおくのろんてんがみえてきましたね。","romaji":"naruhodo, sorezore no shiten kara ooku no ronten ga miete kimashita ne.","cn":"原来如此,从各自的视角浮现出了许多论点呢。"}]},"questions":[{"q":{"jp":"<ruby>環境問題<rt>かんきょうもんだい</rt></ruby>は<ruby>人類<rt>じんるい</rt></ruby>にとってどのような<ruby>課題<rt>かだい</rt></ruby>か。","plain":"かんきょうもんだいはじんるいにとってどのようなかだいか。","romaji":"kankyou mondai wa jinrui ni totte dono you na kadai ka.","cn":"环境问题对人类是什么样的课题?"},"a":{"jp":"<ruby>避<rt>さ</rt></ruby>けて<ruby>通<rt>とお</rt></ruby>れない<ruby>課題<rt>かだい</rt></ruby>である。","plain":"さけてとおれないかだいである。","romaji":"sakete toorenai kadai de aru.","cn":"是无法回避的课题。"}},{"q":{"jp":"<ruby>先進国<rt>せんしんこく</rt></ruby>と<ruby>発展途上国<rt>はってんとじょうこく</rt></ruby>の<ruby>立場<rt>たちば</rt></ruby>はどう<ruby>異<rt>こと</rt></ruby>なるか。","plain":"せんしんこくとはってんとじょうこくのたちばはどうことなるか。","romaji":"senshinkoku to hatten-tojoukoku no tachiba wa dou kotonaru ka.","cn":"发达国家与发展中国家的立场有何不同?"},"a":{"jp":"<ruby>先進国<rt>せんしんこく</rt></ruby>は<ruby>排出<rt>はいしゅつ</rt></ruby><ruby>責任<rt>せきにん</rt></ruby>、<ruby>発展途上国<rt>はってんとじょうこく</rt></ruby>は<ruby>経済<rt>けいざい</rt></ruby><ruby>発展<rt>はってん</rt></ruby>の<ruby>権利<rt>けんり</rt></ruby>を<ruby>重視<rt>じゅうし</rt></ruby>する。","plain":"せんしんこくははいしゅつせきにん、はってんとじょうこくはけいざいはってんのけんりをじゅうしする。","romaji":"senshinkoku wa haishutsu-sekinin, hatten-tojoukoku wa keizai-hatten no kenri o juushi suru.","cn":"发达国家重视排放责任,发展中国家重视经济发展的权利。"}},{"q":{"jp":"<ruby>教育<rt>きょういく</rt></ruby>とはどのような<ruby>性質<rt>せいしつ</rt></ruby>のものだと<ruby>述<rt>の</rt></ruby>べられているか。","plain":"きょういくとはどのようなせいしつのものだとのべられているか。","romaji":"kyouiku to wa dono you na seishitsu no mono da to noberarete iru ka.","cn":"文中称教育是什么性质的事物?"},"a":{"jp":"<ruby>社会全体<rt>しゃかいぜんたい</rt></ruby>で<ruby>支<rt>ささ</rt></ruby>えるものである。","plain":"しゃかいぜんたいでささえるものである。","romaji":"shakai-zentai de sasaeru mono de aru.","cn":"是由整个社会共同支撑的事物。"}},{"q":{"jp":"<ruby>討論<rt>とうろん</rt></ruby><ruby>番組<rt>ばんぐみ</rt></ruby>で<ruby>保護者代表<rt>ほごしゃだいひょう</rt></ruby>は<ruby>何<rt>なに</rt></ruby>を<ruby>問題<rt>もんだい</rt></ruby>として<ruby>挙<rt>あ</rt></ruby>げたか。","plain":"とうろんばんぐみでほごしゃだいひょうはなにをもんだいとしてあげたか。","romaji":"touron-bangumi de hogosha-daihyou wa nani o mondai to shite ageta ka.","cn":"辩论节目中,监护人代表提出了什么问题?"},"a":{"jp":"<ruby>家庭<rt>かてい</rt></ruby>の<ruby>経済的<rt>けいざいてき</rt></ruby><ruby>負担<rt>ふたん</rt></ruby>を<ruby>挙<rt>あ</rt></ruby>げた。","plain":"かていのけいざいてきふたんをあげた。","romaji":"katei no keizai-teki futan o ageta.","cn":"提出了家庭的经济负担。"}}],"vocabulary":[{"jp":"環境問題","kana":"かんきょうもんだい","romaji":"kankyou-mondai","meaning":"环境问题","pos":"名詞"},{"jp":"人類","kana":"じんるい","romaji":"jinrui","meaning":"人类","pos":"名詞"},{"jp":"避ける","kana":"さける","romaji":"sakeru","meaning":"回避","pos":"動詞II"},{"jp":"課題","kana":"かだい","romaji":"kadai","meaning":"课题","pos":"名詞"},{"jp":"地球温暖化","kana":"ちきゅうおんだんか","romaji":"chikyuu-ondanka","meaning":"全球变暖","pos":"名詞"},{"jp":"世界各国","kana":"せかいかっこく","romaji":"sekai-kakkoku","meaning":"世界各国","pos":"名詞"},{"jp":"原因","kana":"げんいん","romaji":"gen-in","meaning":"原因","pos":"名詞"},{"jp":"対策","kana":"たいさく","romaji":"taisaku","meaning":"对策","pos":"名詞"},{"jp":"先進国","kana":"せんしんこく","romaji":"senshinkoku","meaning":"发达国家","pos":"名詞"},{"jp":"排出","kana":"はいしゅつ","romaji":"haishutsu","meaning":"排放","pos":"名詞"},{"jp":"責任","kana":"せきにん","romaji":"sekinin","meaning":"责任","pos":"名詞"},{"jp":"発展途上国","kana":"はってんとじょうこく","romaji":"hatten-tojoukoku","meaning":"发展中国家","pos":"名詞"},{"jp":"権利","kana":"けんり","romaji":"kenri","meaning":"权利","pos":"名詞"},{"jp":"論点","kana":"ろんてん","romaji":"ronten","meaning":"论点","pos":"名詞"},{"jp":"再生可能エネルギー","kana":"さいせいかのうエネルギー","romaji":"saisei-kanou enerugii","meaning":"可再生能源","pos":"名詞"},{"jp":"導入","kana":"どうにゅう","romaji":"dounyuu","meaning":"引进","pos":"名詞"},{"jp":"限界","kana":"げんかい","romaji":"genkai","meaning":"局限,极限","pos":"名詞"},{"jp":"絶える","kana":"たえる","romaji":"taeru","meaning":"断绝,中断","pos":"動詞II"},{"jp":"身近","kana":"みぢか","romaji":"midjika","meaning":"身边,贴近","pos":"な形容詞"},{"jp":"省エネ","kana":"しょうエネ","romaji":"shou-ene","meaning":"节能","pos":"名詞"},{"jp":"取り組み","kana":"とりくみ","romaji":"torikumi","meaning":"措施,着手","pos":"名詞"},{"jp":"関心","kana":"かんしん","romaji":"kanshin","meaning":"关心","pos":"名詞"},{"jp":"不可欠","kana":"ふかけつ","romaji":"fukaketsu","meaning":"不可缺","pos":"な形容詞"},{"jp":"意識","kana":"いしき","romaji":"ishiki","meaning":"意识","pos":"名詞"},{"jp":"創造性","kana":"そうぞうせい","romaji":"souzousei","meaning":"创造性","pos":"名詞"},{"jp":"主体性","kana":"しゅたいせい","romaji":"shutaisei","meaning":"主体性","pos":"名詞"},{"jp":"育成","kana":"いくせい","romaji":"ikusei","meaning":"培养","pos":"名詞"},{"jp":"個性","kana":"こせい","romaji":"kosei","meaning":"个性","pos":"名詞"},{"jp":"保護者","kana":"ほごしゃ","romaji":"hogosha","meaning":"监护人","pos":"名詞"},{"jp":"入試制度","kana":"にゅうしせいど","romaji":"nyuushi-seido","meaning":"入学考试制度","pos":"名詞"},{"jp":"論争","kana":"ろんそう","romaji":"ronsou","meaning":"论争","pos":"名詞"},{"jp":"視点","kana":"してん","romaji":"shiten","meaning":"视角","pos":"名詞"},{"jp":"使命","kana":"しめい","romaji":"shimei","meaning":"使命","pos":"名詞"},{"jp":"偏差値","kana":"へんさち","romaji":"hensachi","meaning":"偏差值","pos":"名詞"},{"jp":"公平性","kana":"こうへいせい","romaji":"kouheisei","meaning":"公平性","pos":"名詞"},{"jp":"多面的","kana":"ためんてき","romaji":"tamenteki","meaning":"多面的","pos":"な形容詞"}],"grammar":[{"pattern":"N にとって","name":"对…而言(主观立场)","explain":"\"对…而言\"。表达从某个主体的立场或角度看的判断,后接评价性内容(重要、必要、困难等)。「N」必须是有\"立场\"的主体——人、组织、国家等。错误用法:×「日本にとって五月だ」(没有评价义)。与「について」的区别:「にとって」表立场,「について」表话题。","examples":[{"jp":"<ruby>学生<rt>がくせい</rt></ruby>にとって、<ruby>図書館<rt>としょかん</rt></ruby>は<ruby>大切<rt>たいせつ</rt></ruby>な<ruby>場所<rt>ばしょ</rt></ruby>である。","plain":"がくせいにとって、としょかんはたいせつなばしょである。","cn":"对学生而言,图书馆是重要的地方。"}]},{"pattern":"N について","name":"关于…(话题)","explain":"\"关于…\"。客观地引出谈论的对象、话题。后面常接「話す・書く・考える・調べる・知る」等动词。是最中性、通用的\"关于…\"。比「に関して」口语化一些。「N についての N」可作名词修饰。","examples":[{"jp":"この<ruby>事件<rt>じけん</rt></ruby>について<ruby>詳<rt>くわ</rt></ruby>しく<ruby>説明<rt>せつめい</rt></ruby>する。","plain":"このじけんについてくわしくせつめいする。","cn":"关于这个事件详细说明。"}]},{"pattern":"N に関して","name":"关于…(书面正式)","explain":"\"关于…,有关…\"。比「について」更书面、正式,常用于报道、报告、公文。意义几乎相同,但\"硬度\"更高。「に関する N」可作名词修饰,用法同「についての N」。","examples":[{"jp":"<ruby>事故<rt>じこ</rt></ruby>の<ruby>原因<rt>げんいん</rt></ruby>に<ruby>関<rt>かん</rt></ruby>して<ruby>調査<rt>ちょうさ</rt></ruby>が<ruby>行<rt>おこな</rt></ruby>われた。","plain":"じこのげんいんにかんしてちょうさがおこなわれた。","cn":"关于事故的原因进行了调查。"}]},{"pattern":"N をめぐって","name":"围绕…(争议)","explain":"\"围绕…\"。专用于\"多方对同一对象抱持不同立场\"的争议性场景,后面常接「議論・論争・対立・争う・揉める」等冲突性词。普通的\"关于\"不能用「をめぐって」。「をめぐる N」作名词修饰,如「教育をめぐる議論」。","examples":[{"jp":"<ruby>遺産<rt>いさん</rt></ruby>をめぐって<ruby>兄弟<rt>きょうだい</rt></ruby>が<ruby>争<rt>あらそ</rt></ruby>っている。","plain":"いさんをめぐってきょうだいがあらそっている。","cn":"围绕遗产,兄弟在争执。"}]},{"pattern":"〜こそ〜なのである","name":"强调\"正是…\"","explain":"「こそ」加强对前项的指认,「なのである」做硬性断定结尾,合用形成\"正是…才是…\"的强烈论说语气。多见于论说文末段总结论点。「こそ」直接接名词或助词后,断定句尾要用「なのだ／なのである」(な形容词、名词时) 或「のだ／のである」(动词、形容词)。","examples":[{"jp":"<ruby>努力<rt>どりょく</rt></ruby>こそが<ruby>成功<rt>せいこう</rt></ruby>の<ruby>鍵<rt>かぎ</rt></ruby>なのである。","plain":"どりょくこそがせいこうのかぎなのである。","cn":"努力正是成功的关键。"}]}]},"prev":{"id":40,"title":"高級接続詞"},"next":{"id":42,"title":"根拠と論理"}}</script>
<script>
(() => {
  const data = JSON.parse(document.getElementById('lesson-data').textContent);
  const lesson = data.lesson;
  const prev = data.prev; // { id, title } | null
  const next = data.next;

  // Flatten "playable" sentences for the global play-all queue.
  // group: 'main-N' / 'sub-N' / 'dialogue' (each has its own DOM nodes)
  const playableGroups = []; // [{ groupId, items: [{ plain, el }] }]

  // ---------- Masthead / nav ----------
  const lessonNo = String(lesson.id).padStart(2, '0');
  document.title = lesson.level + ' · 第' + lesson.id + '課 — ' + stripTags(lesson.title.jp);
  document.getElementById('m-level').textContent = lesson.level + ' — Lesson ' + lessonNo;
  document.getElementById('m-title-jp').innerHTML = lesson.title.jp;
  document.getElementById('m-title-en').textContent = lesson.title.romaji + ' · ' + lesson.title.en;
  document.getElementById('m-lesson-no').textContent = '第 ' + lesson.id + ' 課';
  document.getElementById('footer-meta').textContent = '日本語 ' + lesson.level + ' · 第' + lesson.id + '課';

  const navEl = document.getElementById('lesson-nav');
  const navParts = [];
  navParts.push('<a href="index.html">← 索引</a>');
  navParts.push('<span>/</span>');
  if (prev) {
    navParts.push('<a href="lesson-' + String(prev.id).padStart(2, '0') + '.html">第' + prev.id + '課</a>');
    navParts.push('<span>/</span>');
  }
  navParts.push('<span class="current">第' + lesson.id + '課</span>');
  if (next) {
    navParts.push('<span>/</span>');
    navParts.push('<a href="lesson-' + String(next.id).padStart(2, '0') + '.html">第' + next.id + '課 →</a>');
  }
  navEl.innerHTML = navParts.join(' ');

  // ---------- Goals ----------
  const goalsList = document.getElementById('goals-list');
  if (lesson.goals && lesson.goals.length) {
    lesson.goals.forEach(g => {
      const li = document.createElement('li');
      li.textContent = g;
      goalsList.appendChild(li);
    });
  } else {
    document.getElementById('goals-block').hidden = true;
  }

  // ---------- Articles ----------
  const articlesEl = document.getElementById('articles');
  lesson.articles.forEach((article, ai) => {
    const wrap = document.createElement('article');
    wrap.className = 'article';
    const groupId = (article.kind === 'main' ? 'main' : 'sub') + '-' + ai;
    wrap.id = 'article-' + groupId;

    const meta = document.createElement('div');
    meta.className = 'article-meta';
    meta.textContent = article.kind === 'main' ? '主篇 · main reading' : '配篇 · companion reading';
    wrap.appendChild(meta);

    const h2 = document.createElement('h2');
    h2.className = 'article-title';
    h2.innerHTML = article.title.jp + '<span class="ja-small">' + escapeHtml(article.title.cn) + '</span>';
    wrap.appendChild(h2);

    const items = [];
    article.sentences.forEach((s, i) => {
      const div = document.createElement('div');
      div.className = 'sentence';
      div.dataset.group = groupId;
      div.dataset.index = String(i);
      div.innerHTML =
        '<div class="jp-text">' + s.jp + '</div>' +
        '<div class="romaji">' + escapeHtml(s.romaji) + '</div>' +
        '<div class="translation">' + escapeHtml(s.cn) + '</div>';
      wrap.appendChild(div);
      items.push({ plain: s.plain, el: div });
    });

    articlesEl.appendChild(wrap);
    playableGroups.push({ groupId, items });
  });

  // ---------- Dialogue ----------
  if (lesson.dialogue && lesson.dialogue.lines && lesson.dialogue.lines.length) {
    document.getElementById('dialogue-divider').hidden = false;
    document.getElementById('dialogue-block').hidden = false;
    const sceneEl = document.getElementById('dialogue-scene');
    sceneEl.textContent = lesson.dialogue.scene.jp + ' / ' + lesson.dialogue.scene.cn;
    const linesEl = document.getElementById('dialogue-lines');
    const items = [];
    lesson.dialogue.lines.forEach((line, i) => {
      const div = document.createElement('div');
      div.className = 'dialogue-line';
      div.dataset.group = 'dialogue';
      div.dataset.index = String(i);
      div.innerHTML =
        '<div class="speaker">' + escapeHtml(line.speaker) + '</div>' +
        '<div class="jp-text">' + line.jp + '</div>' +
        '<div class="romaji">' + escapeHtml(line.romaji) + '</div>' +
        '<div class="translation">' + escapeHtml(line.cn) + '</div>';
      linesEl.appendChild(div);
      items.push({ plain: line.plain, el: div });
    });
    playableGroups.push({ groupId: 'dialogue', items });
  }

  // ---------- Questions ----------
  if (lesson.questions && lesson.questions.length) {
    document.getElementById('questions-divider').hidden = false;
    const qBlock = document.getElementById('questions-block');
    qBlock.hidden = false;
    lesson.questions.forEach((qa, i) => {
      const div = document.createElement('div');
      div.className = 'question';
      div.innerHTML =
        '<div class="question-q">' +
          '<span class="q-mark">Q' + (i + 1) + '</span>' +
          '<div class="jp-text">' + qa.q.jp + '</div>' +
          '<div class="romaji">' + escapeHtml(qa.q.romaji) + '</div>' +
          '<div class="translation">' + escapeHtml(qa.q.cn) + '</div>' +
        '</div>' +
        '<div class="question-a">' +
          '<span class="q-mark">A</span>' +
          '<div class="jp-text">' + qa.a.jp + '</div>' +
          '<div class="romaji">' + escapeHtml(qa.a.romaji) + '</div>' +
          '<div class="translation">' + escapeHtml(qa.a.cn) + '</div>' +
          (qa.hint ? '<div class="question-hint">提示：' + escapeHtml(qa.hint) + '</div>' : '') +
        '</div>';
      qBlock.appendChild(div);
    });
  }

  // ---------- Vocabulary ----------
  const vocabGrid = document.getElementById('vocab-grid');
  lesson.vocabulary.forEach(v => {
    const div = document.createElement('div');
    div.className = 'vocab-item';
    div.innerHTML =
      '<div class="vocab-jp">' + escapeHtml(v.jp) + (v.pos ? '<span class="vocab-pos">' + escapeHtml(v.pos) + '</span>' : '') + '</div>' +
      '<div class="vocab-kana">' + escapeHtml(v.kana) + '</div>' +
      '<div class="vocab-romaji">' + escapeHtml(v.romaji) + '</div>' +
      '<div class="vocab-meaning">' + escapeHtml(v.meaning) + '</div>';
    vocabGrid.appendChild(div);
  });

  // ---------- Grammar ----------
  const grammarNotes = document.getElementById('grammar-notes');
  lesson.grammar.forEach(g => {
    const div = document.createElement('div');
    div.className = 'grammar-point';
    let ex = '';
    if (g.examples && g.examples.length) {
      ex = '<div class="grammar-examples">' +
        g.examples.map(e =>
          '<div class="grammar-example">' +
            '<div class="ex-jp">' + e.jp + '</div>' +
            '<div class="ex-cn">' + escapeHtml(e.cn) + '</div>' +
          '</div>'
        ).join('') +
        '</div>';
    }
    div.innerHTML =
      '<div><span class="grammar-pattern">' + escapeHtml(g.pattern) + '</span>' +
      '<span class="grammar-name">' + escapeHtml(g.name) + '</span></div>' +
      '<div class="grammar-explain">' + escapeHtml(g.explain) + '</div>' +
      ex;
    grammarNotes.appendChild(div);
  });

  // ---------- Toggles ----------
  document.querySelectorAll('.toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      const type = btn.dataset.toggle;
      const state = btn.dataset.state;
      document.querySelectorAll('.toggle[data-toggle="' + type + '"]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (state === 'off') document.body.classList.add('hide-' + type);
      else document.body.classList.remove('hide-' + type);
    });
  });

  // ---------- Speech ----------
  const synth = window.speechSynthesis;
  let jaVoice = null;
  const ttsStatus = document.getElementById('tts-status');
  const nowReading = document.getElementById('now-reading');
  const speedSelect = document.getElementById('speed-select');

  function pickJapaneseVoice() {
    if (!synth) return;
    const voices = synth.getVoices();
    const preferred = voices.find(v => v.lang === 'ja-JP' && /Kyoko|Otoya|O-ren|Google/i.test(v.name));
    jaVoice = preferred || voices.find(v => v.lang === 'ja-JP') || voices.find(v => v.lang.startsWith('ja'));
    if (jaVoice) {
      ttsStatus.textContent = '音声 · ' + jaVoice.name.split(' ')[0];
      ttsStatus.classList.remove('unavailable');
    } else {
      ttsStatus.textContent = '音声 · 未対応';
      ttsStatus.classList.add('unavailable');
    }
  }

  if (synth) {
    pickJapaneseVoice();
    synth.onvoiceschanged = pickJapaneseVoice;
  } else {
    ttsStatus.textContent = '音声 · 未対応';
    ttsStatus.classList.add('unavailable');
  }

  let queue = [];
  let isPlaying = false;

  function speak(text, onEnd) {
    if (!synth) { onEnd && onEnd(); return; }
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ja-JP';
    if (jaVoice) u.voice = jaVoice;
    u.rate = parseFloat(speedSelect.value);
    u.pitch = 1.0;
    u.onend = () => onEnd && onEnd();
    u.onerror = () => onEnd && onEnd();
    synth.speak(u);
  }

  function clearPlaying() {
    document.querySelectorAll('.sentence.playing, .dialogue-line.playing').forEach(s => s.classList.remove('playing'));
  }

  function findItem(groupId, index) {
    const g = playableGroups.find(g => g.groupId === groupId);
    return g ? g.items[index] : null;
  }

  function playItem(groupId, index) {
    if (!synth) return;
    synth.cancel();
    clearPlaying();
    const item = findItem(groupId, index);
    if (!item) return;
    item.el.classList.add('playing');
    nowReading.textContent = item.plain;
    speak(item.plain, () => {
      item.el.classList.remove('playing');
      if (queue.length > 0) {
        const next = queue.shift();
        playItem(next.group, next.index);
      } else {
        isPlaying = false;
        nowReading.textContent = '完了 / done';
      }
    });
  }

  document.querySelectorAll('.sentence, .dialogue-line').forEach(el => {
    el.addEventListener('click', () => {
      queue = [];
      isPlaying = true;
      playItem(el.dataset.group, parseInt(el.dataset.index, 10));
    });
  });

  document.getElementById('play-all').addEventListener('click', () => {
    if (!synth) return;
    if (isPlaying) {
      synth.cancel();
      queue = [];
      isPlaying = false;
      clearPlaying();
      nowReading.textContent = '一時停止 / paused';
      return;
    }
    queue = [];
    playableGroups.forEach(g => {
      g.items.forEach((_, i) => queue.push({ group: g.groupId, index: i }));
    });
    if (queue.length === 0) return;
    isPlaying = true;
    const first = queue.shift();
    playItem(first.group, first.index);
  });

  document.addEventListener('visibilitychange', () => {
    if (document.hidden && synth) {
      synth.cancel();
      queue = [];
      isPlaying = false;
      clearPlaying();
    }
  });

  // ---------- helpers ----------
  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
  function stripTags(s) { return String(s).replace(/<[^>]*>/g, ''); }
})();
</script>
</body>
</html>
