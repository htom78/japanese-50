<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N3 · 第32課 — 時を表す表現</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;600&family=Noto+Sans+JP:wght@400;500&family=IBM+Plex+Sans:wght@400;500&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-base: #F5F1E8;
    --bg-elevated: #FAF8F3;
    --bg-overlay: #FFFEF9;
    --fg-primary: #2A2620;
    --fg-secondary: #5C544A;
    --fg-tertiary: #8C8275;
    --border-subtle: rgba(42, 38, 32, 0.08);
    --border-default: rgba(42, 38, 32, 0.14);
    --accent: #A8895C;
    --accent-hover: #B89968;
    --accent-soft: rgba(168, 137, 92, 0.12);

    --serif-jp: "Noto Serif JP", serif;
    --sans-jp: "Noto Sans JP", sans-serif;
    --sans-en: "IBM Plex Sans", sans-serif;
    --mono: "IBM Plex Mono", monospace;

    --ease: cubic-bezier(0.4, 0, 0.2, 1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg-base);
    color: var(--fg-primary);
    font-family: var(--sans-jp);
    font-size: 14px;
    line-height: 1.75;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    min-height: 100vh;
    background-image:
      radial-gradient(at 20% 10%, rgba(168, 137, 92, 0.04) 0%, transparent 50%),
      radial-gradient(at 80% 90%, rgba(168, 137, 92, 0.03) 0%, transparent 50%);
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 64px 32px 96px;
  }

  /* Header */
  .masthead {
    border-bottom: 1px solid var(--border-default);
    padding-bottom: 24px;
    margin-bottom: 24px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 24px;
  }

  .masthead-title {
    font-family: var(--serif-jp);
    font-weight: 500;
  }

  .masthead-title .level {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--accent);
    text-transform: uppercase;
    display: block;
    margin-bottom: 6px;
  }

  .masthead-title .title-jp {
    font-size: 22px;
    line-height: 1.4;
    color: var(--fg-primary);
  }

  .masthead-title .title-en {
    font-family: var(--sans-en);
    font-size: 12px;
    color: var(--fg-tertiary);
    margin-top: 4px;
    letter-spacing: 0.02em;
  }

  .masthead-meta {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--fg-tertiary);
    text-align: right;
    line-height: 1.6;
  }

  /* Goals */
  .goals {
    background: var(--bg-elevated);
    border-left: 2px solid var(--accent);
    padding: 12px 16px;
    margin-bottom: 24px;
    border-radius: 0 2px 2px 0;
  }

  .goals-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--fg-tertiary);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .goals ul {
    margin: 0;
    padding-left: 18px;
  }

  .goals li {
    font-size: 12px;
    color: var(--fg-secondary);
    line-height: 1.7;
  }

  /* Lesson nav */
  .lesson-nav {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--fg-tertiary);
    letter-spacing: 0.05em;
  }

  .lesson-nav a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color 200ms var(--ease);
  }

  .lesson-nav a:hover { border-bottom-color: var(--accent); }

  .lesson-nav .current { color: var(--fg-secondary); }

  /* Controls */
  .controls {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 32px;
    padding: 16px;
    background: var(--bg-elevated);
    border: 1px solid var(--border-subtle);
    border-radius: 4px;
  }

  .control-group {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .control-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--fg-tertiary);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .toggle-group {
    display: inline-flex;
    border: 1px solid var(--border-default);
    border-radius: 2px;
    overflow: hidden;
  }

  .toggle {
    background: transparent;
    border: none;
    padding: 6px 12px;
    font-family: var(--sans-en);
    font-size: 12px;
    color: var(--fg-secondary);
    cursor: pointer;
    transition: all 200ms var(--ease);
    border-right: 1px solid var(--border-default);
  }

  .toggle:last-child { border-right: none; }

  .toggle:hover { color: var(--fg-primary); }

  .toggle.active {
    background: var(--accent);
    color: var(--bg-overlay);
  }

  .speed-select {
    background: transparent;
    border: 1px solid var(--border-default);
    padding: 6px 8px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--fg-secondary);
    border-radius: 2px;
    cursor: pointer;
  }

  /* Audio control */
  .audio-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 20px 24px;
    background: var(--bg-overlay);
    border: 1px solid var(--border-default);
    border-radius: 4px;
    margin-bottom: 40px;
  }

  .play-btn {
    background: var(--fg-primary);
    color: var(--bg-overlay);
    border: none;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 200ms var(--ease);
    flex-shrink: 0;
  }

  .play-btn:hover { background: var(--accent); }

  .play-btn svg { width: 14px; height: 14px; }

  .audio-info {
    flex: 1;
    min-width: 0;
  }

  .audio-info-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--fg-tertiary);
    margin-bottom: 2px;
  }

  .audio-info-text {
    font-family: var(--sans-jp);
    font-size: 13px;
    color: var(--fg-secondary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Article */
  .article-meta {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--fg-tertiary);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .article-title {
    font-family: var(--serif-jp);
    font-size: 18px;
    font-weight: 500;
    color: var(--fg-primary);
    margin-bottom: 20px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border-subtle);
  }

  .article-title .ja-small {
    font-size: 12px;
    color: var(--fg-tertiary);
    margin-left: 12px;
    font-weight: 400;
    font-family: var(--sans-en);
    font-style: italic;
  }

  .article + .article {
    margin-top: 48px;
  }

  /* Sentence */
  .sentence {
    padding: 14px 0;
    border-bottom: 1px solid var(--border-subtle);
    cursor: pointer;
    transition: background 200ms var(--ease);
    margin: 0 -16px;
    padding-left: 16px;
    padding-right: 16px;
    border-radius: 2px;
    position: relative;
  }

  .sentence:hover { background: var(--accent-soft); }
  .sentence.playing { background: var(--accent-soft); }

  .sentence.playing::before {
    content: '';
    position: absolute;
    left: 0;
    top: 14px;
    bottom: 14px;
    width: 2px;
    background: var(--accent);
  }

  .jp-text {
    font-family: var(--serif-jp);
    font-size: 18px;
    line-height: 2.1;
    color: var(--fg-primary);
    letter-spacing: 0.02em;
  }

  /* Furigana via ruby */
  ruby { ruby-position: over; }

  rt {
    font-family: var(--sans-jp);
    font-size: 0.5em;
    color: var(--fg-tertiary);
    font-weight: 400;
    letter-spacing: 0;
    transition: opacity 300ms var(--ease);
  }

  body.hide-furigana rt { opacity: 0; }

  .romaji {
    font-family: var(--sans-en);
    font-style: italic;
    font-size: 12px;
    color: var(--fg-tertiary);
    line-height: 1.6;
    margin-top: 6px;
    letter-spacing: 0.01em;
    transition: opacity 300ms var(--ease);
  }

  body.hide-romaji .romaji { display: none; }

  .translation {
    font-family: var(--sans-jp);
    font-size: 12px;
    color: var(--fg-secondary);
    margin-top: 6px;
    line-height: 1.6;
  }

  body.hide-translation .translation { display: none; }

  /* Dialogue */
  .dialogue-scene {
    font-size: 12px;
    color: var(--fg-tertiary);
    font-style: italic;
    margin-bottom: 16px;
    padding: 8px 12px;
    background: var(--bg-elevated);
    border-radius: 2px;
  }

  .dialogue-line { padding: 12px 0 12px 16px; border-bottom: 1px solid var(--border-subtle); border-left: 2px solid transparent; cursor: pointer; transition: all 200ms var(--ease); margin: 0 -16px; padding-right: 16px; }
  .dialogue-line:hover { background: var(--accent-soft); border-left-color: var(--accent); }
  .dialogue-line.playing { background: var(--accent-soft); border-left-color: var(--accent); }

  .speaker {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  /* Questions */
  .question {
    padding: 16px 0;
    border-bottom: 1px solid var(--border-subtle);
  }

  .question-q { margin-bottom: 8px; }
  .question-a { padding-left: 16px; border-left: 2px solid var(--accent-soft); margin-top: 6px; }
  .q-mark { font-family: var(--mono); font-size: 11px; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; display: block; }
  .question-hint {
    font-family: var(--sans-jp);
    font-size: 11px;
    color: var(--fg-tertiary);
    margin-top: 6px;
    font-style: italic;
  }

  /* Notes section */
  .section-divider {
    margin: 64px 0 32px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .section-divider::before,
  .section-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border-default);
  }

  .section-divider-text {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--fg-tertiary);
  }

  .vocab-grid { display: grid; grid-template-columns: 1fr; gap: 0; }

  .vocab-item {
    display: grid;
    grid-template-columns: minmax(80px, 0.9fr) minmax(100px, 1fr) minmax(60px, 0.5fr) 2fr;
    gap: 16px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border-subtle);
    align-items: baseline;
  }

  .vocab-jp { font-family: var(--serif-jp); font-size: 15px; color: var(--fg-primary); }
  .vocab-kana { font-family: var(--sans-jp); font-size: 12px; color: var(--fg-secondary); }
  .vocab-romaji { font-family: var(--sans-en); font-style: italic; font-size: 12px; color: var(--fg-tertiary); }
  .vocab-meaning { font-family: var(--sans-jp); font-size: 13px; color: var(--fg-secondary); }
  .vocab-pos { font-family: var(--mono); font-size: 9px; color: var(--accent); margin-left: 6px; letter-spacing: 0.05em; }

  .grammar-point { padding: 18px 0; border-bottom: 1px solid var(--border-subtle); }
  .grammar-pattern { font-family: var(--mono); font-size: 13px; color: var(--accent); background: var(--accent-soft); padding: 2px 8px; border-radius: 2px; display: inline-block; margin-bottom: 8px; }
  .grammar-name { font-family: var(--sans-jp); font-size: 12px; color: var(--fg-tertiary); margin-left: 8px; }
  .grammar-explain { font-family: var(--sans-jp); font-size: 13px; color: var(--fg-secondary); line-height: 1.75; margin-bottom: 10px; }
  .grammar-examples { background: var(--bg-elevated); padding: 10px 14px; border-radius: 2px; font-size: 13px; }
  .grammar-example { padding: 4px 0; }
  .grammar-example .ex-jp { font-family: var(--serif-jp); color: var(--fg-primary); }
  .grammar-example .ex-cn { font-size: 11px; color: var(--fg-tertiary); margin-top: 2px; }

  /* Footer */
  .footer {
    margin-top: 80px;
    padding-top: 24px;
    border-top: 1px solid var(--border-default);
    font-family: var(--mono);
    font-size: 10px;
    color: var(--fg-tertiary);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    display: flex;
    justify-content: space-between;
  }

  .tts-status { font-family: var(--mono); font-size: 10px; color: var(--fg-tertiary); letter-spacing: 0.05em; }
  .tts-status.unavailable { color: #8B4513; }

  @media (max-width: 600px) {
    .container { padding: 40px 20px 64px; }
    .masthead { flex-direction: column; align-items: flex-start; }
    .masthead-meta { text-align: left; }
    .jp-text { font-size: 17px; }
    .vocab-item { grid-template-columns: 1fr; gap: 4px; padding: 12px 0; }
    .controls { flex-direction: column; align-items: flex-start; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition-duration: 0.01ms !important; }
  }
</style>
</head>

工攒了旅游资金。"},"hint":"注意「うちに」(主语主动趁机) vs「間に」(背景某事发生)。"},{"q":{"jp":"<ruby>母<rt>はは</rt></ruby>から<ruby>電話<rt>でんわ</rt></ruby>がかかってきたとき、<ruby>主人公<rt>しゅじんこう</rt></ruby>は<ruby>何<rt>なに</rt></ruby>をしていましたか。","plain":"ははからでんわがかかってきたとき、しゅじんこうはなにをしていましたか。","romaji":"haha kara denwa ga kakatte kita toki, shujinkou wa nani o shiteimashita ka.","cn":"母亲打电话来时，主人公在做什么？"},"a":{"jp":"ちょうど<ruby>夕食<rt>ゆうしょく</rt></ruby>を<ruby>食<rt>た</rt></ruby>べているところでした。","plain":"ちょうどゆうしょくをたべているところでした。","romaji":"choudo yuushoku o tabeteiru tokoro deshita.","cn":"正在吃晚饭。"}},{"q":{"jp":"<ruby>智子<rt>ともこ</rt></ruby>さんは<ruby>電話<rt>でんわ</rt></ruby>のとき<ruby>何<rt>なに</rt></ruby>をしているところでしたか。","plain":"ともこさんはでんわのときなにをしているところでしたか。","romaji":"Tomoko-san wa denwa no toki nani o shiteiru tokoro deshita ka.","cn":"智子接电话时正在做什么？"},"a":{"jp":"<ruby>仕事<rt>しごと</rt></ruby>が<ruby>終<rt>お</rt></ruby>わったところで、<ruby>家<rt>いえ</rt></ruby>に<ruby>帰<rt>かえ</rt></ruby>るところでした。","plain":"しごとがおわったところで、いえにかえるところでした。","romaji":"shigoto ga owatta tokoro de, ie ni kaeru tokoro deshita.","cn":"刚下班，正要回家。"}}],"vocabulary":[{"jp":"若い","kana":"わかい","romaji":"wakai","meaning":"年轻","pos":"い形容詞"},{"jp":"元気","kana":"げんき","romaji":"genki","meaning":"健康；有精神","pos":"な形容詞"},{"jp":"世界","kana":"せかい","romaji":"sekai","meaning":"世界","pos":"名詞"},{"jp":"各地","kana":"かくち","romaji":"kakuchi","meaning":"各地","pos":"名詞"},{"jp":"旅","kana":"たび","romaji":"tabi","meaning":"旅行","pos":"名詞"},{"jp":"記憶力","kana":"きおくりょく","romaji":"kioku-ryoku","meaning":"记忆力","pos":"名詞"},{"jp":"衰えます","kana":"おとろえます","romaji":"otoroemasu","meaning":"衰退","pos":"動詞II"},{"jp":"言語","kana":"げんご","romaji":"gengo","meaning":"语言","pos":"名詞"},{"jp":"学びます","kana":"まなびます","romaji":"manabimasu","meaning":"学习","pos":"動詞I"},{"jp":"大切","kana":"たいせつ","romaji":"taisetsu","meaning":"重要","pos":"な形容詞"},{"jp":"働き始めます","kana":"はたらきはじめます","romaji":"hatarakihajimemasu","meaning":"开始工作","pos":"動詞II"},{"jp":"自由","kana":"じゆう","romaji":"jiyuu","meaning":"自由","pos":"な形容詞"},{"jp":"時代","kana":"じだい","romaji":"jidai","meaning":"时代","pos":"名詞"},{"jp":"夏休み","kana":"なつやすみ","romaji":"natsu-yasumi","meaning":"暑假","pos":"名詞"},{"jp":"アルバイト","kana":"アルバイト","romaji":"arubaito","meaning":"打工","pos":"名詞"},{"jp":"旅行","kana":"りょこう","romaji":"ryokou","meaning":"旅行","pos":"名詞"},{"jp":"資金","kana":"しきん","romaji":"shikin","meaning":"资金","pos":"名詞"},{"jp":"貯めます","kana":"ためます","romaji":"tamemasu","meaning":"储蓄","pos":"動詞II"},{"jp":"授業","kana":"じゅぎょう","romaji":"jugyou","meaning":"课程","pos":"名詞"},{"jp":"計画","kana":"けいかく","romaji":"keikaku","meaning":"计划","pos":"名詞"},{"jp":"立てます","kana":"たてます","romaji":"tatemasu","meaning":"制定；立","pos":"動詞II"},{"jp":"後悔します","kana":"こうかいします","romaji":"koukai shimasu","meaning":"后悔","pos":"動詞III"},{"jp":"夕方","kana":"ゆうがた","romaji":"yuugata","meaning":"傍晚","pos":"名詞"},{"jp":"かかります","kana":"かかります","romaji":"kakarimasu","meaning":"（电话）打来；花费","pos":"動詞I"},{"jp":"頼みます","kana":"たのみます","romaji":"tanomimasu","meaning":"请求；委托","pos":"動詞I"},{"jp":"到着します","kana":"とうちゃくします","romaji":"touchaku shimasu","meaning":"到达","pos":"動詞III"},{"jp":"タイミング","kana":"タイミング","romaji":"taimingu","meaning":"时机","pos":"名詞"},{"jp":"お土産","kana":"おみやげ","romaji":"o-miyage","meaning":"土特产；伴手礼","pos":"名詞"},{"jp":"包み","kana":"つつみ","romaji":"tsutsumi","meaning":"包裹；包装","pos":"名詞"},{"jp":"開けます","kana":"あけます","romaji":"akemasu","meaning":"打开","pos":"動詞II"},{"jp":"飛びます","kana":"とびます","romaji":"tobimasu","meaning":"飞；冲","pos":"動詞I"},{"jp":"賑やか","kana":"にぎやか","romaji":"nigiyaka","meaning":"热闹","pos":"な形容詞"},{"jp":"過ごします","kana":"すごします","romaji":"sugoshimasu","meaning":"度过","pos":"動詞I"},{"jp":"貴重","kana":"きちょう","romaji":"kichou","meaning":"宝贵","pos":"な形容詞"},{"jp":"シャワー","kana":"シャワー","romaji":"shawaa","meaning":"淋浴","pos":"名詞"},{"jp":"浴びます","kana":"あびます","romaji":"abimasu","meaning":"淋（浴）","pos":"動詞II"},{"jp":"駅前","kana":"えきまえ","romaji":"ekimae","meaning":"车站前","pos":"名詞"},{"jp":"レストラン","kana":"レストラン","romaji":"resutoran","meaning":"餐厅","pos":"名詞"},{"jp":"了解","kana":"りょうかい","romaji":"ryoukai","meaning":"了解","pos":"名詞"}],"grammar":[{"pattern":"辞書形/ない形/Aい/Naな/Nの + うちに","name":"趁...还（没）...","explain":"表示在某状态变化前，趁机做某事。强调说话人主动利用此时机。「Vている+うちに」表示在做某事过程中状态发生变化（雪が降っているうちに止んだ）。「Vないうちに」表示趁还没...就做（暗くならないうちに帰ろう）。「Aい/Naな/Nの+うちに」表示趁某状态时（若いうちに、元気なうちに、学生のうちに）。重点：「うちに」侧重主动趁机，主语通常是说话人。","examples":[{"jp":"<ruby>暗<rt>くら</rt></ruby>くならないうちに<ruby>帰<rt>かえ</rt></ruby>ろう。","plain":"くらくならないうちにかえろう。","cn":"趁还没黑回去吧。"},{"jp":"<ruby>熱<rt>あつ</rt></ruby>いうちに<ruby>食<rt>た</rt></ruby>べてください。","plain":"あついうちにたべてください。","cn":"请趁热吃。"}]},{"pattern":"V ている / Nの + 間に","name":"在...期间内（背景某事发生）","explain":"表示在某段时间内某事发生。与「うちに」的核心区别：「間に」是客观时间段，背景某事自然发生，主语常不同；「うちに」侧重主动趁机会做事。「子供が寝ている間に掃除した」（孩子睡觉时打扫了）。「間」（无に）表整段时间，「間に」表段内某瞬间。N+の+間に：「夏休みの間に」「留守の間に」。","examples":[{"jp":"<ruby>留守<rt>るす</rt></ruby>の<ruby>間<rt>あいだ</rt></ruby>に<ruby>泥棒<rt>どろぼう</rt></ruby>が<ruby>入<rt>はい</rt></ruby>った。","plain":"るすのあいだにどろぼうがはいった。","cn":"不在家期间小偷进来了。"},{"jp":"<ruby>夏休<rt>なつやす</rt></ruby>みの<ruby>間<rt>あいだ</rt></ruby>に<ruby>本<rt>ほん</rt></ruby>を<ruby>十冊<rt>じゅっさつ</rt></ruby><ruby>読<rt>よ</rt></ruby>んだ。","plain":"なつやすみのあいだにほんをじゅっさつよんだ。","cn":"暑假期间读了十本书。"}]},{"pattern":"V 辞書形 + ところ","name":"正要...（即将做）","explain":"表示动作即将发生，\"就要...\". 「これから〜するところだ」是典型搭配。和「ようとしている」相近。例：「今出かけるところです」(现在正要出门)。注意是\"还没开始做\"。","examples":[{"jp":"<ruby>今<rt>いま</rt></ruby><ruby>家<rt>いえ</rt></ruby>を<ruby>出<rt>で</rt></ruby>るところです。","plain":"いまいえをでるところです。","cn":"现在正要出门。"},{"jp":"ちょうど<ruby>始<rt>はじ</rt></ruby>めるところだ。","plain":"ちょうどはじめるところだ。","cn":"正要开始。"}]},{"pattern":"V ている + ところ","name":"正在...（动作进行中）","explain":"表示动作正在进行，强调\"现在这一刻在做\". 比单纯的「〜ている」更明确指当下时刻。例：「今、食べているところです」(我现在正在吃)。后接其他事件常用「ところに/ところへ+別の動作」：「食べているところに電話がかかってきた」(正吃饭时电话来了)。","examples":[{"jp":"<ruby>今<rt>いま</rt></ruby>レポートを<ruby>書<rt>か</rt></ruby>いているところです。","plain":"いまレポートをかいているところです。","cn":"现在正在写报告。"},{"jp":"<ruby>会議<rt>かいぎ</rt></ruby>をしているところに<ruby>社長<rt>しゃちょう</rt></ruby>が<ruby>来<rt>き</rt></ruby>た。","plain":"かいぎをしているところにしゃちょうがきた。","cn":"正开会时社长来了。"}]},{"pattern":"V た形 + ところ","name":"刚刚...（动作刚完成）","explain":"表示动作刚刚完成，\"刚...\". 强调时间上的\"刚刚\". 和「〜たばかり」相近，但「ばかり」可指较长时间感觉上的\"刚才\"，「たところ」严格指时间紧接。「今帰ったところです」(我刚回来)。后接「で/に」表\"在那个时间点上\"：「食事が終わったところで電話が来た」(刚吃完饭电话来了)。","examples":[{"jp":"ちょうど<ruby>仕事<rt>しごと</rt></ruby>が<ruby>終<rt>お</rt></ruby>わったところです。","plain":"ちょうどしごとがおわったところです。","cn":"刚下班。"},{"jp":"<ruby>今<rt>いま</rt></ruby><ruby>着<rt>つ</rt></ruby>いたところだ。","plain":"いまついたところだ。","cn":"刚到。"}]}]},"prev":{"id":31,"title":"接続表現②（同時・状態）"},"next":{"id":33,"title":"目的の表現"}}</script>
<script>
(() => {
  const data = JSON.parse(document.getElementById('lesson-data').textContent);
  const lesson = data.lesson;
  const prev = data.prev; // { id, title } | null
  const next = data.next;

  // Flatten "playable" sentences for the global play-all queue.
  // group: 'main-N' / 'sub-N' / 'dialogue' (each has its own DOM nodes)
  const playableGroups = []; // [{ groupId, items: [{ plain, el }] }]

  // ---------- Masthead / nav ----------
  const lessonNo = String(lesson.id).padStart(2, '0');
  document.title = lesson.level + ' · 第' + lesson.id + '課 — ' + stripTags(lesson.title.jp);
  document.getElementById('m-level').textContent = lesson.level + ' — Lesson ' + lessonNo;
  document.getElementById('m-title-jp').innerHTML = lesson.title.jp;
  document.getElementById('m-title-en').textContent = lesson.title.romaji + ' · ' + lesson.title.en;
  document.getElementById('m-lesson-no').textContent = '第 ' + lesson.id + ' 課';
  document.getElementById('footer-meta').textContent = '日本語 ' + lesson.level + ' · 第' + lesson.id + '課';

  const navEl = document.getElementById('lesson-nav');
  const navParts = [];
  navParts.push('<a href="index.html">← 索引</a>');
  navParts.push('<span>/</span>');
  if (prev) {
    navParts.push('<a href="lesson-' + String(prev.id).padStart(2, '0') + '.html">第' + prev.id + '課</a>');
    navParts.push('<span>/</span>');
  }
  navParts.push('<span class="current">第' + lesson.id + '課</span>');
  if (next) {
    navParts.push('<span>/</span>');
    navParts.push('<a href="lesson-' + String(next.id).padStart(2, '0') + '.html">第' + next.id + '課 →</a>');
  }
  navEl.innerHTML = navParts.join(' ');

  // ---------- Goals ----------
  const goalsList = document.getElementById('goals-list');
  if (lesson.goals && lesson.goals.length) {
    lesson.goals.forEach(g => {
      const li = document.createElement('li');
      li.textContent = g;
      goalsList.appendChild(li);
    });
  } else {
    document.getElementById('goals-block').hidden = true;
  }

  // ---------- Articles ----------
  const articlesEl = document.getElementById('articles');
  lesson.articles.forEach((article, ai) => {
    const wrap = document.createElement('article');
    wrap.className = 'article';
    const groupId = (article.kind === 'main' ? 'main' : 'sub') + '-' + ai;
    wrap.id = 'article-' + groupId;

    const meta = document.createElement('div');
    meta.className = 'article-meta';
    meta.textContent = article.kind === 'main' ? '主篇 · main reading' : '配篇 · companion reading';
    wrap.appendChild(meta);

    const h2 = document.createElement('h2');
    h2.className = 'article-title';
    h2.innerHTML = article.title.jp + '<span class="ja-small">' + escapeHtml(article.title.cn) + '</span>';
    wrap.appendChild(h2);

    const items = [];
    article.sentences.forEach((s, i) => {
      const div = document.createElement('div');
      div.className = 'sentence';
      div.dataset.group = groupId;
      div.dataset.index = String(i);
      div.innerHTML =
        '<div class="jp-text">' + s.jp + '</div>' +
        '<div class="romaji">' + escapeHtml(s.romaji) + '</div>' +
        '<div class="translation">' + escapeHtml(s.cn) + '</div>';
      wrap.appendChild(div);
      items.push({ plain: s.plain, el: div });
    });

    articlesEl.appendChild(wrap);
    playableGroups.push({ groupId, items });
  });

  // ---------- Dialogue ----------
  if (lesson.dialogue && lesson.dialogue.lines && lesson.dialogue.lines.length) {
    document.getElementById('dialogue-divider').hidden = false;
    document.getElementById('dialogue-block').hidden = false;
    const sceneEl = document.getElementById('dialogue-scene');
    sceneEl.textContent = lesson.dialogue.scene.jp + ' / ' + lesson.dialogue.scene.cn;
    const linesEl = document.getElementById('dialogue-lines');
    const items = [];
    lesson.dialogue.lines.forEach((line, i) => {
      const div = document.createElement('div');
      div.className = 'dialogue-line';
      div.dataset.group = 'dialogue';
      div.dataset.index = String(i);
      div.innerHTML =
        '<div class="speaker">' + escapeHtml(line.speaker) + '</div>' +
        '<div class="jp-text">' + line.jp + '</div>' +
        '<div class="romaji">' + escapeHtml(line.romaji) + '</div>' +
        '<div class="translation">' + escapeHtml(line.cn) + '</div>';
      linesEl.appendChild(div);
      items.push({ plain: line.plain, el: div });
    });
    playableGroups.push({ groupId: 'dialogue', items });
  }

  // ---------- Questions ----------
  if (lesson.questions && lesson.questions.length) {
    document.getElementById('questions-divider').hidden = false;
    const qBlock = document.getElementById('questions-block');
    qBlock.hidden = false;
    lesson.questions.forEach((qa, i) => {
      const div = document.createElement('div');
      div.className = 'question';
      div.innerHTML =
        '<div class="question-q">' +
          '<span class="q-mark">Q' + (i + 1) + '</span>' +
          '<div class="jp-text">' + qa.q.jp + '</div>' +
          '<div class="romaji">' + escapeHtml(qa.q.romaji) + '</div>' +
          '<div class="translation">' + escapeHtml(qa.q.cn) + '</div>' +
        '</div>' +
        '<div class="question-a">' +
          '<span class="q-mark">A</span>' +
          '<div class="jp-text">' + qa.a.jp + '</div>' +
          '<div class="romaji">' + escapeHtml(qa.a.romaji) + '</div>' +
          '<div class="translation">' + escapeHtml(qa.a.cn) + '</div>' +
          (qa.hint ? '<div class="question-hint">提示：' + escapeHtml(qa.hint) + '</div>' : '') +
        '</div>';
      qBlock.appendChild(div);
    });
  }

  // ---------- Vocabulary ----------
  const vocabGrid = document.getElementById('vocab-grid');
  lesson.vocabulary.forEach(v => {
    const div = document.createElement('div');
    div.className = 'vocab-item';
    div.innerHTML =
      '<div class="vocab-jp">' + escapeHtml(v.jp) + (v.pos ? '<span class="vocab-pos">' + escapeHtml(v.pos) + '</span>' : '') + '</div>' +
      '<div class="vocab-kana">' + escapeHtml(v.kana) + '</div>' +
      '<div class="vocab-romaji">' + escapeHtml(v.romaji) + '</div>' +
      '<div class="vocab-meaning">' + escapeHtml(v.meaning) + '</div>';
    vocabGrid.appendChild(div);
  });

  // ---------- Grammar ----------
  const grammarNotes = document.getElementById('grammar-notes');
  lesson.grammar.forEach(g => {
    const div = document.createElement('div');
    div.className = 'grammar-point';
    let ex = '';
    if (g.examples && g.examples.length) {
      ex = '<div class="grammar-examples">' +
        g.examples.map(e =>
          '<div class="grammar-example">' +
            '<div class="ex-jp">' + e.jp + '</div>' +
            '<div class="ex-cn">' + escapeHtml(e.cn) + '</div>' +
          '</div>'
        ).join('') +
        '</div>';
    }
    div.innerHTML =
      '<div><span class="grammar-pattern">' + escapeHtml(g.pattern) + '</span>' +
      '<span class="grammar-name">' + escapeHtml(g.name) + '</span></div>' +
      '<div class="grammar-explain">' + escapeHtml(g.explain) + '</div>' +
      ex;
    grammarNotes.appendChild(div);
  });

  // ---------- Toggles ----------
  document.querySelectorAll('.toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      const type = btn.dataset.toggle;
      const state = btn.dataset.state;
      document.querySelectorAll('.toggle[data-toggle="' + type + '"]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (state === 'off') document.body.classList.add('hide-' + type);
      else document.body.classList.remove('hide-' + type);
    });
  });

  // ---------- Speech ----------
  const synth = window.speechSynthesis;
  let jaVoice = null;
  const ttsStatus = document.getElementById('tts-status');
  const nowReading = document.getElementById('now-reading');
  const speedSelect = document.getElementById('speed-select');

  function pickJapaneseVoice() {
    if (!synth) return;
    const voices = synth.getVoices();
    const preferred = voices.find(v => v.lang === 'ja-JP' && /Kyoko|Otoya|O-ren|Google/i.test(v.name));
    jaVoice = preferred || voices.find(v => v.lang === 'ja-JP') || voices.find(v => v.lang.startsWith('ja'));
    if (jaVoice) {
      ttsStatus.textContent = '音声 · ' + jaVoice.name.split(' ')[0];
      ttsStatus.classList.remove('unavailable');
    } else {
      ttsStatus.textContent = '音声 · 未対応';
      ttsStatus.classList.add('unavailable');
    }
  }

  if (synth) {
    pickJapaneseVoice();
    synth.onvoiceschanged = pickJapaneseVoice;
  } else {
    ttsStatus.textContent = '音声 · 未対応';
    ttsStatus.classList.add('unavailable');
  }

  let queue = [];
  let isPlaying = false;

  function speak(text, onEnd) {
    if (!synth) { onEnd && onEnd(); return; }
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ja-JP';
    if (jaVoice) u.voice = jaVoice;
    u.rate = parseFloat(speedSelect.value);
    u.pitch = 1.0;
    u.onend = () => onEnd && onEnd();
    u.onerror = () => onEnd && onEnd();
    synth.speak(u);
  }

  function clearPlaying() {
    document.querySelectorAll('.sentence.playing, .dialogue-line.playing').forEach(s => s.classList.remove('playing'));
  }

  function findItem(groupId, index) {
    const g = playableGroups.find(g => g.groupId === groupId);
    return g ? g.items[index] : null;
  }

  function playItem(groupId, index) {
    if (!synth) return;
    synth.cancel();
    clearPlaying();
    const item = findItem(groupId, index);
    if (!item) return;
    item.el.classList.add('playing');
    nowReading.textContent = item.plain;
    speak(item.plain, () => {
      item.el.classList.remove('playing');
      if (queue.length > 0) {
        const next = queue.shift();
        playItem(next.group, next.index);
      } else {
        isPlaying = false;
        nowReading.textContent = '完了 / done';
      }
    });
  }

  document.querySelectorAll('.sentence, .dialogue-line').forEach(el => {
    el.addEventListener('click', () => {
      queue = [];
      isPlaying = true;
      playItem(el.dataset.group, parseInt(el.dataset.index, 10));
    });
  });

  document.getElementById('play-all').addEventListener('click', () => {
    if (!synth) return;
    if (isPlaying) {
      synth.cancel();
      queue = [];
      isPlaying = false;
      clearPlaying();
      nowReading.textContent = '一時停止 / paused';
      return;
    }
    queue = [];
    playableGroups.forEach(g => {
      g.items.forEach((_, i) => queue.push({ group: g.groupId, index: i }));
    });
    if (queue.length === 0) return;
    isPlaying = true;
    const first = queue.shift();
    playItem(first.group, first.index);
  });

  document.addEventListener('visibilitychange', () => {
    if (document.hidden && synth) {
      synth.cancel();
      queue = [];
      isPlaying = false;
      clearPlaying();
    }
  });

  // ---------- helpers ----------
  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
  function stripTags(s) { return String(s).replace(/<[^>]*>/g, ''); }
})();
</script>
</body>
</html>
