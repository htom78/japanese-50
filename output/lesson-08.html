<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N5 · 第8課 — 過去</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;600&family=Noto+Sans+JP:wght@400;500&family=IBM+Plex+Sans:wght@400;500&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-base: #F5F1E8;
    --bg-elevated: #FAF8F3;
    --bg-overlay: #FFFEF9;
    --fg-primary: #2A2620;
    --fg-secondary: #5C544A;
    --fg-tertiary: #8C8275;
    --border-subtle: rgba(42, 38, 32, 0.08);
    --border-default: rgba(42, 38, 32, 0.14);
    --accent: #A8895C;
    --accent-hover: #B89968;
    --accent-soft: rgba(168, 137, 92, 0.12);

    --serif-jp: "Noto Serif JP", serif;
    --sans-jp: "Noto Sans JP", sans-serif;
    --sans-en: "IBM Plex Sans", sans-serif;
    --mono: "IBM Plex Mono", monospace;

    --ease: cubic-bezier(0.4, 0, 0.2, 1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg-base);
    color: var(--fg-primary);
    font-family: var(--sans-jp);
    font-size: 14px;
    line-height: 1.75;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    min-height: 100vh;
    background-image:
      radial-gradient(at 20% 10%, rgba(168, 137, 92, 0.04) 0%, transparent 50%),
      radial-gradient(at 80% 90%, rgba(168, 137, 92, 0.03) 0%, transparent 50%);
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 64px 32px 96px;
  }

  /* Header */
  .masthead {
    border-bottom: 1px solid var(--border-default);
    padding-bottom: 24px;
    margin-bottom: 24px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 24px;
  }

  .masthead-title {
    font-family: var(--serif-jp);
    font-weight: 500;
  }

  .masthead-title .level {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--accent);
    text-transform: uppercase;
    display: block;
    margin-bottom: 6px;
  }

  .masthead-title .title-jp {
    font-size: 22px;
    line-height: 1.4;
    color: var(--fg-primary);
  }

  .masthead-title .title-en {
    font-family: var(--sans-en);
    font-size: 12px;
    color: var(--fg-tertiary);
    margin-top: 4px;
    letter-spacing: 0.02em;
  }

  .masthead-meta {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--fg-tertiary);
    text-align: right;
    line-height: 1.6;
  }

  /* Goals */
  .goals {
    background: var(--bg-elevated);
    border-left: 2px solid var(--accent);
    padding: 12px 16px;
    margin-bottom: 24px;
    border-radius: 0 2px 2px 0;
  }

  .goals-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--fg-tertiary);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .goals ul {
    margin: 0;
    padding-left: 18px;
  }

  .goals li {
    font-size: 12px;
    color: var(--fg-secondary);
    line-height: 1.7;
  }

  /* Lesson nav */
  .lesson-nav {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--fg-tertiary);
    letter-spacing: 0.05em;
  }

  .lesson-nav a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color 200ms var(--ease);
  }

  .lesson-nav a:hover { border-bottom-color: var(--accent); }

  .lesson-nav .current { color: var(--fg-secondary); }

  /* Controls */
  .controls {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 32px;
    padding: 16px;
    background: var(--bg-elevated);
    border: 1px solid var(--border-subtle);
    border-radius: 4px;
  }

  .control-group {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .control-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--fg-tertiary);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .toggle-group {
    display: inline-flex;
    border: 1px solid var(--border-default);
    border-radius: 2px;
    overflow: hidden;
  }

  .toggle {
    background: transparent;
    border: none;
    padding: 6px 12px;
    font-family: var(--sans-en);
    font-size: 12px;
    color: var(--fg-secondary);
    cursor: pointer;
    transition: all 200ms var(--ease);
    border-right: 1px solid var(--border-default);
  }

  .toggle:last-child { border-right: none; }

  .toggle:hover { color: var(--fg-primary); }

  .toggle.active {
    background: var(--accent);
    color: var(--bg-overlay);
  }

  .speed-select {
    background: transparent;
    border: 1px solid var(--border-default);
    padding: 6px 8px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--fg-secondary);
    border-radius: 2px;
    cursor: pointer;
  }

  /* Audio control */
  .audio-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 20px 24px;
    background: var(--bg-overlay);
    border: 1px solid var(--border-default);
    border-radius: 4px;
    margin-bottom: 40px;
  }

  .play-btn {
    background: var(--fg-primary);
    color: var(--bg-overlay);
    border: none;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 200ms var(--ease);
    flex-shrink: 0;
  }

  .play-btn:hover { background: var(--accent); }

  .play-btn svg { width: 14px; height: 14px; }

  .audio-info {
    flex: 1;
    min-width: 0;
  }

  .audio-info-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--fg-tertiary);
    margin-bottom: 2px;
  }

  .audio-info-text {
    font-family: var(--sans-jp);
    font-size: 13px;
    color: var(--fg-secondary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Article */
  .article-meta {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--fg-tertiary);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .article-title {
    font-family: var(--serif-jp);
    font-size: 18px;
    font-weight: 500;
    color: var(--fg-primary);
    margin-bottom: 20px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border-subtle);
  }

  .article-title .ja-small {
    font-size: 12px;
    color: var(--fg-tertiary);
    margin-left: 12px;
    font-weight: 400;
    font-family: var(--sans-en);
    font-style: italic;
  }

  .article + .article {
    margin-top: 48px;
  }

  /* Sentence */
  .sentence {
    padding: 14px 0;
    border-bottom: 1px solid var(--border-subtle);
    cursor: pointer;
    transition: background 200ms var(--ease);
    margin: 0 -16px;
    padding-left: 16px;
    padding-right: 16px;
    border-radius: 2px;
    position: relative;
  }

  .sentence:hover { background: var(--accent-soft); }
  .sentence.playing { background: var(--accent-soft); }

  .sentence.playing::before {
    content: '';
    position: absolute;
    left: 0;
    top: 14px;
    bottom: 14px;
    width: 2px;
    background: var(--accent);
  }

  .jp-text {
    font-family: var(--serif-jp);
    font-size: 18px;
    line-height: 2.1;
    color: var(--fg-primary);
    letter-spacing: 0.02em;
  }

  /* Furigana via ruby */
  ruby { ruby-position: over; }

  rt {
    font-family: var(--sans-jp);
    font-size: 0.5em;
    color: var(--fg-tertiary);
    font-weight: 400;
    letter-spacing: 0;
    transition: opacity 300ms var(--ease);
  }

  body.hide-furigana rt { opacity: 0; }

  .romaji {
    font-family: var(--sans-en);
    font-style: italic;
    font-size: 12px;
    color: var(--fg-tertiary);
    line-height: 1.6;
    margin-top: 6px;
    letter-spacing: 0.01em;
    transition: opacity 300ms var(--ease);
  }

  body.hide-romaji .romaji { display: none; }

  .translation {
    font-family: var(--sans-jp);
    font-size: 12px;
    color: var(--fg-secondary);
    margin-top: 6px;
    line-height: 1.6;
  }

  body.hide-translation .translation { display: none; }

  /* Dialogue */
  .dialogue-scene {
    font-size: 12px;
    color: var(--fg-tertiary);
    font-style: italic;
    margin-bottom: 16px;
    padding: 8px 12px;
    background: var(--bg-elevated);
    border-radius: 2px;
  }

  .dialogue-line { padding: 12px 0 12px 16px; border-bottom: 1px solid var(--border-subtle); border-left: 2px solid transparent; cursor: pointer; transition: all 200ms var(--ease); margin: 0 -16px; padding-right: 16px; }
  .dialogue-line:hover { background: var(--accent-soft); border-left-color: var(--accent); }
  .dialogue-line.playing { background: var(--accent-soft); border-left-color: var(--accent); }

  .speaker {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  /* Questions */
  .question {
    padding: 16px 0;
    border-bottom: 1px solid var(--border-subtle);
  }

  .question-q { margin-bottom: 8px; }
  .question-a { padding-left: 16px; border-left: 2px solid var(--accent-soft); margin-top: 6px; }
  .q-mark { font-family: var(--mono); font-size: 11px; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; display: block; }
  .question-hint {
    font-family: var(--sans-jp);
    font-size: 11px;
    color: var(--fg-tertiary);
    margin-top: 6px;
    font-style: italic;
  }

  /* Notes section */
  .section-divider {
    margin: 64px 0 32px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .section-divider::before,
  .section-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border-default);
  }

  .section-divider-text {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--fg-tertiary);
  }

  .vocab-grid { display: grid; grid-template-columns: 1fr; gap: 0; }

  .vocab-item {
    display: grid;
    grid-template-columns: minmax(80px, 0.9fr) minmax(100px, 1fr) minmax(60px, 0.5fr) 2fr;
    gap: 16px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border-subtle);
    align-items: baseline;
  }

  .vocab-jp { font-family: var(--serif-jp); font-size: 15px; color: var(--fg-primary); }
  .vocab-kana { font-family: var(--sans-jp); font-size: 12px; color: var(--fg-secondary); }
  .vocab-romaji { font-family: var(--sans-en); font-style: italic; font-size: 12px; color: var(--fg-tertiary); }
  .vocab-meaning { font-family: var(--sans-jp); font-size: 13px; color: var(--fg-secondary); }
  .vocab-pos { font-family: var(--mono); font-size: 9px; color: var(--accent); margin-left: 6px; letter-spacing: 0.05em; }

  .grammar-point { padding: 18px 0; border-bottom: 1px solid var(--border-subtle); }
  .grammar-pattern { font-family: var(--mono); font-size: 13px; color: var(--accent); background: var(--accent-soft); padding: 2px 8px; border-radius: 2px; display: inline-block; margin-bottom: 8px; }
  .grammar-name { font-family: var(--sans-jp); font-size: 12px; color: var(--fg-tertiary); margin-left: 8px; }
  .grammar-explain { font-family: var(--sans-jp); font-size: 13px; color: var(--fg-secondary); line-height: 1.75; margin-bottom: 10px; }
  .grammar-examples { background: var(--bg-elevated); padding: 10px 14px; border-radius: 2px; font-size: 13px; }
  .grammar-example { padding: 4px 0; }
  .grammar-example .ex-jp { font-family: var(--serif-jp); color: var(--fg-primary); }
  .grammar-example .ex-cn { font-size: 11px; color: var(--fg-tertiary); margin-top: 2px; }

  /* Footer */
  .footer {
    margin-top: 80px;
    padding-top: 24px;
    border-top: 1px solid var(--border-default);
    font-family: var(--mono);
    font-size: 10px;
    color: var(--fg-tertiary);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    display: flex;
    justify-content: space-between;
  }

  .tts-status { font-family: var(--mono); font-size: 10px; color: var(--fg-tertiary); letter-spacing: 0.05em; }
  .tts-status.unavailable { color: #8B4513; }

  @media (max-width: 600px) {
    .container { padding: 40px 20px 64px; }
    .masthead { flex-direction: column; align-items: flex-start; }
    .masthead-meta { text-align: left; }
    .jp-text { font-size: 17px; }
    .vocab-item { grid-template-columns: 1fr; gap: 4px; padding: 12px 0; }
    .controls { flex-direction: column; align-items: flex-start; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition-duration: 0.01ms !important; }
  }
</style>
</head>

<script id="lesson-data" type="application/json">{"lesson":{"id":8,"level":"N5","title":{"jp":"過去","romaji":"kako","cn":"过去式","en":"Past Tense"},"goals":["掌握动词、形容词、名词的过去式","能讲述昨天、上周、去年发生的事","能用「先〜」「〜前」表达过去的时间"],"articles":[{"kind":"main","title":{"jp":"昨日のこと","romaji":"kinou no koto","cn":"昨天的事"},"sentences":[{"jp":"<ruby>昨日<rt>きのう</rt></ruby>は<ruby>休<rt>やす</rt></ruby>みでした。","plain":"きのうはやすみでした。","romaji":"kinou wa yasumi deshita.","cn":"昨天是休息日。"},{"jp":"<ruby>朝<rt>あさ</rt></ruby><ruby>遅<rt>おそ</rt></ruby>く<ruby>起<rt>お</rt></ruby>きました。","plain":"あさおそくおきました。","romaji":"asa osoku okimashita.","cn":"早上起得很晚。"},{"jp":"<ruby>午前<rt>ごぜん</rt></ruby>は<ruby>家<rt>いえ</rt></ruby>で<ruby>掃除<rt>そうじ</rt></ruby>をしました。","plain":"ごぜんはいえでそうじをしました。","romaji":"gozen wa ie de souji o shimashita.","cn":"上午在家里打扫了卫生。"},{"jp":"<ruby>午後<rt>ごご</rt></ruby>、<ruby>友達<rt>ともだち</rt></ruby>と<ruby>映画<rt>えいが</rt></ruby>を<ruby>見<rt>み</rt></ruby>ました。","plain":"ごご、ともだちとえいがをみました。","romaji":"gogo, tomodachi to eiga o mimashita.","cn":"下午和朋友看了电影。"},{"jp":"<ruby>映画<rt>えいが</rt></ruby>はとても<ruby>面白<rt>おもしろ</rt></ruby>かったです。","plain":"えいがはとてもおもしろかったです。","romaji":"eiga wa totemo omoshirokatta desu.","cn":"电影非常有趣。"},{"jp":"<ruby>夜<rt>よる</rt></ruby>はあまり<ruby>勉強<rt>べんきょう</rt></ruby>しませんでした。","plain":"よるはあまりべんきょうしませんでした。","romaji":"yoru wa amari benkyou shimasen deshita.","cn":"晚上没怎么学习。"},{"jp":"でも、いい<ruby>一日<rt>いちにち</rt></ruby>でした。","plain":"でも、いいいちにちでした。","romaji":"demo, ii ichinichi deshita.","cn":"不过，是充实的一天。"}]},{"kind":"companion","title":{"jp":"先月の旅行","romaji":"sengetsu no ryokou","cn":"上个月的旅行"},"sentences":[{"jp":"<ruby>先月<rt>せんげつ</rt></ruby>、<ruby>沖縄<rt>おきなわ</rt></ruby>へ<ruby>行<rt>い</rt></ruby>きました。","plain":"せんげつ、おきなわへいきました。","romaji":"sengetsu, Okinawa e ikimashita.","cn":"上个月去了冲绳。"},{"jp":"<ruby>天気<rt>てんき</rt></ruby>はとてもよかったです。","plain":"てんきはとてもよかったです。","romaji":"tenki wa totemo yokatta desu.","cn":"天气非常好。"},{"jp":"<ruby>海<rt>うみ</rt></ruby>はきれいで、<ruby>魚<rt>さかな</rt></ruby>もたくさんいました。","plain":"うみはきれいで、さかなもたくさんいました。","romaji":"umi wa kirei de, sakana mo takusan imashita.","cn":"海很美，鱼也很多。"},{"jp":"<ruby>毎日<rt>まいにち</rt></ruby><ruby>泳<rt>およ</rt></ruby>ぎました。","plain":"まいにちおよぎました。","romaji":"mainichi oyogimashita.","cn":"每天都游泳。"},{"jp":"<ruby>地元<rt>じもと</rt></ruby>の<ruby>料理<rt>りょうり</rt></ruby>も<ruby>美味<rt>おい</rt></ruby>しかったです。","plain":"じもとのりょうりもおいしかったです。","romaji":"jimoto no ryouri mo oishikatta desu.","cn":"当地的菜也很好吃。"},{"jp":"<ruby>本当<rt>ほんとう</rt></ruby>に<ruby>素晴<rt>すば</rt></ruby>らしい<ruby>旅行<rt>りょこう</rt></ruby>でした。","plain":"ほんとうにすばらしいりょこうでした。","romaji":"hontou ni subarashii ryokou deshita.","cn":"真的是一次美好的旅行。"}]}],"dialogue":{"scene":{"jp":"月曜日の朝、同僚と話す。","cn":"星期一早上，和同事交谈。"},"lines":[{"speaker":"田中","jp":"<ruby>鈴木<rt>すずき</rt></ruby>さん、<ruby>週末<rt>しゅうまつ</rt></ruby>は<ruby>何<rt>なに</rt></ruby>をしましたか。","plain":"すずきさん、しゅうまつはなにをしましたか。","romaji":"Suzuki-san, shuumatsu wa nani o shimashita ka.","cn":"铃木，周末做了什么？"},{"speaker":"鈴木","jp":"<ruby>土曜日<rt>どようび</rt></ruby>は<ruby>家族<rt>かぞく</rt></ruby>と<ruby>動物園<rt>どうぶつえん</rt></ruby>へ<ruby>行<rt>い</rt></ruby>きました。","plain":"どようびはかぞくとどうぶつえんへいきました。","romaji":"doyoubi wa kazoku to doubutsuen e ikimashita.","cn":"星期六和家人去了动物园。"},{"speaker":"田中","jp":"いいですね。<ruby>子供<rt>こども</rt></ruby>たちは<ruby>喜<rt>よろこ</rt></ruby>びましたか。","plain":"いいですね。こどもたちはよろこびましたか。","romaji":"ii desu ne. kodomo-tachi wa yorokobimashita ka.","cn":"真好。孩子们高兴吗？"},{"speaker":"鈴木","jp":"はい、とても<ruby>楽<rt>たの</rt></ruby>しかったです。<ruby>田中<rt>たなか</rt></ruby>さんは。","plain":"はい、とてもたのしかったです。たなかさんは。","romaji":"hai, totemo tanoshikatta desu. Tanaka-san wa.","cn":"嗯，非常开心。田中你呢？"},{"speaker":"田中","jp":"<ruby>私<rt>わたし</rt></ruby>はずっと<ruby>家<rt>いえ</rt></ruby>にいました。<ruby>本<rt>ほん</rt></ruby>を<ruby>読<rt>よ</rt></ruby>みました。","plain":"わたしはずっといえにいました。ほんをよみました。","romaji":"watashi wa zutto ie ni imashita. hon o yomimashita.","cn":"我一直在家。读了书。"}]},"questions":[{"q":{"jp":"<ruby>昨日<rt>きのう</rt></ruby>の<ruby>午後<rt>ごご</rt></ruby>、<ruby>何<rt>なに</rt></ruby>をしましたか。","plain":"きのうのごご、なにをしましたか。","romaji":"kinou no gogo, nani o shimashita ka.","cn":"昨天下午做了什么？"},"a":{"jp":"<ruby>友達<rt>ともだち</rt></ruby>と<ruby>映画<rt>えいが</rt></ruby>を<ruby>見<rt>み</rt></ruby>ました。","plain":"ともだちとえいがをみました。","romaji":"tomodachi to eiga o mimashita.","cn":"和朋友看了电影。"}},{"q":{"jp":"<ruby>映画<rt>えいが</rt></ruby>はどうでしたか。","plain":"えいがはどうでしたか。","romaji":"eiga wa dou deshita ka.","cn":"电影怎么样？"},"a":{"jp":"とても<ruby>面白<rt>おもしろ</rt></ruby>かったです。","plain":"とてもおもしろかったです。","romaji":"totemo omoshirokatta desu.","cn":"非常有趣。"}},{"q":{"jp":"<ruby>沖縄<rt>おきなわ</rt></ruby>でどんなことをしましたか。","plain":"おきなわでどんなことをしましたか。","romaji":"Okinawa de donna koto o shimashita ka.","cn":"在冲绳做了什么？"},"a":{"jp":"<ruby>毎日<rt>まいにち</rt></ruby><ruby>海<rt>うみ</rt></ruby>で<ruby>泳<rt>およ</rt></ruby>ぎました。","plain":"まいにちうみでおよぎました。","romaji":"mainichi umi de oyogimashita.","cn":"每天在海里游泳。"}},{"q":{"jp":"<ruby>鈴木<rt>すずき</rt></ruby>さんは<ruby>土曜日<rt>どようび</rt></ruby>どこへ<ruby>行<rt>い</rt></ruby>きましたか。","plain":"すずきさんはどようびどこへいきましたか。","romaji":"Suzuki-san wa doyoubi doko e ikimashita ka.","cn":"铃木星期六去了哪里？"},"a":{"jp":"<ruby>動物園<rt>どうぶつえん</rt></ruby>へ<ruby>行<rt>い</rt></ruby>きました。","plain":"どうぶつえんへいきました。","romaji":"doubutsuen e ikimashita.","cn":"去了动物园。"}}],"vocabulary":[{"jp":"昨日","kana":"きのう","romaji":"kinou","meaning":"昨天","pos":"名詞"},{"jp":"遅く","kana":"おそく","romaji":"osoku","meaning":"晚地","pos":"副詞"},{"jp":"掃除","kana":"そうじ","romaji":"souji","meaning":"打扫","pos":"名詞"},{"jp":"します","kana":"します","romaji":"shimasu","meaning":"做","pos":"動詞III"},{"jp":"面白い","kana":"おもしろい","romaji":"omoshiroi","meaning":"有趣的","pos":"い形容詞"},{"jp":"あまり","kana":"あまり","romaji":"amari","meaning":"不太...（接否定）","pos":"副詞"},{"jp":"一日","kana":"いちにち","romaji":"ichinichi","meaning":"一天","pos":"名詞"},{"jp":"先月","kana":"せんげつ","romaji":"sengetsu","meaning":"上个月","pos":"名詞"},{"jp":"先週","kana":"せんしゅう","romaji":"senshuu","meaning":"上周","pos":"名詞"},{"jp":"沖縄","kana":"おきなわ","romaji":"Okinawa","meaning":"冲绳","pos":"名詞"},{"jp":"天気","kana":"てんき","romaji":"tenki","meaning":"天气","pos":"名詞"},{"jp":"海","kana":"うみ","romaji":"umi","meaning":"海","pos":"名詞"},{"jp":"魚","kana":"さかな","romaji":"sakana","meaning":"鱼","pos":"名詞"},{"jp":"毎日","kana":"まいにち","romaji":"mainichi","meaning":"每天","pos":"名詞"},{"jp":"泳ぎます","kana":"およぎます","romaji":"oyogimasu","meaning":"游泳","pos":"動詞I"},{"jp":"地元","kana":"じもと","romaji":"jimoto","meaning":"当地","pos":"名詞"},{"jp":"本当に","kana":"ほんとうに","romaji":"hontou ni","meaning":"真的","pos":"副詞"},{"jp":"素晴らしい","kana":"すばらしい","romaji":"subarashii","meaning":"极好的","pos":"い形容詞"},{"jp":"旅行","kana":"りょこう","romaji":"ryokou","meaning":"旅行","pos":"名詞"},{"jp":"動物園","kana":"どうぶつえん","romaji":"doubutsuen","meaning":"动物园","pos":"名詞"},{"jp":"喜びます","kana":"よろこびます","romaji":"yorokobimasu","meaning":"高兴","pos":"動詞I"},{"jp":"楽しい","kana":"たのしい","romaji":"tanoshii","meaning":"开心的","pos":"い形容詞"},{"jp":"ずっと","kana":"ずっと","romaji":"zutto","meaning":"一直","pos":"副詞"}],"grammar":[{"pattern":"V ました／V ませんでした","name":"动词过去式","explain":"「ます」→「ました」（过去肯定），「ません」→「ませんでした」（过去否定）。日语过去式只有这两种变化。","examples":[{"jp":"<ruby>映画<rt>えいが</rt></ruby>を<ruby>見<rt>み</rt></ruby>ました。","plain":"えいがをみました。","cn":"看了电影。"},{"jp":"<ruby>勉強<rt>べんきょう</rt></ruby>しませんでした。","plain":"べんきょうしませんでした。","cn":"没学习。"}]},{"pattern":"い形容詞 → 〜かったです","name":"い形容词过去式","explain":"去「い」加「かった」。否定过去：「〜くなかったです」。例外：「いい→よかった」。","examples":[{"jp":"<ruby>美味<rt>おい</rt></ruby>しかったです。","plain":"おいしかったです。","cn":"（之前）很好吃。"},{"jp":"<ruby>面白<rt>おもしろ</rt></ruby>くなかったです。","plain":"おもしろくなかったです。","cn":"（之前）不有趣。"},{"jp":"よかったです。","plain":"よかったです。","cn":"（之前）很好。"}]},{"pattern":"な形容詞／N → 〜でした","name":"な形容词和名词过去式","explain":"「です」→「でした」（过去肯定），「じゃありません」→「じゃありませんでした」（过去否定）。","examples":[{"jp":"<ruby>休<rt>やす</rt></ruby>みでした。","plain":"やすみでした。","cn":"（之前）是休息日。"},{"jp":"にぎやかじゃありませんでした。","plain":"にぎやかじゃありませんでした。","cn":"（之前）不热闹。"}]},{"pattern":"あまり〜ません","name":"部分否定","explain":"「あまり」+ 否定形，表示\"不太...\"。语气比直接否定柔和。","examples":[{"jp":"あまり<ruby>勉強<rt>べんきょう</rt></ruby>しませんでした。","plain":"あまりべんきょうしませんでした。","cn":"没怎么学习。"},{"jp":"あまり<ruby>美味<rt>おい</rt></ruby>しくないです。","plain":"あまりおいしくないです。","cn":"不太好吃。"}]},{"pattern":"先〜／〜前","name":"过去时间表达","explain":"「先〜」表示\"上一个\"：先週（上周）、先月（上月）、先年=去年。「〜前」表示\"...之前\"：三日前（三天前）、一年前（一年前）。","examples":[{"jp":"<ruby>先週<rt>せんしゅう</rt></ruby>の<ruby>金曜日<rt>きんようび</rt></ruby>","plain":"せんしゅうのきんようび","cn":"上周五"},{"jp":"<ruby>三日前<rt>みっかまえ</rt></ruby>","plain":"みっかまえ","cn":"三天前"}]}]},"prev":{"id":7,"title":"形容詞"},"next":{"id":9,"title":"て形入門"}}</script>
<script>
(() => {
  const data = JSON.parse(document.getElementById('lesson-data').textContent);
  const lesson = data.lesson;
  const prev = data.prev; // { id, title } | null
  const next = data.next;

  // Flatten "playable" sentences for the global play-all queue.
  // group: 'main-N' / 'sub-N' / 'dialogue' (each has its own DOM nodes)
  const playableGroups = []; // [{ groupId, items: [{ plain, el }] }]

  // ---------- Masthead / nav ----------
  const lessonNo = String(lesson.id).padStart(2, '0');
  document.title = lesson.level + ' · 第' + lesson.id + '課 — ' + stripTags(lesson.title.jp);
  document.getElementById('m-level').textContent = lesson.level + ' — Lesson ' + lessonNo;
  document.getElementById('m-title-jp').innerHTML = lesson.title.jp;
  document.getElementById('m-title-en').textContent = lesson.title.romaji + ' · ' + lesson.title.en;
  document.getElementById('m-lesson-no').textContent = '第 ' + lesson.id + ' 課';
  document.getElementById('footer-meta').textContent = '日本語 ' + lesson.level + ' · 第' + lesson.id + '課';

  const navEl = document.getElementById('lesson-nav');
  const navParts = [];
  navParts.push('<a href="index.html">← 索引</a>');
  navParts.push('<span>/</span>');
  if (prev) {
    navParts.push('<a href="lesson-' + String(prev.id).padStart(2, '0') + '.html">第' + prev.id + '課</a>');
    navParts.push('<span>/</span>');
  }
  navParts.push('<span class="current">第' + lesson.id + '課</span>');
  if (next) {
    navParts.push('<span>/</span>');
    navParts.push('<a href="lesson-' + String(next.id).padStart(2, '0') + '.html">第' + next.id + '課 →</a>');
  }
  navEl.innerHTML = navParts.join(' ');

  // ---------- Goals ----------
  const goalsList = document.getElementById('goals-list');
  if (lesson.goals && lesson.goals.length) {
    lesson.goals.forEach(g => {
      const li = document.createElement('li');
      li.textContent = g;
      goalsList.appendChild(li);
    });
  } else {
    document.getElementById('goals-block').hidden = true;
  }

  // ---------- Articles ----------
  const articlesEl = document.getElementById('articles');
  lesson.articles.forEach((article, ai) => {
    const wrap = document.createElement('article');
    wrap.className = 'article';
    const groupId = (article.kind === 'main' ? 'main' : 'sub') + '-' + ai;
    wrap.id = 'article-' + groupId;

    const meta = document.createElement('div');
    meta.className = 'article-meta';
    meta.textContent = article.kind === 'main' ? '主篇 · main reading' : '配篇 · companion reading';
    wrap.appendChild(meta);

    const h2 = document.createElement('h2');
    h2.className = 'article-title';
    h2.innerHTML = article.title.jp + '<span class="ja-small">' + escapeHtml(article.title.cn) + '</span>';
    wrap.appendChild(h2);

    const items = [];
    article.sentences.forEach((s, i) => {
      const div = document.createElement('div');
      div.className = 'sentence';
      div.dataset.group = groupId;
      div.dataset.index = String(i);
      div.innerHTML =
        '<div class="jp-text">' + s.jp + '</div>' +
        '<div class="romaji">' + escapeHtml(s.romaji) + '</div>' +
        '<div class="translation">' + escapeHtml(s.cn) + '</div>';
      wrap.appendChild(div);
      items.push({ plain: s.plain, el: div });
    });

    articlesEl.appendChild(wrap);
    playableGroups.push({ groupId, items });
  });

  // ---------- Dialogue ----------
  if (lesson.dialogue && lesson.dialogue.lines && lesson.dialogue.lines.length) {
    document.getElementById('dialogue-divider').hidden = false;
    document.getElementById('dialogue-block').hidden = false;
    const sceneEl = document.getElementById('dialogue-scene');
    sceneEl.textContent = lesson.dialogue.scene.jp + ' / ' + lesson.dialogue.scene.cn;
    const linesEl = document.getElementById('dialogue-lines');
    const items = [];
    lesson.dialogue.lines.forEach((line, i) => {
      const div = document.createElement('div');
      div.className = 'dialogue-line';
      div.dataset.group = 'dialogue';
      div.dataset.index = String(i);
      div.innerHTML =
        '<div class="speaker">' + escapeHtml(line.speaker) + '</div>' +
        '<div class="jp-text">' + line.jp + '</div>' +
        '<div class="romaji">' + escapeHtml(line.romaji) + '</div>' +
        '<div class="translation">' + escapeHtml(line.cn) + '</div>';
      linesEl.appendChild(div);
      items.push({ plain: line.plain, el: div });
    });
    playableGroups.push({ groupId: 'dialogue', items });
  }

  // ---------- Questions ----------
  if (lesson.questions && lesson.questions.length) {
    document.getElementById('questions-divider').hidden = false;
    const qBlock = document.getElementById('questions-block');
    qBlock.hidden = false;
    lesson.questions.forEach((qa, i) => {
      const div = document.createElement('div');
      div.className = 'question';
      div.innerHTML =
        '<div class="question-q">' +
          '<span class="q-mark">Q' + (i + 1) + '</span>' +
          '<div class="jp-text">' + qa.q.jp + '</div>' +
          '<div class="romaji">' + escapeHtml(qa.q.romaji) + '</div>' +
          '<div class="translation">' + escapeHtml(qa.q.cn) + '</div>' +
        '</div>' +
        '<div class="question-a">' +
          '<span class="q-mark">A</span>' +
          '<div class="jp-text">' + qa.a.jp + '</div>' +
          '<div class="romaji">' + escapeHtml(qa.a.romaji) + '</div>' +
          '<div class="translation">' + escapeHtml(qa.a.cn) + '</div>' +
          (qa.hint ? '<div class="question-hint">提示：' + escapeHtml(qa.hint) + '</div>' : '') +
        '</div>';
      qBlock.appendChild(div);
    });
  }

  // ---------- Vocabulary ----------
  const vocabGrid = document.getElementById('vocab-grid');
  lesson.vocabulary.forEach(v => {
    const div = document.createElement('div');
    div.className = 'vocab-item';
    div.innerHTML =
      '<div class="vocab-jp">' + escapeHtml(v.jp) + (v.pos ? '<span class="vocab-pos">' + escapeHtml(v.pos) + '</span>' : '') + '</div>' +
      '<div class="vocab-kana">' + escapeHtml(v.kana) + '</div>' +
      '<div class="vocab-romaji">' + escapeHtml(v.romaji) + '</div>' +
      '<div class="vocab-meaning">' + escapeHtml(v.meaning) + '</div>';
    vocabGrid.appendChild(div);
  });

  // ---------- Grammar ----------
  const grammarNotes = document.getElementById('grammar-notes');
  lesson.grammar.forEach(g => {
    const div = document.createElement('div');
    div.className = 'grammar-point';
    let ex = '';
    if (g.examples && g.examples.length) {
      ex = '<div class="grammar-examples">' +
        g.examples.map(e =>
          '<div class="grammar-example">' +
            '<div class="ex-jp">' + e.jp + '</div>' +
            '<div class="ex-cn">' + escapeHtml(e.cn) + '</div>' +
          '</div>'
        ).join('') +
        '</div>';
    }
    div.innerHTML =
      '<div><span class="grammar-pattern">' + escapeHtml(g.pattern) + '</span>' +
      '<span class="grammar-name">' + escapeHtml(g.name) + '</span></div>' +
      '<div class="grammar-explain">' + escapeHtml(g.explain) + '</div>' +
      ex;
    grammarNotes.appendChild(div);
  });

  // ---------- Toggles ----------
  document.querySelectorAll('.toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      const type = btn.dataset.toggle;
      const state = btn.dataset.state;
      document.querySelectorAll('.toggle[data-toggle="' + type + '"]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (state === 'off') document.body.classList.add('hide-' + type);
      else document.body.classList.remove('hide-' + type);
    });
  });

  // ---------- Speech ----------
  const synth = window.speechSynthesis;
  let jaVoice = null;
  const ttsStatus = document.getElementById('tts-status');
  const nowReading = document.getElementById('now-reading');
  const speedSelect = document.getElementById('speed-select');

  function pickJapaneseVoice() {
    if (!synth) return;
    const voices = synth.getVoices();
    const preferred = voices.find(v => v.lang === 'ja-JP' && /Kyoko|Otoya|O-ren|Google/i.test(v.name));
    jaVoice = preferred || voices.find(v => v.lang === 'ja-JP') || voices.find(v => v.lang.startsWith('ja'));
    if (jaVoice) {
      ttsStatus.textContent = '音声 · ' + jaVoice.name.split(' ')[0];
      ttsStatus.classList.remove('unavailable');
    } else {
      ttsStatus.textContent = '音声 · 未対応';
      ttsStatus.classList.add('unavailable');
    }
  }

  if (synth) {
    pickJapaneseVoice();
    synth.onvoiceschanged = pickJapaneseVoice;
  } else {
    ttsStatus.textContent = '音声 · 未対応';
    ttsStatus.classList.add('unavailable');
  }

  let queue = [];
  let isPlaying = false;

  function speak(text, onEnd) {
    if (!synth) { onEnd && onEnd(); return; }
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ja-JP';
    if (jaVoice) u.voice = jaVoice;
    u.rate = parseFloat(speedSelect.value);
    u.pitch = 1.0;
    u.onend = () => onEnd && onEnd();
    u.onerror = () => onEnd && onEnd();
    synth.speak(u);
  }

  function clearPlaying() {
    document.querySelectorAll('.sentence.playing, .dialogue-line.playing').forEach(s => s.classList.remove('playing'));
  }

  function findItem(groupId, index) {
    const g = playableGroups.find(g => g.groupId === groupId);
    return g ? g.items[index] : null;
  }

  function playItem(groupId, index) {
    if (!synth) return;
    synth.cancel();
    clearPlaying();
    const item = findItem(groupId, index);
    if (!item) return;
    item.el.classList.add('playing');
    nowReading.textContent = item.plain;
    speak(item.plain, () => {
      item.el.classList.remove('playing');
      if (queue.length > 0) {
        const next = queue.shift();
        playItem(next.group, next.index);
      } else {
        isPlaying = false;
        nowReading.textContent = '完了 / done';
      }
    });
  }

  document.querySelectorAll('.sentence, .dialogue-line').forEach(el => {
    el.addEventListener('click', () => {
      queue = [];
      isPlaying = true;
      playItem(el.dataset.group, parseInt(el.dataset.index, 10));
    });
  });

  document.getElementById('play-all').addEventListener('click', () => {
    if (!synth) return;
    if (isPlaying) {
      synth.cancel();
      queue = [];
      isPlaying = false;
      clearPlaying();
      nowReading.textContent = '一時停止 / paused';
      return;
    }
    queue = [];
    playableGroups.forEach(g => {
      g.items.forEach((_, i) => queue.push({ group: g.groupId, index: i }));
    });
    if (queue.length === 0) return;
    isPlaying = true;
    const first = queue.shift();
    playItem(first.group, first.index);
  });

  document.addEventListener('visibilitychange', () => {
    if (document.hidden && synth) {
      synth.cancel();
      queue = [];
      isPlaying = false;
      clearPlaying();
    }
  });

  // ---------- helpers ----------
  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
  function stripTags(s) { return String(s).replace(/<[^>]*>/g, ''); }
})();
</script>
</body>
</html>
