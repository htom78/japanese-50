:"<ruby>具体的<rt>ぐたいてき</rt></ruby>にはどのような<ruby>問題<rt>もんだい</rt></ruby>があるのでしょうか。","plain":"ぐたいてきにはどのようなもんだいがあるのでしょうか。","romaji":"gutaiteki ni wa dono you na mondai ga aru no deshou ka.","cn":"具体有什么样的问题呢?"},{"speaker":"評論家","jp":"<ruby>情報<rt>じょうほう</rt></ruby>は<ruby>速<rt>はや</rt></ruby>く<ruby>広<rt>ひろ</rt></ruby>がるにもかかわらず、<ruby>真偽<rt>しんぎ</rt></ruby>の<ruby>判断<rt>はんだん</rt></ruby>は<ruby>難<rt>むずか</rt></ruby>しいです。","plain":"じょうほうははやくひろがるにもかかわらず、しんぎのはんだんはむずかしいです。","romaji":"jouhou wa hayaku hirogaru ni mo kakawarazu, shingi no handan wa muzukashii desu.","cn":"尽管信息传播迅速,真伪的判断却很困难。"},{"speaker":"司会者","jp":"<ruby>便利<rt>べんり</rt></ruby>でありながらも、<ruby>新<rt>あたら</rt></ruby>しい<ruby>課題<rt>かだい</rt></ruby>が<ruby>生<rt>う</rt></ruby>まれているわけですね。","plain":"べんりでありながらも、あたらしいかだいがうまれているわけですね。","romaji":"benri de ari nagara mo, atarashii kadai ga umarete iru wake desu ne.","cn":"虽然方便,新的课题也由此产生了呢。"},{"speaker":"評論家","jp":"そのとおりです。<ruby>良<rt>よ</rt></ruby>い<ruby>面<rt>めん</rt></ruby>を<ruby>認<rt>みと</rt></ruby>めるものの、<ruby>影<rt>かげ</rt></ruby>を<ruby>見過<rt>みす</rt></ruby>ごしてはなりません。","plain":"そのとおりです。よいめんをみとめるものの、かげをみすごしてはなりません。","romaji":"sono toori desu. yoi men o mitomeru mono no, kage o misugoshite wa narimasen.","cn":"正是如此。虽然承认好的方面,但不可忽视阴影。"}]},"questions":[{"q":{"jp":"<ruby>筆者<rt>ひっしゃ</rt></ruby>は<ruby>失敗<rt>しっぱい</rt></ruby>をどう<ruby>位置付<rt>いちづ</rt></ruby>けているか。","plain":"ひっしゃはしっぱいをどういちづけているか。","romaji":"hissha wa shippai o dou ichizukete iru ka.","cn":"作者如何看待失败?"},"a":{"jp":"<ruby>次<rt>つぎ</rt></ruby>の<ruby>成功<rt>せいこう</rt></ruby>への<ruby>礎<rt>いしずえ</rt></ruby>であると<ruby>位置付<rt>いちづ</rt></ruby>けている。","plain":"つぎのせいこうへのいしずえであるといちづけている。","romaji":"tsugi no seikou e no ishizue de aru to ichizukete iru.","cn":"认为是通向下一次成功的基石。"}},{"q":{"jp":"<ruby>偉人<rt>いじん</rt></ruby>たちの<ruby>道<rt>みち</rt></ruby>はどのようなものだったと<ruby>述<rt>の</rt></ruby>べているか。","plain":"いじんたちのみちはどのようなものだったとのべているか。","romaji":"ijin-tachi no michi wa dono you na mono datta to nobete iru ka.","cn":"文中说伟人们的路是怎样的?"},"a":{"jp":"<ruby>決<rt>けっ</rt></ruby>して<ruby>平坦<rt>へいたん</rt></ruby>ではなく、<ruby>幾度<rt>いくど</rt></ruby>もの<ruby>挫折<rt>ざせつ</rt></ruby>を<ruby>経<rt>へ</rt></ruby>てきた<ruby>道<rt>みち</rt></ruby>であった。","plain":"けっしてへいたんではなく、いくどものざせつをへてきたみちであった。","romaji":"kesshite heitan de wa naku, ikudo mo no zasetsu o hete kita michi de atta.","cn":"绝不平坦,是经历过数度挫折的路。"}},{"q":{"jp":"スマートフォンの<ruby>便利<rt>べんり</rt></ruby>さの<ruby>裏側<rt>うらがわ</rt></ruby>には<ruby>何<rt>なに</rt></ruby>があると<ruby>述<rt>の</rt></ruby>べられているか。","plain":"スマートフォンのべんりさのうらがわにはなにがあるとのべられているか。","romaji":"sumaatofon no benrisa no uragawa ni wa nani ga aru to noberarete iru ka.","cn":"文中说智能手机便利的背后有什么?"},"a":{"jp":"<ruby>集中力<rt>しゅうちゅうりょく</rt></ruby>の<ruby>低下<rt>ていか</rt></ruby>や<ruby>人間関係<rt>にんげんかんけい</rt></ruby>の<ruby>希薄化<rt>きはくか</rt></ruby>などの<ruby>影<rt>かげ</rt></ruby>がある。","plain":"しゅうちゅうりょくのていかやにんげんかんけいのきはくかなどのかげがある。","romaji":"shuuchuuryoku no teika ya ningen-kankei no kihaku-ka nado no kage ga aru.","cn":"存在专注力下降、人际关系淡薄化等阴影。"}},{"q":{"jp":"<ruby>評論家<rt>ひょうろんか</rt></ruby>はSNSをどのように<ruby>評価<rt>ひょうか</rt></ruby>しているか。","plain":"ひょうろんかはSNSをどのようにひょうかしているか。","romaji":"hyouronka wa SNS o dono you ni hyouka shite iru ka.","cn":"评论家如何评价社交网络?"},"a":{"jp":"<ruby>世界<rt>せかい</rt></ruby>を<ruby>変<rt>か</rt></ruby>えたと<ruby>認<rt>みと</rt></ruby>めるものの、<ruby>真偽<rt>しんぎ</rt></ruby>の<ruby>判断<rt>はんだん</rt></ruby>が<ruby>難<rt>むずか</rt></ruby>しいなど<ruby>影<rt>かげ</rt></ruby>もあると<ruby>述<rt>の</rt></ruby>べている。","plain":"せかいをかえたとみとめるものの、しんぎのはんだんがむずかしいなどかげもあるとのべている。","romaji":"sekai o kaeta to mitomeru mono no, shingi no handan ga muzukashii nado kage mo aru to nobete iru.","cn":"认为虽然改变了世界,但真伪判断困难等阴影也存在。"}}],"vocabulary":[{"jp":"にわたって","kana":"にわたって","romaji":"ni watatte","meaning":"历经…","pos":"慣用句"},{"jp":"重ねる","kana":"かさねる","romaji":"kasaneru","meaning":"叠加,反复","pos":"動詞II"},{"jp":"計画","kana":"けいかく","romaji":"keikaku","meaning":"计划","pos":"名詞"},{"jp":"綿密","kana":"めんみつ","romaji":"menmitsu","meaning":"周密","pos":"な形容詞"},{"jp":"予測","kana":"よそく","romaji":"yosoku","meaning":"预测","pos":"名詞"},{"jp":"裏切る","kana":"うらぎる","romaji":"uragiru","meaning":"背叛,辜负","pos":"動詞I"},{"jp":"一見","kana":"いっけん","romaji":"ikken","meaning":"乍看","pos":"副詞"},{"jp":"認める","kana":"みとめる","romaji":"mitomeru","meaning":"承认","pos":"動詞II"},{"jp":"諦める","kana":"あきらめる","romaji":"akirameru","meaning":"放弃","pos":"動詞II"},{"jp":"なぜなら","kana":"なぜなら","romaji":"nazenara","meaning":"因为","pos":"接続詞"},{"jp":"成功","kana":"せいこう","romaji":"seikou","meaning":"成功","pos":"名詞"},{"jp":"礎","kana":"いしずえ","romaji":"ishizue","meaning":"基石","pos":"名詞"},{"jp":"偉人","kana":"いじん","romaji":"ijin","meaning":"伟人","pos":"名詞"},{"jp":"幾度","kana":"いくど","romaji":"ikudo","meaning":"数度","pos":"名詞"},{"jp":"挫折","kana":"ざせつ","romaji":"zasetsu","meaning":"挫折","pos":"名詞"},{"jp":"偉大","kana":"いだい","romaji":"idai","meaning":"伟大","pos":"な形容詞"},{"jp":"業績","kana":"ぎょうせき","romaji":"gyouseki","meaning":"业绩","pos":"名詞"},{"jp":"平坦","kana":"へいたん","romaji":"heitan","meaning":"平坦","pos":"な形容詞"},{"jp":"才能","kana":"さいのう","romaji":"sainou","meaning":"才能","pos":"名詞"},{"jp":"味わう","kana":"あじわう","romaji":"ajiwau","meaning":"品尝,经历","pos":"動詞I"},{"jp":"振り返る","kana":"ふりかえる","romaji":"furikaeru","meaning":"回顾","pos":"動詞I"},{"jp":"糧","kana":"かて","romaji":"kate","meaning":"养料,粮食","pos":"名詞"},{"jp":"挑戦","kana":"ちょうせん","romaji":"chousen","meaning":"挑战","pos":"名詞"},{"jp":"スマートフォン","kana":"スマートフォン","romaji":"sumaatofon","meaning":"智能手机","pos":"名詞"},{"jp":"誤る","kana":"あやまる","romaji":"ayamaru","meaning":"弄错","pos":"動詞I"},{"jp":"害","kana":"がい","romaji":"gai","meaning":"害","pos":"名詞"},{"jp":"触れる","kana":"ふれる","romaji":"fureru","meaning":"接触","pos":"動詞II"},{"jp":"集中力","kana":"しゅうちゅうりょく","romaji":"shuuchuuryoku","meaning":"专注力","pos":"名詞"},{"jp":"奪う","kana":"うばう","romaji":"ubau","meaning":"夺走","pos":"動詞I"},{"jp":"つながり","kana":"つながり","romaji":"tsunagari","meaning":"联系","pos":"名詞"},{"jp":"メッセージ","kana":"メッセージ","romaji":"messeeji","meaning":"消息","pos":"名詞"},{"jp":"届く","kana":"とどく","romaji":"todoku","meaning":"送达","pos":"動詞I"},{"jp":"改めて","kana":"あらためて","romaji":"aratamete","meaning":"重新,重新一次","pos":"副詞"},{"jp":"歓迎","kana":"かんげい","romaji":"kangei","meaning":"欢迎","pos":"名詞"},{"jp":"失う","kana":"うしなう","romaji":"ushinau","meaning":"失去","pos":"動詞I"},{"jp":"道具","kana":"どうぐ","romaji":"dougu","meaning":"工具","pos":"名詞"},{"jp":"常に","kana":"つねに","romaji":"tsune ni","meaning":"总是","pos":"副詞"},{"jp":"裏側","kana":"うらがわ","romaji":"uragawa","meaning":"背面","pos":"名詞"},{"jp":"影","kana":"かげ","romaji":"kage","meaning":"阴影","pos":"名詞"},{"jp":"真偽","kana":"しんぎ","romaji":"shingi","meaning":"真伪","pos":"名詞"},{"jp":"見過ごす","kana":"みすごす","romaji":"misugosu","meaning":"忽视","pos":"動詞I"}],"grammar":[{"pattern":"V/Aた形 + にもかかわらず","name":"尽管…(书面强逆接)","explain":"\"尽管…却…\"。表示前后形成强烈的逆向关系,前项的事实本应导致 A 结果,但却出现了相反的 B。前接动词、形容词的普通形,名词时用「N(である)にもかかわらず」。比「のに」更书面、更客观,常用于论说文与新闻报道。「もかかわらず」可省「にも」单用「かかわらず」更硬。","examples":[{"jp":"<ruby>努力<rt>どりょく</rt></ruby>したにもかかわらず、<ruby>失敗<rt>しっぱい</rt></ruby>に<ruby>終<rt>お</rt></ruby>わった。","plain":"どりょくしたにもかかわらず、しっぱいにおわった。","cn":"尽管努力了,却以失败告终。"}]},{"pattern":"〜とはいえ","name":"虽说…但…","explain":"\"虽说…但实际上…\"。前项是一般认知或被广泛承认的命题,后项指出它在某种意义上不完全成立。前接句子普通形或名词。带\"承认前项,但要补充修正\"的语气。比「とはいうものの」更简洁。论说文中常用于\"承认共识,但提出新视角\"。","examples":[{"jp":"<ruby>夏<rt>なつ</rt></ruby>とはいえ、<ruby>朝晩<rt>あさばん</rt></ruby>は<ruby>涼<rt>すず</rt></ruby>しい。","plain":"なつとはいえ、あさばんはすずしい。","cn":"虽说是夏天,早晚还是凉爽。"}]},{"pattern":"〜ものの","name":"虽然…但…(自我承认)","explain":"\"虽然…但…\"。前接动词、形容词的普通形,或「な形容词+な」「名词+である」。前项是说话者承认的事实,后项是与之不太协调的状态或结论。常带\"自我反省、坦承\"的语气,主语多为第一人称或评价对象。比「のに」更书面、更冷静,不带不满情绪。","examples":[{"jp":"<ruby>計画<rt>けいかく</rt></ruby>を<ruby>立<rt>た</rt></ruby>てたものの、<ruby>実行<rt>じっこう</rt></ruby>できなかった。","plain":"けいかくをたてたものの、じっこうできなかった。","cn":"虽然制定了计划,却未能执行。"}]},{"pattern":"〜ながら(も)","name":"虽然…却…(对比)","explain":"\"虽然…却…\"。前接动词ます形词干、形容词、名词,表示前后两个属性对比共存。「ながらも」加「も」更强调对比、更书面。常用于\"虽然具有 A 属性,却同时表现出 B\"。注意与表示同时进行动作的「〜ながら」(歩きながら話す) 区分,后者无对比义。","examples":[{"jp":"<ruby>狭<rt>せま</rt></ruby>いながらも、<ruby>居心地<rt>いごこち</rt></ruby>のいい<ruby>部屋<rt>へや</rt></ruby>だ。","plain":"せまいながらも、いごこちのいいへやだ。","cn":"虽然狭小,却是个让人心安的房间。"},{"jp":"<ruby>才能<rt>さいのう</rt></ruby>がありながらも、<ruby>努力<rt>どりょく</rt></ruby>を<ruby>怠<rt>おこた</rt></ruby>らない。","plain":"さいのうがありながらも、どりょくをおこたらない。","cn":"虽有才能,也不怠慢努力。"}]},{"pattern":"〜ずに / 〜ず","name":"不…而…(书面)","explain":"\"不…而…\"。书面体的「ないで」,前接动词的ない形(去ない接ず);「する」例外,变为「せず」。「〜ずに」用于句中作连用修饰,「〜ず」可以中顿成分。比「ないで」更硬、更正式。论说文与文学常用,口语极少使用。","examples":[{"jp":"<ruby>失敗<rt>しっぱい</rt></ruby>を<ruby>恐<rt>おそ</rt></ruby>れずに<ruby>挑戦<rt>ちょうせん</rt></ruby>する。","plain":"しっぱいをおそれずにちょうせんする。","cn":"不畏惧失败地挑战。"}]}]},"prev":{"id":43,"title":"強調と限定"},"next":{"id":45,"title":"抽象的な時間"}}</script>
<script>
(() => {
  const data = JSON.parse(document.getElementById('lesson-data').textContent);
  const lesson = data.lesson;
  const prev = data.prev; // { id, title } | null
  const next = data.next;

  // Flatten "playable" sentences for the global play-all queue.
  // group: 'main-N' / 'sub-N' / 'dialogue' (each has its own DOM nodes)
  const playableGroups = []; // [{ groupId, items: [{ plain, el }] }]

  // ---------- Masthead / nav ----------
  const lessonNo = String(lesson.id).padStart(2, '0');
  document.title = lesson.level + ' · 第' + lesson.id + '課 — ' + stripTags(lesson.title.jp);
  document.getElementById('m-level').textContent = lesson.level + ' — Lesson ' + lessonNo;
  document.getElementById('m-title-jp').innerHTML = lesson.title.jp;
  document.getElementById('m-title-en').textContent = lesson.title.romaji + ' · ' + lesson.title.en;
  document.getElementById('m-lesson-no').textContent = '第 ' + lesson.id + ' 課';
  document.getElementById('footer-meta').textContent = '日本語 ' + lesson.level + ' · 第' + lesson.id + '課';

  const navEl = document.getElementById('lesson-nav');
  const navParts = [];
  navParts.push('<a href="index.html">← 索引</a>');
  navParts.push('<span>/</span>');
  if (prev) {
    navParts.push('<a href="lesson-' + String(prev.id).padStart(2, '0') + '.html">第' + prev.id + '課</a>');
    navParts.push('<span>/</span>');
  }
  navParts.push('<span class="current">第' + lesson.id + '課</span>');
  if (next) {
    navParts.push('<span>/</span>');
    navParts.push('<a href="lesson-' + String(next.id).padStart(2, '0') + '.html">第' + next.id + '課 →</a>');
  }
  navEl.innerHTML = navParts.join(' ');

  // ---------- Goals ----------
  const goalsList = document.getElementById('goals-list');
  if (lesson.goals && lesson.goals.length) {
    lesson.goals.forEach(g => {
      const li = document.createElement('li');
      li.textContent = g;
      goalsList.appendChild(li);
    });
  } else {
    document.getElementById('goals-block').hidden = true;
  }

  // ---------- Articles ----------
  const articlesEl = document.getElementById('articles');
  lesson.articles.forEach((article, ai) => {
    const wrap = document.createElement('article');
    wrap.className = 'article';
    const groupId = (article.kind === 'main' ? 'main' : 'sub') + '-' + ai;
    wrap.id = 'article-' + groupId;

    const meta = document.createElement('div');
    meta.className = 'article-meta';
    meta.textContent = article.kind === 'main' ? '主篇 · main reading' : '配篇 · companion reading';
    wrap.appendChild(meta);

    const h2 = document.createElement('h2');
    h2.className = 'article-title';
    h2.innerHTML = article.title.jp + '<span class="ja-small">' + escapeHtml(article.title.cn) + '</span>';
    wrap.appendChild(h2);

    const items = [];
    article.sentences.forEach((s, i) => {
      const div = document.createElement('div');
      div.className = 'sentence';
      div.dataset.group = groupId;
      div.dataset.index = String(i);
      div.innerHTML =
        '<div class="jp-text">' + s.jp + '</div>' +
        '<div class="romaji">' + escapeHtml(s.romaji) + '</div>' +
        '<div class="translation">' + escapeHtml(s.cn) + '</div>';
      wrap.appendChild(div);
      items.push({ plain: s.plain, el: div });
    });

    articlesEl.appendChild(wrap);
    playableGroups.push({ groupId, items });
  });

  // ---------- Dialogue ----------
  if (lesson.dialogue && lesson.dialogue.lines && lesson.dialogue.lines.length) {
    document.getElementById('dialogue-divider').hidden = false;
    document.getElementById('dialogue-block').hidden = false;
    const sceneEl = document.getElementById('dialogue-scene');
    sceneEl.textContent = lesson.dialogue.scene.jp + ' / ' + lesson.dialogue.scene.cn;
    const linesEl = document.getElementById('dialogue-lines');
    const items = [];
    lesson.dialogue.lines.forEach((line, i) => {
      const div = document.createElement('div');
      div.className = 'dialogue-line';
      div.dataset.group = 'dialogue';
      div.dataset.index = String(i);
      div.innerHTML =
        '<div class="speaker">' + escapeHtml(line.speaker) + '</div>' +
        '<div class="jp-text">' + line.jp + '</div>' +
        '<div class="romaji">' + escapeHtml(line.romaji) + '</div>' +
        '<div class="translation">' + escapeHtml(line.cn) + '</div>';
      linesEl.appendChild(div);
      items.push({ plain: line.plain, el: div });
    });
    playableGroups.push({ groupId: 'dialogue', items });
  }

  // ---------- Questions ----------
  if (lesson.questions && lesson.questions.length) {
    document.getElementById('questions-divider').hidden = false;
    const qBlock = document.getElementById('questions-block');
    qBlock.hidden = false;
    lesson.questions.forEach((qa, i) => {
      const div = document.createElement('div');
      div.className = 'question';
      div.innerHTML =
        '<div class="question-q">' +
          '<span class="q-mark">Q' + (i + 1) + '</span>' +
          '<div class="jp-text">' + qa.q.jp + '</div>' +
          '<div class="romaji">' + escapeHtml(qa.q.romaji) + '</div>' +
          '<div class="translation">' + escapeHtml(qa.q.cn) + '</div>' +
        '</div>' +
        '<div class="question-a">' +
          '<span class="q-mark">A</span>' +
          '<div class="jp-text">' + qa.a.jp + '</div>' +
          '<div class="romaji">' + escapeHtml(qa.a.romaji) + '</div>' +
          '<div class="translation">' + escapeHtml(qa.a.cn) + '</div>' +
          (qa.hint ? '<div class="question-hint">提示：' + escapeHtml(qa.hint) + '</div>' : '') +
        '</div>';
      qBlock.appendChild(div);
    });
  }

  // ---------- Vocabulary ----------
  const vocabGrid = document.getElementById('vocab-grid');
  lesson.vocabulary.forEach(v => {
    const div = document.createElement('div');
    div.className = 'vocab-item';
    div.innerHTML =
      '<div class="vocab-jp">' + escapeHtml(v.jp) + (v.pos ? '<span class="vocab-pos">' + escapeHtml(v.pos) + '</span>' : '') + '</div>' +
      '<div class="vocab-kana">' + escapeHtml(v.kana) + '</div>' +
      '<div class="vocab-romaji">' + escapeHtml(v.romaji) + '</div>' +
      '<div class="vocab-meaning">' + escapeHtml(v.meaning) + '</div>';
    vocabGrid.appendChild(div);
  });

  // ---------- Grammar ----------
  const grammarNotes = document.getElementById('grammar-notes');
  lesson.grammar.forEach(g => {
    const div = document.createElement('div');
    div.className = 'grammar-point';
    let ex = '';
    if (g.examples && g.examples.length) {
      ex = '<div class="grammar-examples">' +
        g.examples.map(e =>
          '<div class="grammar-example">' +
            '<div class="ex-jp">' + e.jp + '</div>' +
            '<div class="ex-cn">' + escapeHtml(e.cn) + '</div>' +
          '</div>'
        ).join('') +
        '</div>';
    }
    div.innerHTML =
      '<div><span class="grammar-pattern">' + escapeHtml(g.pattern) + '</span>' +
      '<span class="grammar-name">' + escapeHtml(g.name) + '</span></div>' +
      '<div class="grammar-explain">' + escapeHtml(g.explain) + '</div>' +
      ex;
    grammarNotes.appendChild(div);
  });

  // ---------- Toggles ----------
  document.querySelectorAll('.toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      const type = btn.dataset.toggle;
      const state = btn.dataset.state;
      document.querySelectorAll('.toggle[data-toggle="' + type + '"]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (state === 'off') document.body.classList.add('hide-' + type);
      else document.body.classList.remove('hide-' + type);
    });
  });

  // ---------- Speech ----------
  const synth = window.speechSynthesis;
  let jaVoice = null;
  const ttsStatus = document.getElementById('tts-status');
  const nowReading = document.getElementById('now-reading');
  const speedSelect = document.getElementById('speed-select');

  function pickJapaneseVoice() {
    if (!synth) return;
    const voices = synth.getVoices();
    const preferred = voices.find(v => v.lang === 'ja-JP' && /Kyoko|Otoya|O-ren|Google/i.test(v.name));
    jaVoice = preferred || voices.find(v => v.lang === 'ja-JP') || voices.find(v => v.lang.startsWith('ja'));
    if (jaVoice) {
      ttsStatus.textContent = '音声 · ' + jaVoice.name.split(' ')[0];
      ttsStatus.classList.remove('unavailable');
    } else {
      ttsStatus.textContent = '音声 · 未対応';
      ttsStatus.classList.add('unavailable');
    }
  }

  if (synth) {
    pickJapaneseVoice();
    synth.onvoiceschanged = pickJapaneseVoice;
  } else {
    ttsStatus.textContent = '音声 · 未対応';
    ttsStatus.classList.add('unavailable');
  }

  let queue = [];
  let isPlaying = false;

  function speak(text, onEnd) {
    if (!synth) { onEnd && onEnd(); return; }
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ja-JP';
    if (jaVoice) u.voice = jaVoice;
    u.rate = parseFloat(speedSelect.value);
    u.pitch = 1.0;
    u.onend = () => onEnd && onEnd();
    u.onerror = () => onEnd && onEnd();
    synth.speak(u);
  }

  function clearPlaying() {
    document.querySelectorAll('.sentence.playing, .dialogue-line.playing').forEach(s => s.classList.remove('playing'));
  }

  function findItem(groupId, index) {
    const g = playableGroups.find(g => g.groupId === groupId);
    return g ? g.items[index] : null;
  }

  function playItem(groupId, index) {
    if (!synth) return;
    synth.cancel();
    clearPlaying();
    const item = findItem(groupId, index);
    if (!item) return;
    item.el.classList.add('playing');
    nowReading.textContent = item.plain;
    speak(item.plain, () => {
      item.el.classList.remove('playing');
      if (queue.length > 0) {
        const next = queue.shift();
        playItem(next.group, next.index);
      } else {
        isPlaying = false;
        nowReading.textContent = '完了 / done';
      }
    });
  }

  document.querySelectorAll('.sentence, .dialogue-line').forEach(el => {
    el.addEventListener('click', () => {
      queue = [];
      isPlaying = true;
      playItem(el.dataset.group, parseInt(el.dataset.index, 10));
    });
  });

  document.getElementById('play-all').addEventListener('click', () => {
    if (!synth) return;
    if (isPlaying) {
      synth.cancel();
      queue = [];
      isPlaying = false;
      clearPlaying();
      nowReading.textContent = '一時停止 / paused';
      return;
    }
    queue = [];
    playableGroups.forEach(g => {
      g.items.forEach((_, i) => queue.push({ group: g.groupId, index: i }));
    });
    if (queue.length === 0) return;
    isPlaying = true;
    const first = queue.shift();
    playItem(first.group, first.index);
  });

  document.addEventListener('visibilitychange', () => {
    if (document.hidden && synth) {
      synth.cancel();
      queue = [];
      isPlaying = false;
      clearPlaying();
    }
  });

  // ---------- helpers ----------
  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
  function stripTags(s) { return String(s).replace(/<[^>]*>/g, ''); }
})();
</script>
</body>
</html>
