<style>

    display: flex;

    justify-content: center;

  .sentence:hover { background: var(--accent-soft); }
  .sentence.playing { background: var(--accent-soft); }

  .sentence.playing::before {
    content: '';
    position: absolute;
    left: 0;
    top: 14px;
    bottom: 14px;
    width: 2px;
    background: var(--accent);

    font-family: var(--serif-jp);
    font-size: 18px;
    line-height: 2.1;
    color: var(--fg-primary);
    letter-spacing: 0.02em;

  ruby { ruby-position: over; }

  rt {
    font-family: var(--sans-jp);
    font-size: 0.5em;
    color: var(--fg-tertiary);
    font-weight: 400;
    letter-spacing: 0;

    font-style: italic;
    font-size: 12px;
    color: var(--fg-tertiary);
    line-height: 1.6;
    margin-top: 6px;
    letter-spacing: 0.01em;

    font-family: var(--sans-jp);
    font-size: 12px;
    color: var(--fg-secondary);
    margin-top: 6px;
    line-height: 1.6;

  .question-hint {

    font-size: 11px;
    color: var(--fg-tertiary);
    margin-top: 6px;
    font-style: italic;

    align-items: center;
    gap: 16px;

  .section-divider::before,
  .section-divider::after {
    content: '';
    flex: 1;

    text-transform: uppercase;

  .vocab-meaning { font-family: var(--sans-jp); font-size: 13px; color: var(--fg-secondary); }

  .grammar-point { padding: 18px 0; border-bottom: 1px solid var(--border-subtle); }
  .grammar-pattern { font-family: var(--mono); font-size: 13px; color: var(--accent); background: var(--accent-soft); padding: 2px 8px; border-radius: 2px; display: inline-block; margin-bottom: 8px; }
  .grammar-name { font-family: var(--sans-jp); font-size: 12px; color: var(--fg-tertiary); margin-left: 8px; }
  .grammar-explain { font-family: var(--sans-jp); font-size: 13px; color: var(--fg-secondary); line-height: 1.75; margin-bottom: 10px; }
  .grammar-examples { background: var(--bg-elevated); padding: 10px 14px; border-radius: 2px; font-size: 13px; }
  .grammar-example { padding: 4px 0; }

  .footer {
    margin-top: 80px;

    border-top: 1px solid var(--border-default);
    font-family: var(--mono);
    font-size: 10px;

  .tts-status { font-family: var(--mono); font-size: 10px; color: var(--fg-tertiary); letter-spacing: 0.05em; }

  @media (max-width: 600px) {
    .container { padding: 40px 20px 64px; }
    .masthead { flex-direction: column; align-items: flex-start; }
    .masthead-meta { text-align: left; }

    .vocab-item { grid-template-columns: 1fr; gap: 4px; padding: 12px 0; }
    .controls { flex-direction: column; align-items: flex-start; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition-duration: 0.01ms !important; }
  }
</style>

ji":"haha ni kekka o tsutaeru to, shikarareru to omotta keredo, haha wa yasashiku hagemashite kureta.","cn":"把结果告诉母亲，本以为会被骂，但母亲温柔地鼓励了我。"},{"jp":"「<ruby>努力<rt>どりょく</rt></ruby>しても、すぐに<ruby>結果<rt>けっか</rt></ruby>が<ruby>出<rt>で</rt></ruby>ないこともあるのよ」と<ruby>言<rt>い</rt></ruby>った。","plain":"「どりょくしても、すぐにけっかがでないこともあるのよ」といった。","romaji":"\"doryoku shite mo, sugu ni kekka ga denai koto mo aru no yo\" to itta.","cn":"她说\"即使努力了，也有不会马上出结果的时候\"。"},{"jp":"<ruby>確<rt>たし</rt></ruby>かに、<ruby>結果<rt>けっか</rt></ruby>はだめだったけれど、<ruby>勉強<rt>べんきょう</rt></ruby>した<ruby>時間<rt>じかん</rt></ruby>は<ruby>無駄<rt>むだ</rt></ruby>ではなかったはずだ。","plain":"たしかに、けっかはだめだったけれど、べんきょうしたじかんはむだではなかったはずだ。","romaji":"tashika ni, kekka wa dame datta keredo, benkyou shita jikan wa muda de wa nakatta hazu da.","cn":"的确，结果不行，但学习的时间不应该是白费的。"},{"jp":"<ruby>失敗<rt>しっぱい</rt></ruby>したにもかかわらず、<ruby>得<rt>え</rt></ruby>たものはたくさんあると<ruby>気<rt>き</rt></ruby>がついた。","plain":"しっぱいしたにもかかわらず、えたものはたくさんあるときがついた。","romaji":"shippai shita ni mo kakawarazu, eta mono wa takusan aru to ki ga tsuita.","cn":"尽管失败了，我意识到得到的东西也很多。"},{"jp":"<ruby>来年<rt>らいねん</rt></ruby>もう<ruby>一度<rt>いちど</rt></ruby><ruby>挑戦<rt>ちょうせん</rt></ruby>しようと<ruby>決<rt>き</rt></ruby>めた。","plain":"らいねんもういちどちょうせんしようときめた。","romaji":"rainen mou ichido chousen shiyou to kimeta.","cn":"决定明年再挑战一次。"}]},{"kind":"companion","title":{"jp":"雨でも行きます","romaji":"ame de mo ikimasu","cn":"即使下雨也去"},"sentences":[{"jp":"<ruby>明日<rt>あした</rt></ruby>は<ruby>友達<rt>ともだち</rt></ruby>と<ruby>登山<rt>とざん</rt></ruby>に<ruby>行<rt>い</rt></ruby>く<ruby>予定<rt>よてい</rt></ruby>だ。","plain":"あしたはともだちととざんにいくよていだ。","romaji":"ashita wa tomodachi to tozan ni iku yotei da.","cn":"明天打算和朋友去登山。"},{"jp":"<ruby>天気予報<rt>てんきよほう</rt></ruby>では<ruby>雨<rt>あめ</rt></ruby>が<ruby>降<rt>ふ</rt></ruby>るかもしれないと<ruby>言<rt>い</rt></ruby>っている。","plain":"てんきよほうではあめがふるかもしれないといっている。","romaji":"tenki-yohou de wa ame ga furu kamoshirenai to itteiru.","cn":"天气预报说可能会下雨。"},{"jp":"でも、<ruby>雨<rt>あめ</rt></ruby>が<ruby>降<rt>ふ</rt></ruby>っても<ruby>行<rt>い</rt></ruby>きます。","plain":"でも、あめがふってもいきます。","romaji":"demo, ame ga futte mo ikimasu.","cn":"不过，即使下雨也去。"},{"jp":"<ruby>友達<rt>ともだち</rt></ruby>とずっと<ruby>前<rt>まえ</rt></ruby>から<ruby>計画<rt>けいかく</rt></ruby>していたのに、<ruby>中止<rt>ちゅうし</rt></ruby>するのはもったいない。","plain":"ともだちとずっとまえからけいかくしていたのに、ちゅうしするのはもったいない。","romaji":"tomodachi to zutto mae kara keikaku shiteita no ni, chuushi suru no wa mottainai.","cn":"明明和朋友老早就计划好了，取消太可惜了。"},{"jp":"レインコートと<ruby>長靴<rt>ながぐつ</rt></ruby>を<ruby>用意<rt>ようい</rt></ruby>すれば、<ruby>雨<rt>あめ</rt></ruby>でも<ruby>大丈夫<rt>だいじょうぶ</rt></ruby>だ。","plain":"レインコートとながぐつをよういすれば、あめでもだいじょうぶだ。","romaji":"reinkooto to nagagutsu o youi sureba, ame de mo daijoubu da.","cn":"准备好雨衣和雨靴，下雨也没关系。"},{"jp":"どんなに<ruby>大変<rt>たいへん</rt></ruby>でも、<ruby>頂上<rt>ちょうじょう</rt></ruby>まで<ruby>登<rt>のぼ</rt></ruby>りたい。","plain":"どんなにたいへんでも、ちょうじょうまでのぼりたい。","romaji":"donna ni taihen de mo, choujou made noboritai.","cn":"不管多辛苦，也想登到山顶。"},{"jp":"<ruby>雨<rt>あめ</rt></ruby>の<ruby>中<rt>なか</rt></ruby>の<ruby>山<rt>やま</rt></ruby>もきれいかもしれない。","plain":"あめのなかのやまもきれいかもしれない。","romaji":"ame no naka no yama mo kirei kamoshirenai.","cn":"雨中的山也许也很美。"},{"jp":"<ruby>雷<rt>かみなり</rt></ruby>が<ruby>鳴<rt>な</rt></ruby>ったら<ruby>危<rt>あぶ</rt></ruby>ないので、その<ruby>場合<rt>ばあい</rt></ruby>は<ruby>諦<rt>あきら</rt></ruby>めるけれど。","plain":"かみなりがなったらあぶないので、そのばあいはあきらめるけれど。","romaji":"kaminari ga nattara abunai node, sono baai wa akirameru keredo.","cn":"不过打雷的话很危险，那种情况就放弃。"}]}],"dialogue":{"scene":{"jp":"同僚同士で意外な結果に対する不満を話している。","cn":"同事间抱怨意外的结果。"},"lines":[{"speaker":"田中","jp":"<ruby>昨日<rt>きのう</rt></ruby>のプレゼン、<ruby>一<rt>いっ</rt></ruby>か<ruby>月<rt>げつ</rt></ruby>も<ruby>準備<rt>じゅんび</rt></ruby>したのに、<ruby>評価<rt>ひょうか</rt></ruby>が<ruby>低<rt>ひく</rt></ruby>かったよ。","plain":"きのうのプレゼン、いっかげつもじゅんびしたのに、ひょうかがひくかったよ。","romaji":"kinou no purezen, ikkagetsu mo junbi shita no ni, hyouka ga hikukatta yo.","cn":"昨天的演讲，明明准备了一个月，评价却很低。"},{"speaker":"<ruby>鈴木<rt>すずき</rt></ruby>","jp":"<ruby>本当<rt>ほんとう</rt></ruby>？あんなに<ruby>頑張<rt>がんば</rt></ruby>っていたのに、<ruby>残念<rt>ざんねん</rt></ruby>だね。","plain":"ほんとう？あんなにが <rt>どりょく</rt></ruby>したのに<ruby>不合格<rt>ふごうかく</rt></ruby>で、<ruby>友達<rt>ともだち</rt></ruby>はあまり<ruby>勉強<rt>べんきょう</rt></ruby>しなかったにもかかわらず<ruby>合格<rt>ごうかく</rt></ruby>したからです。","plain":"どりょくしたのにふごうかくで、ともだちはあまりべんきょうしなかったにもかかわらずごうかくしたからです。","romaji":"doryoku shita no ni fugoukaku de, tomodachi wa amari benkyou shinakatta ni mo kakawarazu goukaku shita kara desu.","cn":"因为自己明明努力却不合格，朋友尽管没怎么学却合格了。"},"hint":"注意「のに」带不甘，「にもかかわらず」客观转折。"},{"q":{"jp":"<ruby>明日<rt>あした</rt></ruby><ruby>雨<rt>あめ</rt></ruby>が<ruby>降<rt>ふ</rt></ruby>ったら、<ruby>登山<rt>とざん</rt></ruby>を<ruby>中止<rt>ちゅうし</rt></ruby>しますか。","plain":"あしたあめがふったら、とざんをちゅうししますか。","romaji":"ashita ame ga futtara, tozan o chuushi shimasu ka.","cn":"明天下雨的话，会取消登山吗？"},"a":{"jp":"いいえ、<ruby>雨<rt>あめ</rt></ruby>が<ruby>降<rt>ふ</rt></ruby>っても<ruby>行<rt>い</rt></ruby>きます。でも、<ruby>雷<rt>かみなり</rt></ruby>が<ruby>鳴<rt>な</rt></ruby>ったら<ruby>諦<rt>あきら</rt></ruby>めます。","plain":"いいえ、あめがふってもいきます。でも、かみなりがなったらあきらめます。","romaji":"iie, ame ga futte mo ikimasu. demo, kaminari ga nattara akiramemasu.","cn":"不，下雨也去。不过打雷就放弃。"}},{"q":{"jp":"田中さんはどうしてプレゼンの<ruby>評価<rt>ひょうか</rt></ruby>が<ruby>低<rt>ひく</rt></ruby>かったのですか。","plain":"たなかさんはどうしてプレゼンのひょうかがひくかったのですか。","romaji":"Tanaka-san wa doushite purezen no hyouka ga hikukatta no desu ka.","cn":"田中为什么演讲评价低？"},"a":{"jp":"<ruby>内容<rt>ないよう</rt></ruby>はよかったけれど、<ruby>緊張<rt>きんちょう</rt></ruby>して<ruby>声<rt>こえ</rt></ruby>が<ruby>震<rt>ふる</rt></ruby>えてしまったからです。","plain":"ないようはよかったけれど、きんちょうしてこえがふるえてしまったからです。","romaji":"naiyou wa yokatta keredo, kinchou shite koe ga furuete shimatta kara desu.","cn":"因为内容虽然好，但太紧张导致声音发抖。"}}],"vocabulary":[{"jp":"試験","kana":"しけん","romaji":"shiken","meaning":"考试","pos":"名詞"},{"jp":"結果","kana":"けっか","romaji":"kekka","meaning":"结果","pos":"名詞"},{"jp":"不合格","kana":"ふごうかく","romaji":"fugoukaku","meaning":"不合格","pos":"名詞"},{"jp":"合格","kana":"ごうかく","romaji":"goukaku","meaning":"合格","pos":"名詞"},{"jp":"悔しい","kana":"くやしい","romaji":"kuyashii","meaning":"不甘心","pos":"い形容詞"},{"jp":"気持ち","kana":"きもち","romaji":"kimochi","meaning":"心情","pos":"名詞"},{"jp":"失敗します","kana":"しっぱいします","romaji":"shippai shimasu","meaning":"失败","pos":"動詞III"},{"jp":"挑戦します","kana":"ちょうせんします","romaji":"chousen shimasu","meaning":"挑战","pos":"動詞III"},{"jp":"伝えます","kana":"つたえます","romaji":"tsutaemasu","meaning":"传达","pos":"動詞II"},{"jp":"叱ります","kana":"しかります","romaji":"shikarimasu","meaning":"责骂","pos":"動詞I"},{"jp":"励まします","kana":"はげまします","romaji":"hagemashimasu","meaning":"鼓励","pos":"動詞I"},{"jp":"無駄","kana":"むだ","romaji":"muda","meaning":"徒劳；浪费","pos":"な形容詞"},{"jp":"はず","kana":"はず","romaji":"hazu","meaning":"应该","pos":"名詞"},{"jp":"気がつきます","kana":"きがつきます","romaji":"ki ga tsukimasu","meaning":"注意到","pos":"動詞I"},{"jp":"決めます","kana":"きめます","romaji":"kimemasu","meaning":"决定","pos":"動詞II"},{"jp":"登山","kana":"とざん","romaji":"tozan","meaning":"登山","pos":"名詞"},{"jp":"予定","kana":"よてい","romaji":"yotei","meaning":"预定","pos":"名詞"},{"jp":"中止します","kana":"ちゅうしします","romaji":"chuushi shimasu","meaning":"中止","pos":"動詞III"},{"jp":"もったいない","kana":"もったいない","romaji":"mottainai","meaning":"可惜","pos":"い形容詞"},{"jp":"レインコート","kana":"レインコート","romaji":"reinkooto","meaning":"雨衣","pos":"名詞"},{"jp":"長靴","kana":"ながぐつ","romaji":"nagagutsu","meaning":"雨靴","pos":"名詞"},{"jp":"用意します","kana":"よういします","romaji":"youi shimasu","meaning":"准备","pos":"動詞III"},{"jp":"頂上","kana":"ちょうじょう","romaji":"choujou","meaning":"山顶","pos":"名詞"},{"jp":"登ります","kana":"のぼります","romaji":"noborimasu","meaning":"攀登","pos":"動詞I"},{"jp":"雷","kana":"かみなり","romaji":"kaminari","meaning":"雷","pos":"名詞"},{"jp":"鳴ります","kana":"なります","romaji":"narimasu","meaning":"响","pos":"動詞I"},{"jp":"危ない","kana":"あぶない","romaji":"abunai","meaning":"危险","pos":"い形容詞"},{"jp":"諦めます","kana":"あきらめます","romaji":"akiramemasu","meaning":"放弃","pos":"動詞II"},{"jp":"プレゼン","kana":"プレゼン","romaji":"purezen","meaning":"演讲展示","pos":"名詞"},{"jp":"評価","kana":"ひょうか","romaji":"hyouka","meaning":"评价","pos":"名詞"},{"jp":"残念","kana":"ざんねん","romaji":"zannen","meaning":"遗憾","pos":"な形容詞"},{"jp":"内容","kana":"ないよう","romaji":"naiyou","meaning":"内容","pos":"名詞"},{"jp":"緊張します","kana":"きんちょうします","romaji":"kinchou shimasu","meaning":"紧张","pos":"動詞III"},{"jp":"震えます","kana":"ふるえます","romaji":"furuemasu","meaning":"颤抖","pos":"動詞II"},{"jp":"慣れます","kana":"なれます","romaji":"naremasu","meaning":"习惯","pos":"動詞II"},{"jp":"経験","kana":"けいけん","romaji":"keiken","meaning":"经验","pos":"名詞"},{"jp":"次回","kana":"じかい","romaji":"jikai","meaning":"下次","pos":"名詞"},{"jp":"成長","kana":"せいちょう","romaji":"seichou","meaning":"成长","pos":"名詞"}],"grammar":[{"pattern":"普通形 + のに","name":"逆接（带不满情绪）","explain":"\"明明...却...\"。表示与预期相反的结果，且带有说话人的不满、惋惜、惊讶等强烈情绪色彩。这是与「ても」「けれど」最大的区别——「のに」是情感的、主观的。形容动词、名词后用「Na/N+なのに」：「静かなのに」「学生なのに」。不能用于客观陈述或自己有意识的让步。常带感叹语气结尾。","examples":[{"jp":"<ruby>毎日<rt>まいにち</rt></ruby><ruby>練習<rt>れんしゅう</rt></ruby>したのに、<ruby>上手<rt>じょうず</rt></ruby>になれない。","plain":"まいにちれんしゅうしたのに、じょうずになれない。","cn":"明明每天练习，却没变厉害。"},{"jp":"<ruby>子供<rt>こども</rt></ruby>なのに、<ruby>大人<rt>おとな</rt></ruby>みたいに<ruby>話<rt>はな</rt></ruby>す。","plain":"こどもなのに、おとなみたいにはなす。","cn":"明明是小孩，说话却像大人。"}]},{"pattern":"V て形 + も / Aく + ても / Na・N + でも","name":"逆接（中性，可表假设）","explain":"\"即使...也\"。中性的逆接，没有情感色彩，可以表示既成事实或假设条件。变化：动词て形+も；い形容词去い+くても；な形容词、名词+でも。「雨が降っても行く」（即使下雨也去）。常和「どんなに〜ても」「いくら〜ても」搭配，强调\"不论...都...\"。","examples":[{"jp":"どんなに<ruby>高<rt>たか</rt></ruby>くても<ruby>買<rt>か</rt></ruby>います。","plain":"どんなにたかくてもかいます。","cn":"不管多贵也要买。"},{"jp":"<ruby>子供<rt>こども</rt></ruby>でもわかる<ruby>問題<rt>もんだい</rt></ruby>です。","plain":"こどもでもわかるもんだいです。","cn":"即使是小孩也能懂的问题。"}]},{"pattern":"普通形 + けれど(も) / けど","name":"逆接（口语转折）","explain":"\"但是...\"。日常口语最常用的转折。「けれども」最郑重，「けれど」中性，「けど」最口语化。也可放句末作\"留有余地\"的客气表达：「ちょっと聞きたいんですけど…」。和「が」用法相近但更口语化。注意：句中用，前后两句构成对比。","examples":[{"jp":"この<ruby>店<rt>みせ</rt></ruby>は<ruby>高<rt>たか</rt></ruby>いけれど、<ruby>美味<rt>おい</rt></ruby>しい。","plain":"このみせはたかいけれど、おいしい。","cn":"这家店贵但好吃。"},{"jp":"すみません、ちょっと<ruby>聞<rt>き</rt></ruby>きたいんですけど。","plain":"すみません、ちょっとききたいんですけど。","cn":"不好意思，我想问一下…"}]},{"pattern":"普通形 + にもかかわらず","name":"逆接（书面，最正式）","explain":"\"尽管...但是...\"。最正式、最书面的逆接表达，多用于报告、新闻、论说文。意思接近「のに」但没有情感色彩，更客观。「Nにもかかわらず」（不需要「である」）也常见。和「ても」相比，「にもかかわらず」语气更强，强调\"按理说不该...但还是...\"。","examples":[{"jp":"<ruby>悪天候<rt>あくてんこう</rt></ruby>にもかかわらず、<ruby>試合<rt>しあい</rt></ruby>は<ruby>行<rt>おこな</rt></ruby>われた。","plain":"あくてんこうにもかかわらず、しあいはおこなわれた。","cn":"尽管天气恶劣，比赛仍举行了。"},{"jp":"<ruby>努力<rt>どりょく</rt></ruby>したにもかかわらず、<ruby>結果<rt>けっか</rt></ruby>は<ruby>出<rt>で</rt></ruby>なかった。","plain":"どりょくしたにもかかわらず、けっかはでなかった。","cn":"尽管努力了，没出结果。"}]},{"pattern":"どんなに / いくら〜ても","name":"不论多么...也...","explain":"强调程度的让步。「どんなに高くても買う」（不管多贵也买）。和单纯的「ても」相比，加上「どんなに」「いくら」更强调极端程度。常和否定结尾搭配：「いくら言っても聞かない」（怎么说都不听）。","examples":[{"jp":"いくら<ruby>呼<rt>よ</rt></ruby>んでも<ruby>返事<rt>へんじ</rt></ruby>がない。","plain":"いくらよんでもへんじがない。","cn":"怎么叫都没有回应。"},{"jp":"どんなに<ruby>疲<rt>つか</rt></ruby>れていても、<ruby>仕事<rt>しごと</rt></ruby>は<ruby>休<rt>やす</rt></ruby>めない。","plain":"どんなにつかれていても、しごとはやすめない。","cn":"不管多累，工作都不能休。"}]}]},"prev":{"id":29,"title":"推量"},"next":{"id":31,"title":"接続表現②（同時・状態）"}}</script>
<script>
(() => {
  const data = JSON.parse(document.getElementById('lesson-data').textContent);
  const lesson = data.lesson;
  const prev = data.prev; // { id, title } | null
  const next = data.next;

  // Flatten "playable" sentences for the global play-all queue.
  // group: 'main-N' / 'sub-N' / 'dialogue' (each has its own DOM nodes)
  const playableGroups = []; // [{ groupId, items: [{ plain, el }] }]

  // ---------- Masthead / nav ----------
  const lessonNo = String(lesson.id).padStart(2, '0');
  document.title = lesson.level + ' · 第' + lesson.id + '課 — ' + stripTags(lesson.title.jp);
  document.getElementById('m-level').textContent = lesson.level + ' — Lesson ' + lessonNo;
  document.getElementById('m-title-jp').innerHTML = lesson.title.jp;
  document.getElementById('m-title-en').textContent = lesson.title.romaji + ' · ' + lesson.title.en;
  document.getElementById('m-lesson-no').textContent = '第 ' + lesson.id + ' 課';
  document.getElementById('footer-meta').textContent = '日本語 ' + lesson.level + ' · 第' + lesson.id + '課';

  const navEl = document.getElementById('lesson-nav');
  const navParts = [];
  navParts.push('<a href="index.html">← 索引</a>');
  navParts.push('<span>/</span>');
  if (prev) {
    navParts.push('<a href="lesson-' + String(prev.id).padStart(2, '0') + '.html">第' + prev.id + '課</a>');
    navParts.push('<span>/</span>');
  }
  navParts.push('<span class="current">第' + lesson.id + '課</span>');
  if (next) {
    navParts.push('<span>/</span>');
    navParts.push('<a href="lesson-' + String(next.id).padStart(2, '0') + '.html">第' + next.id + '課 →</a>');
  }
  navEl.innerHTML = navParts.join(' ');

  // ---------- Goals ----------
  const goalsList = document.getElementById('goals-list');
  if (lesson.goals && lesson.goals.length) {
    lesson.goals.forEach(g => {
      const li = document.createElement('li');
      li.textContent = g;
      goalsList.appendChild(li);
    });
  } else {
    document.getElementById('goals-block').hidden = true;
  }

  // ---------- Articles ----------
  const articlesEl = document.getElementById('articles');
  lesson.articles.forEach((article, ai) => {
    const wrap = document.createElement('article');
    wrap.className = 'article';
    const groupId = (article.kind === 'main' ? 'main' : 'sub') + '-' + ai;
    wrap.id = 'article-' + groupId;

    const meta = document.createElement('div');
    meta.className = 'article-meta';
    meta.textContent = article.kind === 'main' ? '主篇 · main reading' : '配篇 · companion reading';
    wrap.appendChild(meta);

    const h2 = document.createElement('h2');
    h2.className = 'article-title';
    h2.innerHTML = article.title.jp + '<span class="ja-small">' + escapeHtml(article.title.cn) + '</span>';
    wrap.appendChild(h2);

    const items = [];
    article.sentences.forEach((s, i) => {
      const div = document.createElement('div');
      div.className = 'sentence';
      div.dataset.group = groupId;
      div.dataset.index = String(i);
      div.innerHTML =
        '<div class="jp-text">' + s.jp + '</div>' +
        '<div class="romaji">' + escapeHtml(s.romaji) + '</div>' +
        '<div class="translation">' + escapeHtml(s.cn) + '</div>';
      wrap.appendChild(div);
      items.push({ plain: s.plain, el: div });
    });

    articlesEl.appendChild(wrap);
    playableGroups.push({ groupId, items });
  });

  // ---------- Dialogue ----------
  if (lesson.dialogue && lesson.dialogue.lines && lesson.dialogue.lines.length) {
    document.getElementById('dialogue-divider').hidden = false;
    document.getElementById('dialogue-block').hidden = false;
    const sceneEl = document.getElementById('dialogue-scene');
    sceneEl.textContent = lesson.dialogue.scene.jp + ' / ' + lesson.dialogue.scene.cn;
    const linesEl = document.getElementById('dialogue-lines');
    const items = [];
    lesson.dialogue.lines.forEach((line, i) => {
      const div = document.createElement('div');
      div.className = 'dialogue-line';
      div.dataset.group = 'dialogue';
      div.dataset.index = String(i);
      div.innerHTML =
        '<div class="speaker">' + escapeHtml(line.speaker) + '</div>' +
        '<div class="jp-text">' + line.jp + '</div>' +
        '<div class="romaji">' + escapeHtml(line.romaji) + '</div>' +
        '<div class="translation">' + escapeHtml(line.cn) + '</div>';
      linesEl.appendChild(div);
      items.push({ plain: line.plain, el: div });
    });
    playableGroups.push({ groupId: 'dialogue', items });
  }

  // ---------- Questions ----------
  if (lesson.questions && lesson.questions.length) {
    document.getElementById('questions-divider').hidden = false;
    const qBlock = document.getElementById('questions-block');
    qBlock.hidden = false;
    lesson.questions.forEach((qa, i) => {
      const div = document.createElement('div');
      div.className = 'question';
      div.innerHTML =
        '<div class="question-q">' +
          '<span class="q-mark">Q' + (i + 1) + '</span>' +
          '<div class="jp-text">' + qa.q.jp + '</div>' +
          '<div class="romaji">' + escapeHtml(qa.q.romaji) + '</div>' +
          '<div class="translation">' + escapeHtml(qa.q.cn) + '</div>' +
        '</div>' +
        '<div class="question-a">' +
          '<span class="q-mark">A</span>' +
          '<div class="jp-text">' + qa.a.jp + '</div>' +
          '<div class="romaji">' + escapeHtml(qa.a.romaji) + '</div>' +
          '<div class="translation">' + escapeHtml(qa.a.cn) + '</div>' +
          (qa.hint ? '<div class="question-hint">提示：' + escapeHtml(qa.hint) + '</div>' : '') +
        '</div>';
      qBlock.appendChild(div);
    });
  }

  // ---------- Vocabulary ----------
  const vocabGrid = document.getElementById('vocab-grid');
  lesson.vocabulary.forEach(v => {
    const div = document.createElement('div');
    div.className = 'vocab-item';
    div.innerHTML =
      '<div class="vocab-jp">' + escapeHtml(v.jp) + (v.pos ? '<span class="vocab-pos">' + escapeHtml(v.pos) + '</span>' : '') + '</div>' +
      '<div class="vocab-kana">' + escapeHtml(v.kana) + '</div>' +
      '<div class="vocab-romaji">' + escapeHtml(v.romaji) + '</div>' +
      '<div class="vocab-meaning">' + escapeHtml(v.meaning) + '</div>';
    vocabGrid.appendChild(div);
  });

  // ---------- Grammar ----------
  const grammarNotes = document.getElementById('grammar-notes');
  lesson.grammar.forEach(g => {
    const div = document.createElement('div');
    div.className = 'grammar-point';
    let ex = '';
    if (g.examples && g.examples.length) {
      ex = '<div class="grammar-examples">' +
        g.examples.map(e =>
          '<div class="grammar-example">' +
            '<div class="ex-jp">' + e.jp + '</div>' +
            '<div class="ex-cn">' + escapeHtml(e.cn) + '</div>' +
          '</div>'
        ).join('') +
        '</div>';
    }
    div.innerHTML =
      '<div><span class="grammar-pattern">' + escapeHtml(g.pattern) + '</span>' +
      '<span class="grammar-name">' + escapeHtml(g.name) + '</span></div>' +
      '<div class="grammar-explain">' + escapeHtml(g.explain) + '</div>' +
      ex;
    grammarNotes.appendChild(div);
  });

  // ---------- Toggles ----------
  document.querySelectorAll('.toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      const type = btn.dataset.toggle;
      const state = btn.dataset.state;
      document.querySelectorAll('.toggle[data-toggle="' + type + '"]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (state === 'off') document.body.classList.add('hide-' + type);
      else document.body.classList.remove('hide-' + type);
    });
  });

  // ---------- Speech ----------
  const synth = window.speechSynthesis;
  let jaVoice = null;
  const ttsStatus = document.getElementById('tts-status');
  const nowReading = document.getElementById('now-reading');
  const speedSelect = document.getElementById('speed-select');

  function pickJapaneseVoice() {
    if (!synth) return;
    const voices = synth.getVoices();
    const preferred = voices.find(v => v.lang === 'ja-JP' && /Kyoko|Otoya|O-ren|Google/i.test(v.name));
    jaVoice = preferred || voices.find(v => v.lang === 'ja-JP') || voices.find(v => v.lang.startsWith('ja'));
    if (jaVoice) {
      ttsStatus.textContent = '音声 · ' + jaVoice.name.split(' ')[0];
      ttsStatus.classList.remove('unavailable');
    } else {
      ttsStatus.textContent = '音声 · 未対応';
      ttsStatus.classList.add('unavailable');
    }
  }

  if (synth) {
    pickJapaneseVoice();
    synth.onvoiceschanged = pickJapaneseVoice;
  } else {
    ttsStatus.textContent = '音声 · 未対応';
    ttsStatus.classList.add('unavailable');
  }

  let queue = [];
  let isPlaying = false;

  function speak(text, onEnd) {
    if (!synth) { onEnd && onEnd(); return; }
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ja-JP';
    if (jaVoice) u.voice = jaVoice;
    u.rate = parseFloat(speedSelect.value);
    u.pitch = 1.0;
    u.onend = () => onEnd && onEnd();
    u.onerror = () => onEnd && onEnd();
    synth.speak(u);
  }

  function clearPlaying() {
    document.querySelectorAll('.sentence.playing, .dialogue-line.playing').forEach(s => s.classList.remove('playing'));
  }

  function findItem(groupId, index) {
    const g = playableGroups.find(g => g.groupId === groupId);
    return g ? g.items[index] : null;
  }

  function playItem(groupId, index) {
    if (!synth) return;
    synth.cancel();
    clearPlaying();
    const item = findItem(groupId, index);
    if (!item) return;
    item.el.classList.add('playing');
    nowReading.textContent = item.plain;
    speak(item.plain, () => {
      item.el.classList.remove('playing');
      if (queue.length > 0) {
        const next = queue.shift();
        playItem(next.group, next.index);
      } else {
        isPlaying = false;
        nowReading.textContent = '完了 / done';
      }
    });
  }

  document.querySelectorAll('.sentence, .dialogue-line').forEach(el => {
    el.addEventListener('click', () => {
      queue = [];
      isPlaying = true;
      playItem(el.dataset.group, parseInt(el.dataset.index, 10));
    });
  });

  document.getElementById('play-all').addEventListener('click', () => {
    if (!synth) return;
    if (isPlaying) {
      synth.cancel();
      queue = [];
      isPlaying = false;
      clearPlaying();
      nowReading.textContent = '一時停止 / paused';
      return;
    }
    queue = [];
    playableGroups.forEach(g => {
      g.items.forEach((_, i) => queue.push({ group: g.groupId, index: i }));
    });
    if (queue.length === 0) return;
    isPlaying = true;
    const first = queue.shift();
    playItem(first.group, first.index);
  });

  document.addEventListener('visibilitychange', () => {
    if (document.hidden && synth) {
      synth.cancel();
      queue = [];
      isPlaying = false;
      clearPlaying();
    }
  });

  // ---------- helpers ----------
  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
  function stripTags(s) { return String(s).replace(/<[^>]*>/g, ''); }
})();
</script>
