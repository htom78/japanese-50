<style>

    font-size: 11px;

    border: none;

    color: var(--fg-secondary);

    height: 40px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;

    flex-shrink: 0;

  .audio-info {

    min-width: 0;

    padding-right: 16px;
    border-radius: 2px;
    position: relative;

  .sentence:hover { background: var(--accent-soft); }
  .sentence.playing { background: var(--accent-soft); }

  .sentence.playing::before {
    content: '';
    position: absolute;
    left: 0;
    top: 14px;
    bottom: 14px;
    width: 2px;
    background: var(--accent);
  }

  .jp-text {
    font-family: var(--serif-jp);
    font-size: 18px;
    line-height: 2.1;
    color: var(--fg-primary);
    letter-spacing: 0.02em;
  }

  /* Furigana via ruby */
  ruby { ruby-position: over; }

  rt {
    font-family: var(--sans-jp);
    font-size: 0.5em;
    color: var(--fg-tertiary);
    font-weight: 400;
    letter-spacing: 0;
    transition: opacity 300ms var(--ease);

  body.hide-furigana rt { opacity: 0; }

    font-family: var(--sans-en);
    font-style: italic;
    font-size: 12px;
    color: var(--fg-tertiary);
    line-height: 1.6;
    margin-top: 6px;
    letter-spacing: 0.01em;

  body.hide-romaji .romaji { display: none; }

    font-family: var(--sans-jp);
    font-size: 12px;
    color: var(--fg-secondary);
    margin-top: 6px;
    line-height: 1.6;

  body.hide-translation .translation { display: none; }

    font-size: 12px;

    font-style: italic;

    padding: 8px 12px;

    border-radius: 2px;

    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 4px;

    padding: 16px 0;
    border-bottom: 1px solid var(--border-subtle);

  .question-q { margin-bottom: 8px; }
  .question-a { padding-left: 16px; border-left: 2px solid var(--accent-soft); margin-top: 6px; }

  .question-hint {

    font-size: 11px;
    color: var(--fg-tertiary);
    margin-top: 6px;
    font-style: italic;
  }

  /* Notes section */

    margin: 64px 0 32px;
    display: flex;
    align-items: center;
    gap: 16px;

  .section-divider::before,
  .section-divider::after {
    content: '';

    text-transform: uppercase;

  .vocab-jp { font-family: var(--serif-jp); font-size: 15px; color: var(--fg-primary); }

  .grammar-explain { font-family: var(--sans-jp); font-size: 13px; color: var(--fg-secondary); line-height: 1.75; margin-bottom: 10px; }
  .grammar-examples { background: var(--bg-elevated); padding: 10px 14px; border-radius: 2px; font-size: 13px; }

  /* Footer */
  .footer {
    margin-top: 80px;
    padding-top: 24px;
    border-top: 1px solid var(--border-default);
    font-family: var(--mono);
    font-size: 10px;

    letter-spacing: 0.08em;

  .tts-status { font-family: var(--mono); font-size: 10px; color: var(--fg-tertiary); letter-spacing: 0.05em; }

  @media (max-width: 600px) {
    .container { padding: 40px 20px 64px; }

    .controls { flex-direction: column; align-items: flex-start; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition-duration: 0.01ms !important; }
  }
</style>

cn":"我父亲在银行工作。"},{"jp":"<ruby>毎朝<rt>まいあさ</rt></ruby>スーツを<ruby>着<rt>き</rt></ruby>て、ネクタイを<ruby>締<rt>し</rt></ruby>めています。","plain":"まいあさスーツをきて、ネクタイをしめています。","romaji":"maiasa suutsu o kite, nekutai o shimeteimasu.","cn":"每天早上穿西装、系领带。"},{"jp":"<ruby>母<rt>はは</rt></ruby>は<ruby>小学校<rt>しょうがっこう</rt></ruby>で<ruby>英語<rt>えいご</rt></ruby>を<ruby>教<rt>おし</rt></ruby>えています。","plain":"はははしょうがっこうでえいごをおしえています。","romaji":"haha wa shougakkou de eigo o oshieteimasu.","cn":"母亲在小学教英语。"},{"jp":"<ruby>兄<rt>あに</rt></ruby>はIT<ruby>会社<rt>がいしゃ</rt></ruby>でプログラマーをしています。","plain":"あにはITがいしゃでプログラマーをしています。","romaji":"ani wa IT-gaisha de puroguramaa o shiteimasu.","cn":"哥哥在IT公司当程序员。"},{"jp":"<ruby>姉<rt>あね</rt></ruby>は<ruby>結婚<rt>けっこん</rt></ruby>しています。<ruby>大阪<rt>おおさか</rt></ruby>に<ruby>住<rt>す</rt></ruby>んでいます。","plain":"あねはけっこんしています。おおさかにすんでいます。","romaji":"ane wa kekkon shiteimasu. Oosaka ni sundeimasu.","cn":"姐姐结婚了。住在大阪。"},{"jp":"<ruby>家族<rt>かぞく</rt></ruby>はみんな<ruby>頑張<rt>がんば</rt></ruby>っています。","plain":"かぞくはみんながんばっています。","romaji":"kazoku wa minna ganbatteimasu.","cn":"家人都在努力。"}]}],"dialogue":{"scene":{"jp":"電話で友達と話している。","cn":"在电话里和朋友说话。"},"lines":[{"speaker":"友達","jp":"もしもし、<ruby>今<rt>いま</rt></ruby>、<ruby>何<rt>なに</rt></ruby>をしていますか。","plain":"もしもし、いま、なにをしていますか。","romaji":"moshimoshi, ima, nani o shiteimasu ka.","cn":"喂，现在在做什么？"},{"speaker":"私","jp":"<ruby>夕食<rt>ゆうしょく</rt></ruby>を<ruby>作<rt>つく</rt></ruby>っています。あなたは。","plain":"ゆうしょくをつくっています。あなたは。","romaji":"yuushoku o tsukutteimasu. anata wa.","cn":"在做晚饭。你呢？"},{"speaker":"友達","jp":"<ruby>私<rt>わたし</rt></ruby>はカフェでコーヒーを<ruby>飲<rt>の</rt></ruby>んでいます。<ruby>仕事<rt>しごと</rt></ruby>の<ruby>後<rt>あと</rt></ruby>です。","plain":"わたしはカフェでコーヒーをのんでいます。しごとのあとです。","romaji":"watashi wa kafe de koohii o nondeimasu. shigoto no ato desu.","cn":"我在咖啡店喝咖啡。下班后。"},{"speaker":"私","jp":"お<ruby>疲<rt>つか</rt></ruby>れさま。<ruby>明日<rt>あした</rt></ruby>は<ruby>休<rt>やす</rt></ruby>みですか。","plain":"おつかれさま。あしたはやすみですか。","romaji":"o-tsukaresama. ashita wa yasumi desu ka.","cn":"辛苦了。明天休息吗？"},{"speaker":"友達","jp":"はい、<ruby>休<rt>やす</rt></ruby>みです。<ruby>一緒<rt>いっしょ</rt></ruby>にどこかへ<ruby>行<rt>い</rt></ruby>きませんか。","plain":"はい、やすみです。いっしょにどこかへいきませんか。","romaji":"hai, yasumi desu. issho ni dokoka e ikimasen ka.","cn":"嗯，休息。要不要一起去哪里？"}]},"questions":[{"q":{"jp":"お<ruby>父<rt>とう</rt></ruby>さんは<ruby>何<rt>なに</rt></ruby>をしていますか。","plain":"おとうさんはなにをしていますか。","romaji":"o-tousan wa nani o shiteimasu ka.","cn":"父亲做什么工作？"},"a":{"jp":"<ruby>銀行<rt>ぎんこう</rt></ruby>で<ruby>働<rt>はたら</rt></ruby>いています。","plain":"ぎんこうではたらいています。","romaji":"ginkou de hataraiteimasu.","cn":"在银行工作。"}},{"q":{"jp":"お<ruby>姉<rt>ねえ</rt></ruby>さんはどこに<ruby>住<rt>す</rt></ruby>んでいますか。","plain":"おねえさんはどこにすんでいますか。","romaji":"o-neesan wa doko ni sundeimasu ka.","cn":"姐姐住在哪里？"},"a":{"jp":"<ruby>大阪<rt>おおさか</rt></ruby>に<ruby>住<rt>す</rt></ruby>んでいます。<ruby>結婚<rt>けっこん</rt></ruby>しています。","plain":"おおさかにすんでいます。けっこんしています。","romaji":"Oosaka ni sundeimasu. kekkon shiteimasu.","cn":"住在大阪。已经结婚了。"},"hint":"「結婚しています」表示已婚的状态。"},{"q":{"jp":"<ruby>休日<rt>きゅうじつ</rt></ruby>の<ruby>午後<rt>ごご</rt></ruby>、<ruby>家族<rt>かぞく</rt></ruby>は<ruby>何<rt>なに</rt></ruby>をしていますか。","plain":"きゅうじつのごご、かぞくはなにをしていますか。","romaji":"kyuujitsu no gogo, kazoku wa nani o shiteimasu ka.","cn":"假日下午，家人都在做什么？"},"a":{"jp":"<ruby>子供<rt>こども</rt></ruby>たちはテレビを<ruby>見<rt>み</rt></ruby>ています。<ruby>妻<rt>つま</rt></ruby>はコーヒーを<ruby>入<rt>い</rt></ruby>れています。","plain":"こどもたちはテレビをみています。つまはコーヒーをいれています。","romaji":"kodomo-tachi wa terebi o miteimasu. tsuma wa koohii o ireteimasu.","cn":"孩子们看电视，妻子冲咖啡。"}},{"q":{"jp":"<ruby>友達<rt>ともだち</rt></ruby>は<ruby>今<rt>いま</rt></ruby>どこにいますか。","plain":"ともだちはいまどこにいますか。","romaji":"tomodachi wa ima doko ni imasu ka.","cn":"朋友现在在哪里？"},"a":{"jp":"カフェにいます。コーヒーを<ruby>飲<rt>の</rt></ruby>んでいます。","plain":"カフェにいます。コーヒーをのんでいます。","romaji":"kafe ni imasu. koohii o nondeimasu.","cn":"在咖啡店。在喝咖啡。"}}],"vocabulary":[{"jp":"今","kana":"いま","romaji":"ima","meaning":"现在","pos":"名詞"},{"jp":"ゆっくりします","kana":"ゆっくりします","romaji":"yukkuri shimasu","meaning":"悠闲地度过","pos":"動詞III"},{"jp":"雨","kana":"あめ","romaji":"ame","meaning":"雨","pos":"名詞"},{"jp":"降ります","kana":"ふります","romaji":"furimasu","meaning":"下（雨/雪）","pos":"動詞I"},{"jp":"居間","kana":"いま","romaji":"ima","meaning":"客厅","pos":"名詞"},{"jp":"テレビ","kana":"テレビ","romaji":"terebi","meaning":"电视","pos":"名詞"},{"jp":"妻","kana":"つま","romaji":"tsuma","meaning":"妻子（自己的）","pos":"名詞"},{"jp":"キッチン","kana":"キッチン","romaji":"kitchin","meaning":"厨房","pos":"名詞"},{"jp":"ソファー","kana":"ソファー","romaji":"sofaa","meaning":"沙发","pos":"名詞"},{"jp":"休日","kana":"きゅうじつ","romaji":"kyuujitsu","meaning":"假日","pos":"名詞"},{"jp":"幸せ","kana":"しあわせ","romaji":"shiawase","meaning":"幸福","pos":"な形容詞"},{"jp":"一番","kana":"いちばん","romaji":"ichiban","meaning":"最","pos":"副詞"},{"jp":"銀行","kana":"ぎんこう","romaji":"ginkou","meaning":"银行","pos":"名詞"},{"jp":"スーツ","kana":"スーツ","romaji":"suutsu","meaning":"西装","pos":"名詞"},{"jp":"着ます","kana":"きます","romaji":"kimasu","meaning":"穿（上半身）","pos":"動詞II"},{"jp":"ネクタイ","kana":"ネクタイ","romaji":"nekutai","meaning":"领带","pos":"名詞"},{"jp":"締めます","kana":"しめます","romaji":"shimemasu","meaning":"系；关","pos":"動詞II"},{"jp":"小学校","kana":"しょうがっこう","romaji":"shougakkou","meaning":"小学","pos":"名詞"},{"jp":"英語","kana":"えいご","romaji":"eigo","meaning":"英语","pos":"名詞"},{"jp":"兄","kana":"あに","romaji":"ani","meaning":"哥哥（自己的）","pos":"名詞"},{"jp":"姉","kana":"あね","romaji":"ane","meaning":"姐姐（自己的）","pos":"名詞"},{"jp":"結婚します","kana":"けっこんします","romaji":"kekkon shimasu","meaning":"结婚","pos":"動詞III"},{"jp":"住みます","kana":"すみます","romaji":"sumimasu","meaning":"居住","pos":"動詞I"},{"jp":"頑張ります","kana":"がんばります","romaji":"ganbarimasu","meaning":"努力","pos":"動詞I"},{"jp":"もしもし","kana":"もしもし","romaji":"moshimoshi","meaning":"喂（电话）","pos":"感動詞"},{"jp":"夕食","kana":"ゆうしょく","romaji":"yuushoku","meaning":"晚饭","pos":"名詞"},{"jp":"作ります","kana":"つくります","romaji":"tsukurimasu","meaning":"做；制作","pos":"動詞I"},{"jp":"カフェ","kana":"カフェ","romaji":"kafe","meaning":"咖啡店","pos":"名詞"},{"jp":"お疲れさま","kana":"おつかれさま","romaji":"o-tsukaresama","meaning":"辛苦了","pos":"慣用句"},{"jp":"プログラマー","kana":"プログラマー","romaji":"puroguramaa","meaning":"程序员","pos":"名詞"}],"grammar":[{"pattern":"V て + います（进行）","name":"正在进行","explain":"表示动作正在进行。「今、〜ています」是典型搭配。否定形「〜ていません」。","examples":[{"jp":"<ruby>今<rt>いま</rt></ruby>、<ruby>本<rt>ほん</rt></ruby>を<ruby>読<rt>よ</rt></ruby>んでいます。","plain":"いま、ほんをよんでいます。","cn":"现在在读书。"},{"jp":"<ruby>雨<rt>あめ</rt></ruby>が<ruby>降<rt>ふ</rt></ruby>っています。","plain":"あめがふっています。","cn":"正在下雨。"}]},{"pattern":"V て + います（状态）","name":"持续状态","explain":"某些动词用「ています」表示状态而非进行：結婚しています（已婚状态）、住んでいます（居住状态）、知っています（知道）、持っています（拥有）。这些动词的\"动作瞬间\"已经完成，留下的是状态。","examples":[{"jp":"<ruby>東京<rt>とうきょう</rt></ruby>に<ruby>住<rt>す</rt></ruby>んでいます。","plain":"とうきょうにすんでいます。","cn":"住在东京。"},{"jp":"<ruby>結婚<rt>けっこん</rt></ruby>しています。","plain":"けっこんしています。","cn":"已结婚。"}]},{"pattern":"V て + います（职业・习惯）","name":"职业和习惯性动作","explain":"描述职业或重复性的习惯动作。「銀行で働いています」（在银行工作）、「英語を教えています」（教英语）。","examples":[{"jp":"<ruby>銀行<rt>ぎんこう</rt></ruby>で<ruby>働<rt>はたら</rt></ruby>いています。","plain":"ぎんこうではたらいています。","cn":"在银行工作。（职业）"},{"jp":"<ruby>毎朝<rt>まいあさ</rt></ruby>ジョギングをしています。","plain":"まいあさジョギングをしています。","cn":"每天早上跑步。（习惯）"}]},{"pattern":"N₁ は N₂ で V ています","name":"场所 + 进行","explain":"场所助词用「で」（动作发生的地方）。注意与存在句的「に」区分。","examples":[{"jp":"<ruby>図書館<rt>としょかん</rt></ruby>で<ruby>勉強<rt>べんきょう</rt></ruby>しています。","plain":"としょかんでべんきょうしています。","cn":"在图书馆学习。"}]},{"pattern":"一番 + 形容詞","name":"最高级","explain":"「一番」=最，放在形容词前表示最高级。后面常加「〜が一番〜です」结构。","examples":[{"jp":"これが<ruby>一番<rt>いちばん</rt></ruby><ruby>美味<rt>おい</rt></ruby>しいです。","plain":"これがいちばんおいしいです。","cn":"这个最好吃。"}]}]},"prev":{"id":9,"title":"て形入門"},"next":{"id":11,"title":"て形けい連結れんけつ"}}</script>
<script>
(() => {
  const data = JSON.parse(document.getElementById('lesson-data').textContent);
  const lesson = data.lesson;
  const prev = data.prev; // { id, title } | null
  const next = data.next;

  // Flatten "playable" sentences for the global play-all queue.
  // group: 'main-N' / 'sub-N' / 'dialogue' (each has its own DOM nodes)
  const playableGroups = []; // [{ groupId, items: [{ plain, el }] }]

  // ---------- Masthead / nav ----------
  const lessonNo = String(lesson.id).padStart(2, '0');
  document.title = lesson.level + ' · 第' + lesson.id + '課 — ' + stripTags(lesson.title.jp);
  document.getElementById('m-level').textContent = lesson.level + ' — Lesson ' + lessonNo;
  document.getElementById('m-title-jp').innerHTML = lesson.title.jp;
  document.getElementById('m-title-en').textContent = lesson.title.romaji + ' · ' + lesson.title.en;
  document.getElementById('m-lesson-no').textContent = '第 ' + lesson.id + ' 課';
  document.getElementById('footer-meta').textContent = '日本語 ' + lesson.level + ' · 第' + lesson.id + '課';

  const navEl = document.getElementById('lesson-nav');
  const navParts = [];
  navParts.push('<a href="index.html">← 索引</a>');
  navParts.push('<span>/</span>');
  if (prev) {
    navParts.push('<a href="lesson-' + String(prev.id).padStart(2, '0') + '.html">第' + prev.id + '課</a>');
    navParts.push('<span>/</span>');
  }
  navParts.push('<span class="current">第' + lesson.id + '課</span>');
  if (next) {
    navParts.push('<span>/</span>');
    navParts.push('<a href="lesson-' + String(next.id).padStart(2, '0') + '.html">第' + next.id + '課 →</a>');
  }
  navEl.innerHTML = navParts.join(' ');

  // ---------- Goals ----------
  const goalsList = document.getElementById('goals-list');
  if (lesson.goals && lesson.goals.length) {
    lesson.goals.forEach(g => {
      const li = document.createElement('li');
      li.textContent = g;
      goalsList.appendChild(li);
    });
  } else {
    document.getElementById('goals-block').hidden = true;
  }

  // ---------- Articles ----------
  const articlesEl = document.getElementById('articles');
  lesson.articles.forEach((article, ai) => {
    const wrap = document.createElement('article');
    wrap.className = 'article';
    const groupId = (article.kind === 'main' ? 'main' : 'sub') + '-' + ai;
    wrap.id = 'article-' + groupId;

    const meta = document.createElement('div');
    meta.className = 'article-meta';
    meta.textContent = article.kind === 'main' ? '主篇 · main reading' : '配篇 · companion reading';
    wrap.appendChild(meta);

    const h2 = document.createElement('h2');
    h2.className = 'article-title';
    h2.innerHTML = article.title.jp + '<span class="ja-small">' + escapeHtml(article.title.cn) + '</span>';
    wrap.appendChild(h2);

    const items = [];
    article.sentences.forEach((s, i) => {
      const div = document.createElement('div');
      div.className = 'sentence';
      div.dataset.group = groupId;
      div.dataset.index = String(i);
      div.innerHTML =
        '<div class="jp-text">' + s.jp + '</div>' +
        '<div class="romaji">' + escapeHtml(s.romaji) + '</div>' +
        '<div class="translation">' + escapeHtml(s.cn) + '</div>';
      wrap.appendChild(div);
      items.push({ plain: s.plain, el: div });
    });

    articlesEl.appendChild(wrap);
    playableGroups.push({ groupId, items });
  });

  // ---------- Dialogue ----------
  if (lesson.dialogue && lesson.dialogue.lines && lesson.dialogue.lines.length) {
    document.getElementById('dialogue-divider').hidden = false;
    document.getElementById('dialogue-block').hidden = false;
    const sceneEl = document.getElementById('dialogue-scene');
    sceneEl.textContent = lesson.dialogue.scene.jp + ' / ' + lesson.dialogue.scene.cn;
    const linesEl = document.getElementById('dialogue-lines');
    const items = [];
    lesson.dialogue.lines.forEach((line, i) => {
      const div = document.createElement('div');
      div.className = 'dialogue-line';
      div.dataset.group = 'dialogue';
      div.dataset.index = String(i);
      div.innerHTML =
        '<div class="speaker">' + escapeHtml(line.speaker) + '</div>' +
        '<div class="jp-text">' + line.jp + '</div>' +
        '<div class="romaji">' + escapeHtml(line.romaji) + '</div>' +
        '<div class="translation">' + escapeHtml(line.cn) + '</div>';
      linesEl.appendChild(div);
      items.push({ plain: line.plain, el: div });
    });
    playableGroups.push({ groupId: 'dialogue', items });
  }

  // ---------- Questions ----------
  if (lesson.questions && lesson.questions.length) {
    document.getElementById('questions-divider').hidden = false;
    const qBlock = document.getElementById('questions-block');
    qBlock.hidden = false;
    lesson.questions.forEach((qa, i) => {
      const div = document.createElement('div');
      div.className = 'question';
      div.innerHTML =
        '<div class="question-q">' +
          '<span class="q-mark">Q' + (i + 1) + '</span>' +
          '<div class="jp-text">' + qa.q.jp + '</div>' +
          '<div class="romaji">' + escapeHtml(qa.q.romaji) + '</div>' +
          '<div class="translation">' + escapeHtml(qa.q.cn) + '</div>' +
        '</div>' +
        '<div class="question-a">' +
          '<span class="q-mark">A</span>' +
          '<div class="jp-text">' + qa.a.jp + '</div>' +
          '<div class="romaji">' + escapeHtml(qa.a.romaji) + '</div>' +
          '<div class="translation">' + escapeHtml(qa.a.cn) + '</div>' +
          (qa.hint ? '<div class="question-hint">提示：' + escapeHtml(qa.hint) + '</div>' : '') +
        '</div>';
      qBlock.appendChild(div);
    });
  }

  // ---------- Vocabulary ----------
  const vocabGrid = document.getElementById('vocab-grid');
  lesson.vocabulary.forEach(v => {
    const div = document.createElement('div');
    div.className = 'vocab-item';
    div.innerHTML =
      '<div class="vocab-jp">' + escapeHtml(v.jp) + (v.pos ? '<span class="vocab-pos">' + escapeHtml(v.pos) + '</span>' : '') + '</div>' +
      '<div class="vocab-kana">' + escapeHtml(v.kana) + '</div>' +
      '<div class="vocab-romaji">' + escapeHtml(v.romaji) + '</div>' +
      '<div class="vocab-meaning">' + escapeHtml(v.meaning) + '</div>';
    vocabGrid.appendChild(div);
  });

  // ---------- Grammar ----------
  const grammarNotes = document.getElementById('grammar-notes');
  lesson.grammar.forEach(g => {
    const div = document.createElement('div');
    div.className = 'grammar-point';
    let ex = '';
    if (g.examples && g.examples.length) {
      ex = '<div class="grammar-examples">' +
        g.examples.map(e =>
          '<div class="grammar-example">' +
            '<div class="ex-jp">' + e.jp + '</div>' +
            '<div class="ex-cn">' + escapeHtml(e.cn) + '</div>' +
          '</div>'
        ).join('') +
        '</div>';
    }
    div.innerHTML =
      '<div><span class="grammar-pattern">' + escapeHtml(g.pattern) + '</span>' +
      '<span class="grammar-name">' + escapeHtml(g.name) + '</span></div>' +
      '<div class="grammar-explain">' + escapeHtml(g.explain) + '</div>' +
      ex;
    grammarNotes.appendChild(div);
  });

  // ---------- Toggles ----------
  document.querySelectorAll('.toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      const type = btn.dataset.toggle;
      const state = btn.dataset.state;
      document.querySelectorAll('.toggle[data-toggle="' + type + '"]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (state === 'off') document.body.classList.add('hide-' + type);
      else document.body.classList.remove('hide-' + type);
    });
  });

  // ---------- Speech ----------
  const synth = window.speechSynthesis;
  let jaVoice = null;
  const ttsStatus = document.getElementById('tts-status');
  const nowReading = document.getElementById('now-reading');
  const speedSelect = document.getElementById('speed-select');

  function pickJapaneseVoice() {
    if (!synth) return;
    const voices = synth.getVoices();
    const preferred = voices.find(v => v.lang === 'ja-JP' && /Kyoko|Otoya|O-ren|Google/i.test(v.name));
    jaVoice = preferred || voices.find(v => v.lang === 'ja-JP') || voices.find(v => v.lang.startsWith('ja'));
    if (jaVoice) {
      ttsStatus.textContent = '音声 · ' + jaVoice.name.split(' ')[0];
      ttsStatus.classList.remove('unavailable');
    } else {
      ttsStatus.textContent = '音声 · 未対応';
      ttsStatus.classList.add('unavailable');
    }
  }

  if (synth) {
    pickJapaneseVoice();
    synth.onvoiceschanged = pickJapaneseVoice;
  } else {
    ttsStatus.textContent = '音声 · 未対応';
    ttsStatus.classList.add('unavailable');
  }

  let queue = [];
  let isPlaying = false;

  function speak(text, onEnd) {
    if (!synth) { onEnd && onEnd(); return; }
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ja-JP';
    if (jaVoice) u.voice = jaVoice;
    u.rate = parseFloat(speedSelect.value);
    u.pitch = 1.0;
    u.onend = () => onEnd && onEnd();
    u.onerror = () => onEnd && onEnd();
    synth.speak(u);
  }

  function clearPlaying() {
    document.querySelectorAll('.sentence.playing, .dialogue-line.playing').forEach(s => s.classList.remove('playing'));
  }

  function findItem(groupId, index) {
    const g = playableGroups.find(g => g.groupId === groupId);
    return g ? g.items[index] : null;
  }

  function playItem(groupId, index) {
    if (!synth) return;
    synth.cancel();
    clearPlaying();
    const item = findItem(groupId, index);
    if (!item) return;
    item.el.classList.add('playing');
    nowReading.textContent = item.plain;
    speak(item.plain, () => {
      item.el.classList.remove('playing');
      if (queue.length > 0) {
        const next = queue.shift();
        playItem(next.group, next.index);
      } else {
        isPlaying = false;
        nowReading.textContent = '完了 / done';
      }
    });
  }

  document.querySelectorAll('.sentence, .dialogue-line').forEach(el => {
    el.addEventListener('click', () => {
      queue = [];
      isPlaying = true;
      playItem(el.dataset.group, parseInt(el.dataset.index, 10));
    });
  });

  document.getElementById('play-all').addEventListener('click', () => {
    if (!synth) return;
    if (isPlaying) {
      synth.cancel();
      queue = [];
      isPlaying = false;
      clearPlaying();
      nowReading.textContent = '一時停止 / paused';
      return;
    }
    queue = [];
    playableGroups.forEach(g => {
      g.items.forEach((_, i) => queue.push({ group: g.groupId, index: i }));
    });
    if (queue.length === 0) return;
    isPlaying = true;
    const first = queue.shift();
    playItem(first.group, first.index);
  });

  document.addEventListener('visibilitychange', () => {
    if (document.hidden && synth) {
      synth.cancel();
      queue = [];
      isPlaying = false;
      clearPlaying();
    }
  });

  // ---------- helpers ----------
  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
  function stripTags(s) { return String(s).replace(/<[^>]*>/g, ''); }
})();
</script>
</body>
</html>
