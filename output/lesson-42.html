,应当跨越世代被传承下去。"},{"jp":"<ruby>静<rt>しず</rt></ruby>かに<ruby>耳<rt>みみ</rt></ruby>を<ruby>傾<rt>かたむ</rt></ruby>ければ、<ruby>先人<rt>せんじん</rt></ruby>の<ruby>声<rt>こえ</rt></ruby>が<ruby>聞<rt>き</rt></ruby>こえてくる。","plain":"しずかにみみをかたむければ、せんじんのこえがきこえてくる。","romaji":"shizuka ni mimi o katamukereba, senjin no koe ga kikoete kuru.","cn":"静下心倾听,先人的声音便会传来。"}]}],"dialogue":{"scene":{"jp":"研究発表会の後。研究者が同僚に研究方法を説明している。","cn":"研究发表会后。研究者向同事说明研究方法。"},"lines":[{"speaker":"同僚","jp":"<ruby>本日<rt>ほんじつ</rt></ruby>の<ruby>発表<rt>はっぴょう</rt></ruby>、<ruby>論拠<rt>ろんきょ</rt></ruby>がしっかりしていましたね。","plain":"ほんじつのはっぴょう、ろんきょがしっかりしていましたね。","romaji":"honjitsu no happyou, ronkyo ga shikkari shite imashita ne.","cn":"今天的发表,论据很扎实呢。"},{"speaker":"研究者","jp":"ありがとうございます。<ruby>三年間<rt>さんねんかん</rt></ruby>の<ruby>追跡<rt>ついせき</rt></ruby><ruby>調査<rt>ちょうさ</rt></ruby>に<ruby>基<rt>もと</rt></ruby>づいてまとめました。","plain":"ありがとうございます。さんねんかんのついせきちょうさにもとづいてまとめました。","romaji":"arigatou gozaimasu. sannen-kan no tsuiseki-chousa ni motozuite matomemashita.","cn":"谢谢。基于三年的追踪调查整理出来的。"},{"speaker":"同僚","jp":"インタビューも<ruby>多<rt>おお</rt></ruby>く<ruby>取<rt>と</rt></ruby>り<ruby>入<rt>い</rt></ruby>れていましたね。","plain":"インタビューもおおくとりいれていましたね。","romaji":"intabyuu mo ooku toriirete imashita ne.","cn":"采访也大量纳入了呢。"},{"speaker":"研究者","jp":"はい、<ruby>当事者<rt>とうじしゃ</rt></ruby>の<ruby>声<rt>こえ</rt></ruby>を<ruby>通<rt>つう</rt></ruby>じてしか<ruby>見<rt>み</rt></ruby>えない<ruby>事実<rt>じじつ</rt></ruby>がありますから。","plain":"はい、とうじしゃのこえをつうじてしかみえないじじつがありますから。","romaji":"hai, toujisha no koe o tsuujite shika mienai jijitsu ga arimasu kara.","cn":"是的,有些事实只有通过当事人的声音才能看见。"},{"speaker":"同僚","jp":"<ruby>結論<rt>けつろん</rt></ruby>のところ、データからしてその<ruby>方向<rt>ほうこう</rt></ruby>に<ruby>向<rt>む</rt></ruby>かうのは<ruby>納得<rt>なっとく</rt></ruby>できます。","plain":"けつろんのところ、データからしてそのほうこうにむかうのはなっとくできます。","romaji":"ketsuron no tokoro, deeta karashite sono houkou ni mukau no wa nattoku dekimasu.","cn":"结论部分,从数据来看朝那个方向走是可以接受的。"},{"speaker":"研究者","jp":"ご<ruby>意見<rt>いけん</rt></ruby>、ありがたく<ruby>受<rt>う</rt></ruby>け<ruby>止<rt>と</rt></ruby>めます。<ruby>次<rt>つぎ</rt></ruby>の<ruby>段階<rt>だんかい</rt></ruby>でさらに<ruby>深<rt>ふか</rt></ruby>めていきます。","plain":"ごいけん、ありがたくうけとめます。つぎのだんかいでさらにふかめていきます。","romaji":"go-iken, arigataku uketomemasu. tsugi no dankai de sara ni fukamete ikimasu.","cn":"您的意见,我十分感谢地接受。下一阶段会进一步深化。"}]},"questions":[{"q":{"jp":"<ruby>若者<rt>わかもの</rt></ruby>の<ruby>消費<rt>しょうひ</rt></ruby><ruby>傾向<rt>けいこう</rt></ruby>はどう<ruby>変化<rt>へんか</rt></ruby>しているか。","plain":"わかもののしょうひけいこうはどうへんかしているか。","romaji":"wakamono no shouhi-keikou wa dou henka shite iru ka.","cn":"年轻人的消费倾向有何变化?"},"a":{"jp":"<ruby>外食<rt>がいしょく</rt></ruby>や<ruby>衣服<rt>いふく</rt></ruby>への<ruby>支出<rt>ししゅつ</rt></ruby>が<ruby>減<rt>へ</rt></ruby>り、<ruby>通信費<rt>つうしんひ</rt></ruby>や<ruby>体験<rt>たいけん</rt></ruby><ruby>消費<rt>しょうひ</rt></ruby>が<ruby>増<rt>ふ</rt></ruby>えている。","plain":"がいしょくやいふくへのししゅつがへり、つうしんひやたいけんしょうひがふえている。","romaji":"gaishoku ya ifuku e no shishutsu ga heri, tsuushinhi ya taiken-shouhi ga fuete iru.","cn":"外食和服装的支出在减少,通信费和体验消费在增加。"}},{"q":{"jp":"この<ruby>変化<rt>へんか</rt></ruby>から<ruby>読<rt>よ</rt></ruby>み<ruby>取<rt>と</rt></ruby>れる<ruby>価値観<rt>かちかん</rt></ruby>の<ruby>変化<rt>へんか</rt></ruby>とは<ruby>何<rt>なに</rt></ruby>か。","plain":"このへんかからよみとれるかちかんのへんかとはなにか。","romaji":"kono henka kara yomitoreru kachikan no henka to wa nani ka.","cn":"从这一变化能读出怎样的价值观变化?"},"a":{"jp":"<ruby>所有<rt>しょゆう</rt></ruby>より<ruby>体験<rt>たいけん</rt></ruby>を<ruby>重視<rt>じゅうし</rt></ruby>する<ruby>価値観<rt>かちかん</rt></ruby>が<ruby>広<rt>ひろ</rt></ruby>がっている。","plain":"しょゆうよりたいけんをじゅうしするかちかんがひろがっている。","romaji":"shoyuu yori taiken o juushi suru kachikan ga hirogatte iru.","cn":"重视体验胜于占有的价值观正在扩散。"}},{"q":{"jp":"<ruby>本物<rt>ほんもの</rt></ruby>の<ruby>知恵<rt>ちえ</rt></ruby>は<ruby>何<rt>なに</rt></ruby>から<ruby>得<rt>え</rt></ruby>られると<ruby>述<rt>の</rt></ruby>べられているか。","plain":"ほんもののちえはなにからえられるとのべられているか。","romaji":"honmono no chie wa nani kara erareru to noberarete iru ka.","cn":"文中说真正的智慧从哪里获得?"},"a":{"jp":"<ruby>経験<rt>けいけん</rt></ruby>と<ruby>観察<rt>かんさつ</rt></ruby>の<ruby>両方<rt>りょうほう</rt></ruby>から<ruby>得<rt>え</rt></ruby>られる。","plain":"けいけんとかんさつのりょうほうからえられる。","romaji":"keiken to kansatsu no ryouhou kara erareru.","cn":"从经验与观察两方面获得。"}},{"q":{"jp":"<ruby>研究者<rt>けんきゅうしゃ</rt></ruby>はインタビューを<ruby>取<rt>と</rt></ruby>り<ruby>入<rt>い</rt></ruby>れた<ruby>理由<rt>りゆう</rt></ruby>を<ruby>何<rt>なん</rt></ruby>と<ruby>説明<rt>せつめい</rt></ruby>したか。","plain":"けんきゅうしゃはインタビューをとりいれたりゆうをなんとせつめいしたか。","romaji":"kenkyuusha wa intabyuu o toriireta riyuu o nan to setsumei shita ka.","cn":"研究者如何说明纳入访谈的理由?"},"a":{"jp":"<ruby>当事者<rt>とうじしゃ</rt></ruby>の<ruby>声<rt>こえ</rt></ruby>を<ruby>通<rt>つう</rt></ruby>じてしか<ruby>見<rt>み</rt></ruby>えない<ruby>事実<rt>じじつ</rt></ruby>があるからだと<ruby>説明<rt>せつめい</rt></ruby>した。","plain":"とうじしゃのこえをつうじてしかみえないじじつがあるからだとせつめいした。","romaji":"toujisha no koe o tsuujite shika mienai jijitsu ga aru kara da to setsumei shita.","cn":"说明因为有些事实只有通过当事人的声音才能看见。"}}],"vocabulary":[{"jp":"調査","kana":"ちょうさ","romaji":"chousa","meaning":"调查","pos":"名詞"},{"jp":"若者","kana":"わかもの","romaji":"wakamono","meaning":"年轻人","pos":"名詞"},{"jp":"消費","kana":"しょうひ","romaji":"shouhi","meaning":"消费","pos":"名詞"},{"jp":"行動","kana":"こうどう","romaji":"koudou","meaning":"行为,行动","pos":"名詞"},{"jp":"分析","kana":"ぶんせき","romaji":"bunseki","meaning":"分析","pos":"名詞"},{"jp":"統計","kana":"とうけい","romaji":"toukei","meaning":"统计","pos":"名詞"},{"jp":"支出","kana":"ししゅつ","romaji":"shishutsu","meaning":"支出","pos":"名詞"},{"jp":"傾向","kana":"けいこう","romaji":"keikou","meaning":"倾向","pos":"名詞"},{"jp":"外食","kana":"がいしょく","romaji":"gaishoku","meaning":"外食","pos":"名詞"},{"jp":"衣服","kana":"いふく","romaji":"ifuku","meaning":"服装","pos":"名詞"},{"jp":"減少","kana":"げんしょう","romaji":"genshou","meaning":"减少","pos":"名詞"},{"jp":"通信費","kana":"つうしんひ","romaji":"tsuushinhi","meaning":"通信费","pos":"名詞"},{"jp":"体験","kana":"たいけん","romaji":"taiken","meaning":"体验","pos":"名詞"},{"jp":"所有","kana":"しょゆう","romaji":"shoyuu","meaning":"所有,占有","pos":"名詞"},{"jp":"重視","kana":"じゅうし","romaji":"juushi","meaning":"重视","pos":"名詞"},{"jp":"価値観","kana":"かちかん","romaji":"kachikan","meaning":"价值观","pos":"名詞"},{"jp":"共有","kana":"きょうゆう","romaji":"kyouyuu","meaning":"共享","pos":"名詞"},{"jp":"価値","kana":"かち","romaji":"kachi","meaning":"价值","pos":"名詞"},{"jp":"本人","kana":"ほんにん","romaji":"honnin","meaning":"本人","pos":"名詞"},{"jp":"所得","kana":"しょとく","romaji":"shotoku","meaning":"所得,收入","pos":"名詞"},{"jp":"伸び悩み","kana":"のびなやみ","romaji":"nobinayami","meaning":"增长乏力","pos":"名詞"},{"jp":"節約","kana":"せつやく","romaji":"setsuyaku","meaning":"节约","pos":"名詞"},{"jp":"志向","kana":"しこう","romaji":"shikou","meaning":"志向,倾向","pos":"名詞"},{"jp":"表現","kana":"ひょうげん","romaji":"hyougen","meaning":"表达","pos":"名詞"},{"jp":"商品開発","kana":"しょうひんかいはつ","romaji":"shouhin-kaihatsu","meaning":"产品开发","pos":"名詞"},{"jp":"方針","kana":"ほうしん","romaji":"houshin","meaning":"方针","pos":"名詞"},{"jp":"見直す","kana":"みなおす","romaji":"minaosu","meaning":"重新审视","pos":"動詞I"},{"jp":"映す","kana":"うつす","romaji":"utsusu","meaning":"映照,反映","pos":"動詞I"},{"jp":"鍵","kana":"かぎ","romaji":"kagi","meaning":"钥匙,关键","pos":"名詞"},{"jp":"教訓","kana":"きょうくん","romaji":"kyoukun","meaning":"教训","pos":"名詞"},{"jp":"失敗","kana":"しっぱい","romaji":"shippai","meaning":"失败","pos":"名詞"},{"jp":"本心","kana":"ほんしん","romaji":"honshin","meaning":"真心","pos":"名詞"},{"jp":"察する","kana":"さっする","romaji":"sassuru","meaning":"察觉","pos":"動詞III"},{"jp":"観察","kana":"かんさつ","romaji":"kansatsu","meaning":"观察","pos":"名詞"},{"jp":"築く","kana":"きずく","romaji":"kizuku","meaning":"构筑","pos":"動詞I"},{"jp":"基礎","kana":"きそ","romaji":"kiso","meaning":"基础","pos":"名詞"},{"jp":"言動","kana":"げんどう","romaji":"gendou","meaning":"言行","pos":"名詞"},{"jp":"注意深い","kana":"ちゅういぶかい","romaji":"chuuibukai","meaning":"细致,警觉","pos":"い形容詞"},{"jp":"知恵","kana":"ちえ","romaji":"chie","meaning":"智慧","pos":"名詞"},{"jp":"世代","kana":"せだい","romaji":"sedai","meaning":"世代","pos":"名詞"},{"jp":"受け継ぐ","kana":"うけつぐ","romaji":"uketsugu","meaning":"继承","pos":"動詞I"},{"jp":"追跡","kana":"ついせき","romaji":"tsuiseki","meaning":"追踪","pos":"名詞"},{"jp":"当事者","kana":"とうじしゃ","romaji":"toujisha","meaning":"当事人","pos":"名詞"}],"grammar":[{"pattern":"N に基づいて／に基づき","name":"基于…","explain":"\"以…为依据\"。N 通常是数据、事实、原则、规定等可作为论据的具体内容。「に基づき」是「に基づいて」的书面缩略形,常见于学术、公文。「に基づく N」可作名词修饰,如「事実に基づく報道」。强调\"出发点\"是该 N。","examples":[{"jp":"<ruby>事実<rt>じじつ</rt></ruby>に<ruby>基<rt>もと</rt></ruby>づいて<ruby>判断<rt>はんだん</rt></ruby>する。","plain":"じじつにもとづいてはんだんする。","cn":"基于事实判断。"},{"jp":"<ruby>法律<rt>ほうりつ</rt></ruby>に<ruby>基<rt>もと</rt></ruby>づき<ruby>処分<rt>しょぶん</rt></ruby>する。","plain":"ほうりつにもとづきしょぶんする。","cn":"依法处理。"}]},{"pattern":"N を通じて／を通して","name":"通过(媒介・期间)","explain":"\"通过…\"。表示\"经由某种媒介、渠道或贯穿某段时间\"。两者意义高度重合;「を通じて」更书面、抽象;「を通して」偏具体、亲身。表示时间贯通时常用「を通じて」(一年を通じて=全年)。「に基づいて」表\"依据\"是论证根基,「を通じて」表\"经由\"是路径,不可混用。","examples":[{"jp":"インターネットを<ruby>通<rt>つう</rt></ruby>じて<ruby>情報<rt>じょうほう</rt></ruby>を<ruby>得<rt>え</rt></ruby>る。","plain":"インターネットをつうじてじょうほうをえる。","cn":"通过互联网获取信息。"},{"jp":"<ruby>体験<rt>たいけん</rt></ruby>を<ruby>通<rt>とお</rt></ruby>して<ruby>学<rt>まな</rt></ruby>ぶ。","plain":"たいけんをとおしてまなぶ。","cn":"通过体验来学习。"}]},{"pattern":"N からして","name":"从…来看(推论起点)","explain":"\"从…来看\"。从某个具体事实、迹象出发,推论整体情况。N 是具体的小事、典型例,后接的是基于此推论的判断或评价。带\"连这一点都…/光从这看就…\"的语气。注意与「に基づいて」相比,「からして」更偏主观、印象式推论,论据强度弱一些。","examples":[{"jp":"あの<ruby>口調<rt>くちょう</rt></ruby>からして、<ruby>怒<rt>おこ</rt></ruby>っているに<ruby>違<rt>ちが</rt></ruby>いない。","plain":"あのくちょうからして、おこっているにちがいない。","cn":"光从那个口气就知道,他一定在生气。"}]},{"pattern":"〜ことから","name":"从…推断","explain":"\"由…可见、因此…\"。前接句子(普通形),表示从\"那件事/那个事实\"出发推断出后项结论。常见于客观叙述、说明文。比「から」(直接因果)更书面、推论性更强,常配合「〜と考えられる／〜と言える」等推断表达。","examples":[{"jp":"<ruby>足跡<rt>あしあと</rt></ruby>が<ruby>残<rt>のこ</rt></ruby>っていることから、<ruby>誰<rt>だれ</rt></ruby>かが<ruby>来<rt>き</rt></ruby>たことがわかる。","plain":"あしあとがのこっていることから、だれかがきたことがわかる。","cn":"由留有脚印可知,有人来过。"}]},{"pattern":"〜と同時に","name":"同时…","explain":"\"…的同时也…\"。表示两件事并列存在、并行发生。可表时间同步,也可表性质并存(此处后者较多)。书面色彩较强,论说文中用于呈现事物的两面性或多重属性。前项是动词时多用辞書形,名词时直接接。","examples":[{"jp":"データは<ruby>過去<rt>かこ</rt></ruby>を<ruby>映<rt>うつ</rt></ruby>すと<ruby>同時<rt>どうじ</rt></ruby>に、<ruby>未来<rt>みらい</rt></ruby>を<ruby>読<rt>よ</rt></ruby>む<ruby>鍵<rt>かぎ</rt></ruby>でもある。","plain":"データはかこをうつすとどうじに、みらいをよむかぎでもある。","cn":"数据既映照过去,同时也是阅读未来的钥匙。"}]}]},"prev":{"id":41,"title":"観点と立場"},"next":{"id":43,"title":"強調と限定"}}</script>
<script>
(() => {
  const data = JSON.parse(document.getElementById('lesson-data').textContent);
  const lesson = data.lesson;
  const prev = data.prev; // { id, title } | null
  const next = data.next;

  // Flatten "playable" sentences for the global play-all queue.
  // group: 'main-N' / 'sub-N' / 'dialogue' (each has its own DOM nodes)
  const playableGroups = []; // [{ groupId, items: [{ plain, el }] }]

  // ---------- Masthead / nav ----------
  const lessonNo = String(lesson.id).padStart(2, '0');
  document.title = lesson.level + ' · 第' + lesson.id + '課 — ' + stripTags(lesson.title.jp);
  document.getElementById('m-level').textContent = lesson.level + ' — Lesson ' + lessonNo;
  document.getElementById('m-title-jp').innerHTML = lesson.title.jp;
  document.getElementById('m-title-en').textContent = lesson.title.romaji + ' · ' + lesson.title.en;
  document.getElementById('m-lesson-no').textContent = '第 ' + lesson.id + ' 課';
  document.getElementById('footer-meta').textContent = '日本語 ' + lesson.level + ' · 第' + lesson.id + '課';

  const navEl = document.getElementById('lesson-nav');
  const navParts = [];
  navParts.push('<a href="index.html">← 索引</a>');
  navParts.push('<span>/</span>');
  if (prev) {
    navParts.push('<a href="lesson-' + String(prev.id).padStart(2, '0') + '.html">第' + prev.id + '課</a>');
    navParts.push('<span>/</span>');
  }
  navParts.push('<span class="current">第' + lesson.id + '課</span>');
  if (next) {
    navParts.push('<span>/</span>');
    navParts.push('<a href="lesson-' + String(next.id).padStart(2, '0') + '.html">第' + next.id + '課 →</a>');
  }
  navEl.innerHTML = navParts.join(' ');

  // ---------- Goals ----------
  const goalsList = document.getElementById('goals-list');
  if (lesson.goals && lesson.goals.length) {
    lesson.goals.forEach(g => {
      const li = document.createElement('li');
      li.textContent = g;
      goalsList.appendChild(li);
    });
  } else {
    document.getElementById('goals-block').hidden = true;
  }

  // ---------- Articles ----------
  const articlesEl = document.getElementById('articles');
  lesson.articles.forEach((article, ai) => {
    const wrap = document.createElement('article');
    wrap.className = 'article';
    const groupId = (article.kind === 'main' ? 'main' : 'sub') + '-' + ai;
    wrap.id = 'article-' + groupId;

    const meta = document.createElement('div');
    meta.className = 'article-meta';
    meta.textContent = article.kind === 'main' ? '主篇 · main reading' : '配篇 · companion reading';
    wrap.appendChild(meta);

    const h2 = document.createElement('h2');
    h2.className = 'article-title';
    h2.innerHTML = article.title.jp + '<span class="ja-small">' + escapeHtml(article.title.cn) + '</span>';
    wrap.appendChild(h2);

    const items = [];
    article.sentences.forEach((s, i) => {
      const div = document.createElement('div');
      div.className = 'sentence';
      div.dataset.group = groupId;
      div.dataset.index = String(i);
      div.innerHTML =
        '<div class="jp-text">' + s.jp + '</div>' +
        '<div class="romaji">' + escapeHtml(s.romaji) + '</div>' +
        '<div class="translation">' + escapeHtml(s.cn) + '</div>';
      wrap.appendChild(div);
      items.push({ plain: s.plain, el: div });
    });

    articlesEl.appendChild(wrap);
    playableGroups.push({ groupId, items });
  });

  // ---------- Dialogue ----------
  if (lesson.dialogue && lesson.dialogue.lines && lesson.dialogue.lines.length) {
    document.getElementById('dialogue-divider').hidden = false;
    document.getElementById('dialogue-block').hidden = false;
    const sceneEl = document.getElementById('dialogue-scene');
    sceneEl.textContent = lesson.dialogue.scene.jp + ' / ' + lesson.dialogue.scene.cn;
    const linesEl = document.getElementById('dialogue-lines');
    const items = [];
    lesson.dialogue.lines.forEach((line, i) => {
      const div = document.createElement('div');
      div.className = 'dialogue-line';
      div.dataset.group = 'dialogue';
      div.dataset.index = String(i);
      div.innerHTML =
        '<div class="speaker">' + escapeHtml(line.speaker) + '</div>' +
        '<div class="jp-text">' + line.jp + '</div>' +
        '<div class="romaji">' + escapeHtml(line.romaji) + '</div>' +
        '<div class="translation">' + escapeHtml(line.cn) + '</div>';
      linesEl.appendChild(div);
      items.push({ plain: line.plain, el: div });
    });
    playableGroups.push({ groupId: 'dialogue', items });
  }

  // ---------- Questions ----------
  if (lesson.questions && lesson.questions.length) {
    document.getElementById('questions-divider').hidden = false;
    const qBlock = document.getElementById('questions-block');
    qBlock.hidden = false;
    lesson.questions.forEach((qa, i) => {
      const div = document.createElement('div');
      div.className = 'question';
      div.innerHTML =
        '<div class="question-q">' +
          '<span class="q-mark">Q' + (i + 1) + '</span>' +
          '<div class="jp-text">' + qa.q.jp + '</div>' +
          '<div class="romaji">' + escapeHtml(qa.q.romaji) + '</div>' +
          '<div class="translation">' + escapeHtml(qa.q.cn) + '</div>' +
        '</div>' +
        '<div class="question-a">' +
          '<span class="q-mark">A</span>' +
          '<div class="jp-text">' + qa.a.jp + '</div>' +
          '<div class="romaji">' + escapeHtml(qa.a.romaji) + '</div>' +
          '<div class="translation">' + escapeHtml(qa.a.cn) + '</div>' +
          (qa.hint ? '<div class="question-hint">提示：' + escapeHtml(qa.hint) + '</div>' : '') +
        '</div>';
      qBlock.appendChild(div);
    });
  }

  // ---------- Vocabulary ----------
  const vocabGrid = document.getElementById('vocab-grid');
  lesson.vocabulary.forEach(v => {
    const div = document.createElement('div');
    div.className = 'vocab-item';
    div.innerHTML =
      '<div class="vocab-jp">' + escapeHtml(v.jp) + (v.pos ? '<span class="vocab-pos">' + escapeHtml(v.pos) + '</span>' : '') + '</div>' +
      '<div class="vocab-kana">' + escapeHtml(v.kana) + '</div>' +
      '<div class="vocab-romaji">' + escapeHtml(v.romaji) + '</div>' +
      '<div class="vocab-meaning">' + escapeHtml(v.meaning) + '</div>';
    vocabGrid.appendChild(div);
  });

  // ---------- Grammar ----------
  const grammarNotes = document.getElementById('grammar-notes');
  lesson.grammar.forEach(g => {
    const div = document.createElement('div');
    div.className = 'grammar-point';
    let ex = '';
    if (g.examples && g.examples.length) {
      ex = '<div class="grammar-examples">' +
        g.examples.map(e =>
          '<div class="grammar-example">' +
            '<div class="ex-jp">' + e.jp + '</div>' +
            '<div class="ex-cn">' + escapeHtml(e.cn) + '</div>' +
          '</div>'
        ).join('') +
        '</div>';
    }
    div.innerHTML =
      '<div><span class="grammar-pattern">' + escapeHtml(g.pattern) + '</span>' +
      '<span class="grammar-name">' + escapeHtml(g.name) + '</span></div>' +
      '<div class="grammar-explain">' + escapeHtml(g.explain) + '</div>' +
      ex;
    grammarNotes.appendChild(div);
  });

  // ---------- Toggles ----------
  document.querySelectorAll('.toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      const type = btn.dataset.toggle;
      const state = btn.dataset.state;
      document.querySelectorAll('.toggle[data-toggle="' + type + '"]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (state === 'off') document.body.classList.add('hide-' + type);
      else document.body.classList.remove('hide-' + type);
    });
  });

  // ---------- Speech ----------
  const synth = window.speechSynthesis;
  let jaVoice = null;
  const ttsStatus = document.getElementById('tts-status');
  const nowReading = document.getElementById('now-reading');
  const speedSelect = document.getElementById('speed-select');

  function pickJapaneseVoice() {
    if (!synth) return;
    const voices = synth.getVoices();
    const preferred = voices.find(v => v.lang === 'ja-JP' && /Kyoko|Otoya|O-ren|Google/i.test(v.name));
    jaVoice = preferred || voices.find(v => v.lang === 'ja-JP') || voices.find(v => v.lang.startsWith('ja'));
    if (jaVoice) {
      ttsStatus.textContent = '音声 · ' + jaVoice.name.split(' ')[0];
      ttsStatus.classList.remove('unavailable');
    } else {
      ttsStatus.textContent = '音声 · 未対応';
      ttsStatus.classList.add('unavailable');
    }
  }

  if (synth) {
    pickJapaneseVoice();
    synth.onvoiceschanged = pickJapaneseVoice;
  } else {
    ttsStatus.textContent = '音声 · 未対応';
    ttsStatus.classList.add('unavailable');
  }

  let queue = [];
  let isPlaying = false;

  function speak(text, onEnd) {
    if (!synth) { onEnd && onEnd(); return; }
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ja-JP';
    if (jaVoice) u.voice = jaVoice;
    u.rate = parseFloat(speedSelect.value);
    u.pitch = 1.0;
    u.onend = () => onEnd && onEnd();
    u.onerror = () => onEnd && onEnd();
    synth.speak(u);
  }

  function clearPlaying() {
    document.querySelectorAll('.sentence.playing, .dialogue-line.playing').forEach(s => s.classList.remove('playing'));
  }

  function findItem(groupId, index) {
    const g = playableGroups.find(g => g.groupId === groupId);
    return g ? g.items[index] : null;
  }

  function playItem(groupId, index) {
    if (!synth) return;
    synth.cancel();
    clearPlaying();
    const item = findItem(groupId, index);
    if (!item) return;
    item.el.classList.add('playing');
    nowReading.textContent = item.plain;
    speak(item.plain, () => {
      item.el.classList.remove('playing');
      if (queue.length > 0) {
        const next = queue.shift();
        playItem(next.group, next.index);
      } else {
        isPlaying = false;
        nowReading.textContent = '完了 / done';
      }
    });
  }

  document.querySelectorAll('.sentence, .dialogue-line').forEach(el => {
    el.addEventListener('click', () => {
      queue = [];
      isPlaying = true;
      playItem(el.dataset.group, parseInt(el.dataset.index, 10));
    });
  });

  document.getElementById('play-all').addEventListener('click', () => {
    if (!synth) return;
    if (isPlaying) {
      synth.cancel();
      queue = [];
      isPlaying = false;
      clearPlaying();
      nowReading.textContent = '一時停止 / paused';
      return;
    }
    queue = [];
    playableGroups.forEach(g => {
      g.items.forEach((_, i) => queue.push({ group: g.groupId, index: i }));
    });
    if (queue.length === 0) return;
    isPlaying = true;
    const first = queue.shift();
    playItem(first.group, first.index);
  });

  document.addEventListener('visibilitychange', () => {
    if (document.hidden && synth) {
      synth.cancel();
      queue = [];
      isPlaying = false;
      clearPlaying();
    }
  });

  // ---------- helpers ----------
  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
  function stripTags(s) { return String(s).replace(/<[^>]*>/g, ''); }
})();
</script>
</body>
</html>
